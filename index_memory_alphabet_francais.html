<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <title>Memory — Alphabet français</title>

  <meta name="theme-color" content="#eef0f8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Memory" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="icon" type="image/png" href="icon.png" />

  <style>
    :root{
      --bg1:#edf1fb;
      --bg2:#f7eef5;
      --text:#231942;
      --muted:#7a6f95;
      --card:#ffffffcc;
      --line:rgba(255,255,255,.55);
      --shadow:0 18px 40px rgba(70,55,120,.12);
      --shadow-soft:0 10px 24px rgba(70,55,120,.10);
      --grad:linear-gradient(135deg,#ff2a68 0%,#c52fdc 52%,#4b7dff 100%);
      --grad2:linear-gradient(135deg,rgba(255,42,104,.92),rgba(162,36,235,.92));
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
      --header-h:150px;
      --controls-h:66px;
      --gap:10px;
      --radius:24px;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(94,144,255,.11), transparent 36%),
        radial-gradient(circle at top right, rgba(255,77,133,.10), transparent 28%),
        linear-gradient(135deg,var(--bg1),var(--bg2));
      min-height:100dvh;
      overflow:hidden;
    }

    .app{
      min-height:100dvh;
      padding:
        calc(18px + var(--safe-top))
        16px
        calc(16px + var(--safe-bottom));
      display:flex;
      flex-direction:column;
      gap:12px;
      max-width:560px;
      margin:0 auto;
    }

    .hero{
      min-height:var(--header-h);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding-top:8px;
      position:relative;
    }

    .logo{
      margin:0;
      line-height:.95;
      letter-spacing:-0.04em;
      font-size:clamp(52px,14vw,82px);
      font-weight:850;
      background:var(--grad);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      filter:drop-shadow(0 8px 18px rgba(177,70,193,.12));
    }

    .subtitle{
      margin-top:8px;
      font-size:clamp(16px,4vw,22px);
      letter-spacing:.20em;
      font-weight:800;
      color:#9028dc;
      text-transform:uppercase;
    }

    .dots{
      margin-top:16px;
      display:grid;
      grid-template-columns:repeat(5,10px);
      gap:8px;
      opacity:.40;
    }
    .dots span{
      width:10px;height:10px;border-radius:50%;
      background:rgba(166,113,212,.40);
      display:block;
    }

    .panel{
      background:rgba(255,255,255,.52);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow-soft);
    }

    .controls{
      min-height:var(--controls-h);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
    }

    .left-controls,.right-controls{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }

    .chip, .stat{
      border:none;
      border-radius:16px;
      padding:10px 12px;
      font-size:14px;
      font-weight:700;
      background:rgba(255,255,255,.72);
      color:var(--text);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.65);
      min-width:0;
    }

    select.chip{
      appearance:none;
      -webkit-appearance:none;
      padding-right:34px;
      background-image:
        linear-gradient(45deg, transparent 50%, #7a6f95 50%),
        linear-gradient(135deg, #7a6f95 50%, transparent 50%);
      background-position:
        calc(100% - 18px) 16px,
        calc(100% - 12px) 16px;
      background-size:6px 6px,6px 6px;
      background-repeat:no-repeat;
    }

    .stat{
      padding:10px 12px;
      white-space:nowrap;
      font-size:13px;
    }

    .btn-primary, .btn-secondary{
      border:none;
      border-radius:999px;
      font-weight:800;
      cursor:pointer;
      transition:transform .15s ease, filter .15s ease, opacity .15s ease;
    }
    .btn-primary:active, .btn-secondary:active, .card:active{
      transform:scale(.98);
    }

    .btn-primary{
      background:var(--grad2);
      color:#fff;
      box-shadow:0 14px 28px rgba(182,35,154,.26);
      padding:16px 22px;
      font-size:clamp(18px,5vw,22px);
      min-height:58px;
      width:min(100%, 340px);
    }

    .btn-secondary{
      background:rgba(255,255,255,.78);
      color:var(--text);
      padding:12px 16px;
      font-size:14px;
      min-height:46px;
    }

    .start-screen{
      flex:1;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:26px;
      padding-bottom:24px;
    }

    .hint{
      color:var(--muted);
      font-size:14px;
      text-align:center;
      line-height:1.35;
      max-width:320px;
      margin-top:-6px;
    }

    .game-screen{
      display:none;
      flex:1;
      min-height:0;
      flex-direction:column;
      gap:12px;
    }

    .game-top{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    .board-wrap{
      flex:1;
      min-height:0;
      padding:12px;
      position:relative;
    }

    .board{
      width:100%;
      height:100%;
      display:grid;
      gap:var(--gap);
      align-content:stretch;
      justify-content:stretch;
    }

    .card{
      position:relative;
      width:100%;
      height:100%;
      min-height:0;
      border:none;
      background:transparent;
      padding:0;
      border-radius:20px;
      perspective:1000px;
      cursor:pointer;
    }

    .card-inner{
      position:absolute;
      inset:0;
      transform-style:preserve-3d;
      transition:transform .38s ease;
      border-radius:20px;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner{
      transform:rotateY(180deg);
    }

    .face{
      position:absolute;
      inset:0;
      border-radius:20px;
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      overflow:hidden;
    }

    .face.back{
      background:
        linear-gradient(180deg, rgba(255,255,255,.82), rgba(255,255,255,.55));
      border:1px solid rgba(255,255,255,.85);
      box-shadow:var(--shadow-soft);
      transform:rotateY(180deg);
      font-weight:900;
      color:#6d2fda;
      text-shadow:0 2px 10px rgba(95,63,166,.08);
    }

    .face.back .letter{
      font-size:clamp(22px,6.4vw,42px);
      line-height:1;
    }

    .face.front{
      background:var(--grad2);
      box-shadow:0 12px 24px rgba(150,34,189,.18);
    }

    .face.front::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 26% 28%, rgba(255,255,255,.34), transparent 22%),
        radial-gradient(circle at 75% 70%, rgba(255,255,255,.18), transparent 18%);
    }

    .face.front::after{
      content:"";
      width:34%;
      aspect-ratio:1;
      background-image:radial-gradient(rgba(255,255,255,.45) 1.6px, transparent 1.6px);
      background-size:10px 10px;
      opacity:.75;
      filter:blur(.1px);
    }

    .matched .face.back{
      background:
        linear-gradient(180deg, rgba(255,255,255,.92), rgba(242,233,255,.82));
      box-shadow:0 0 0 2px rgba(150,78,231,.20), var(--shadow-soft);
    }

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(35,25,66,.22);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      display:none;
      align-items:center;
      justify-content:center;
      padding:24px;
      z-index:50;
    }

    .modal{
      width:min(100%, 390px);
      padding:22px;
      text-align:center;
    }

    .modal h2{
      margin:0 0 8px;
      font-size:30px;
      line-height:1;
      letter-spacing:-.03em;
      background:var(--grad);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .modal p{
      margin:0 0 16px;
      color:var(--muted);
      line-height:1.45;
      font-size:15px;
    }

    .modal .actions{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .best{
      font-weight:700;
      color:#7a3de1;
    }

    .footer-note{
      text-align:center;
      font-size:12px;
      color:rgba(75,65,108,.72);
      padding-top:2px;
    }

    @media (max-height: 760px){
      :root{
        --header-h:118px;
        --controls-h:58px;
        --gap:8px;
      }
      .subtitle{font-size:16px}
      .dots{margin-top:12px}
      .controls{padding:8px 10px}
      .chip,.stat{padding:9px 10px}
      .face.back .letter{font-size:clamp(18px,6vw,32px)}
      .btn-primary{min-height:54px}
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="start-screen" id="startScreen">
      <div class="hero">
        <h1 class="logo">Memory</h1>
        <div class="subtitle">Alphabet français</div>
        <div class="dots" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>

      <div class="panel controls" style="width:min(100%, 370px)">
        <div class="left-controls" style="width:100%">
          <select id="sizeSelect" class="chip" style="width:100%">
            <option value="4x4">Grille 4 × 4</option>
            <option value="4x5">Grille 4 × 5</option>
            <option value="4x6">Grille 4 × 6</option>
            <option value="5x6">Grille 5 × 6</option>
            <option value="6x6">Grille 6 × 6</option>
          </select>
        </div>
      </div>

      <button id="startBtn" class="btn-primary">↻ Nouveau jeu</button>
      <div class="hint">Memory de lettres avec taille de grille variable, optimisé pour l’écran d’un iPhone.</div>
    </section>

    <section class="game-screen" id="gameScreen">
      <div class="hero" style="min-height:auto;padding-top:0">
        <h1 class="logo" style="font-size:clamp(36px,9.6vw,56px)">Memory</h1>
        <div class="subtitle" style="margin-top:4px">Alphabet français</div>
      </div>

      <div class="panel controls">
        <div class="left-controls">
          <select id="sizeSelectGame" class="chip">
            <option value="4x4">4 × 4</option>
            <option value="4x5">4 × 5</option>
            <option value="4x6">4 × 6</option>
            <option value="5x6">5 × 6</option>
            <option value="6x6">6 × 6</option>
          </select>
          <button id="restartBtn" class="btn-secondary">Nouveau</button>
        </div>
        <div class="right-controls">
          <div class="stat" id="movesStat">0 coups</div>
          <div class="stat" id="timeStat">00:00</div>
        </div>
      </div>

      <div class="panel board-wrap">
        <div id="board" class="board" aria-label="Grille du memory"></div>
      </div>

      <div class="footer-note">Retourne les cartes et retrouve les paires de lettres.</div>
    </section>
  </div>

  <div class="overlay" id="overlay">
    <div class="panel modal">
      <h2>Bravo</h2>
      <p id="resultText"></p>
      <div class="best" id="bestText"></div>
      <div class="actions" style="margin-top:16px">
        <button class="btn-primary" id="playAgainBtn" style="width:100%">Rejouer</button>
        <button class="btn-secondary" id="changeSizeBtn">Changer la grille</button>
      </div>
    </div>
  </div>

  <script>
    const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    const board = document.getElementById("board");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const playAgainBtn = document.getElementById("playAgainBtn");
    const changeSizeBtn = document.getElementById("changeSizeBtn");
    const sizeSelect = document.getElementById("sizeSelect");
    const sizeSelectGame = document.getElementById("sizeSelectGame");
    const startScreen = document.getElementById("startScreen");
    const gameScreen = document.getElementById("gameScreen");
    const overlay = document.getElementById("overlay");
    const resultText = document.getElementById("resultText");
    const bestText = document.getElementById("bestText");
    const movesStat = document.getElementById("movesStat");
    const timeStat = document.getElementById("timeStat");

    let grid = {rows:4, cols:4};
    let cards = [];
    let firstCard = null;
    let secondCard = null;
    let lockBoard = false;
    let moves = 0;
    let matches = 0;
    let timer = null;
    let seconds = 0;
    let started = false;

    function parseSize(value){
      const [rows, cols] = value.split("x").map(Number);
      return { rows, cols };
    }

    function formatTime(totalSeconds){
      const min = String(Math.floor(totalSeconds / 60)).padStart(2,"0");
      const sec = String(totalSeconds % 60).padStart(2,"0");
      return `${min}:${sec}`;
    }

    function shuffle(array){
      for(let i = array.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function scoreKey(){
      return `memory-alpha-best-${grid.rows}x${grid.cols}`;
    }

    function loadBestScore(){
      try{
        const saved = JSON.parse(localStorage.getItem(scoreKey()) || "null");
        return saved;
      }catch{
        return null;
      }
    }

    function saveBestScore(){
      const current = { moves, seconds };
      const best = loadBestScore();
      const isBetter = !best || current.moves < best.moves || (current.moves === best.moves && current.seconds < best.seconds);
      if(isBetter){
        localStorage.setItem(scoreKey(), JSON.stringify(current));
        return current;
      }
      return best;
    }

    function updateStats(){
      movesStat.textContent = `${moves} coup${moves > 1 ? "s" : ""}`;
      timeStat.textContent = formatTime(seconds);
    }

    function stopTimer(){
      if(timer){
        clearInterval(timer);
        timer = null;
      }
    }

    function startTimer(){
      if(started) return;
      started = true;
      timer = setInterval(() => {
        seconds += 1;
        updateStats();
      }, 1000);
    }

    function buildDeck(pairCount){
      const letters = shuffle([...ALPHABET]).slice(0, pairCount);
      const deck = shuffle([...letters, ...letters]).map((letter, index) => ({
        id:`${letter}-${index}-${Math.random().toString(36).slice(2,7)}`,
        letter,
        matched:false
      }));
      return deck;
    }

    function setGridCSS(){
      board.style.gridTemplateColumns = `repeat(${grid.cols}, 1fr)`;
      board.style.gridTemplateRows = `repeat(${grid.rows}, 1fr)`;
    }

    function createCardElement(cardData){
      const button = document.createElement("button");
      button.className = "card";
      button.type = "button";
      button.dataset.id = cardData.id;
      button.dataset.letter = cardData.letter;
      button.setAttribute("aria-label", "Carte cachée");

      const inner = document.createElement("div");
      inner.className = "card-inner";

      const front = document.createElement("div");
      front.className = "face front";

      const back = document.createElement("div");
      back.className = "face back";
      back.innerHTML = `<span class="letter">${cardData.letter}</span>`;

      inner.appendChild(front);
      inner.appendChild(back);
      button.appendChild(inner);

      button.addEventListener("click", handleCardClick);
      return button;
    }

    function renderBoard(){
      board.innerHTML = "";
      setGridCSS();
      cards.forEach(card => board.appendChild(createCardElement(card)));
    }

    function resetState(){
      firstCard = null;
      secondCard = null;
      lockBoard = false;
      moves = 0;
      matches = 0;
      seconds = 0;
      started = false;
      stopTimer();
      updateStats();
    }

    function beginGame(){
      grid = parseSize(sizeSelectGame.value || sizeSelect.value);
      const pairCount = (grid.rows * grid.cols) / 2;
      cards = buildDeck(pairCount);
      resetState();
      renderBoard();
      overlay.style.display = "none";
      startScreen.style.display = "none";
      gameScreen.style.display = "flex";
    }

    function startFromWelcome(){
      sizeSelectGame.value = sizeSelect.value;
      beginGame();
    }

    function handleCardClick(e){
      const cardEl = e.currentTarget;
      if(lockBoard || cardEl === firstCard || cardEl.classList.contains("matched")) return;

      startTimer();
      cardEl.classList.add("flipped");
      cardEl.setAttribute("aria-label", `Lettre ${cardEl.dataset.letter}`);

      if(!firstCard){
        firstCard = cardEl;
        return;
      }

      secondCard = cardEl;
      moves += 1;
      updateStats();
      checkMatch();
    }

    function checkMatch(){
      const isMatch = firstCard.dataset.letter === secondCard.dataset.letter;
      if(isMatch){
        firstCard.classList.add("matched");
        secondCard.classList.add("matched");
        matches += 1;
        resetTurn();
        if(matches === cards.length / 2){
          finishGame();
        }
      }else{
        lockBoard = true;
        setTimeout(() => {
          firstCard.classList.remove("flipped");
          secondCard.classList.remove("flipped");
          firstCard.setAttribute("aria-label", "Carte cachée");
          secondCard.setAttribute("aria-label", "Carte cachée");
          resetTurn();
        }, 700);
      }
    }

    function resetTurn(){
      [firstCard, secondCard, lockBoard] = [null, null, false];
    }

    function finishGame(){
      stopTimer();
      const best = saveBestScore();
      resultText.textContent = `Tu as terminé la grille ${grid.rows} × ${grid.cols} en ${moves} coups, en ${formatTime(seconds)}.`;
      bestText.textContent = best
        ? `Meilleur score : ${best.moves} coups — ${formatTime(best.seconds)}`
        : "";
      overlay.style.display = "flex";
    }

    function syncSelectors(value){
      sizeSelect.value = value;
      sizeSelectGame.value = value;
    }

    startBtn.addEventListener("click", startFromWelcome);
    restartBtn.addEventListener("click", beginGame);
    playAgainBtn.addEventListener("click", beginGame);
    changeSizeBtn.addEventListener("click", () => {
      overlay.style.display = "none";
      gameScreen.style.display = "none";
      startScreen.style.display = "flex";
      syncSelectors(sizeSelectGame.value);
      stopTimer();
    });

    sizeSelect.addEventListener("change", () => syncSelectors(sizeSelect.value));
    sizeSelectGame.addEventListener("change", () => {
      syncSelectors(sizeSelectGame.value);
      beginGame();
    });

    window.addEventListener("resize", () => {
      if(gameScreen.style.display === "flex"){
        setGridCSS();
      }
    });

    syncSelectors(sizeSelect.value);
    updateStats();
  </script>
</body>
</html>
