<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Memory — Alphabet</title>

<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#eef0f8">

<style>
:root{
  --bg1:#edf1fb;
  --bg2:#f7eef5;
  --text:#231942;
  --grad:linear-gradient(135deg,#ff2a68,#7b2ff7,#4b7dff);
}

body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
}

.app{
  padding:10px;
  max-width:600px;
  margin:auto;
}

.logo{
  text-align:center;
  font-size:40px;
  font-weight:900;
  background:var(--grad);
  -webkit-background-clip:text;
  color:transparent;
}

.controls{
  display:flex;
  gap:8px;
  justify-content:space-between;
  margin:10px 0;
}

select,button{
  padding:10px;
  border-radius:12px;
  border:none;
  font-weight:700;
}

.board{
  display:grid;
  gap:8px;
}

.card{
  aspect-ratio:1;
  border-radius:12px;
  background:linear-gradient(135deg,#ff2a68,#7b2ff7);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  color:white;
  font-weight:900;
}

.card.flipped{
  background:white;
  color:#7b2ff7;
}

.stats{
  display:flex;
  justify-content:space-between;
  font-size:14px;
  margin-top:8px;
}
</style>
</head>

<body>
<div class="app">

<div class="logo">Memory</div>

<div class="controls">
<select id="size">
  <option value="4x4">4×4</option>
  <option value="4x5">4×5</option>
  <option value="4x6">4×6</option>
  <option value="5x6">5×6</option>
  <option value="6x6">6×6</option>
  <option value="6x7">6×7</option>
  <option value="6x8">6×8</option>
</select>

<button onclick="startGame()">Nouveau</button>
</div>

<div class="board" id="board"></div>

<div class="stats">
<div id="moves">0 coups</div>
<div id="time">00:00</div>
<div id="best">Record --</div>
</div>

</div>

<script>
const alphabet="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

let first=null, second=null, lock=false;
let moves=0, matches=0;
let timer=null, seconds=0;

function parseSize(v){
  let [r,c]=v.split("x").map(Number);
  return {r,c};
}

function key(size){
  return "memory-"+size;
}

function saveBest(size){
  let current={moves,seconds};
  let best=JSON.parse(localStorage.getItem(key(size)));

  if(!best || current.moves<best.moves || (current.moves===best.moves && current.seconds<best.seconds)){
    localStorage.setItem(key(size),JSON.stringify(current));
    return current;
  }
  return best;
}

function loadBest(size){
  return JSON.parse(localStorage.getItem(key(size)));
}

function format(t){
  return String(Math.floor(t/60)).padStart(2,"0")+":"+String(t%60).padStart(2,"0");
}

function startGame(){
  clearInterval(timer);
  seconds=0;
  moves=0;
  matches=0;
  document.getElementById("time").textContent="00:00";
  document.getElementById("moves").textContent="0 coups";

  let size=document.getElementById("size").value;
  let {r,c}=parseSize(size);

  let pairs=(r*c)/2;
  let letters=[...alphabet].sort(()=>Math.random()-0.5).slice(0,pairs);
  let deck=[...letters,...letters].sort(()=>Math.random()-0.5);

  let board=document.getElementById("board");
  board.style.gridTemplateColumns=`repeat(${c},1fr)`;
  board.innerHTML="";

  deck.forEach(l=>{
    let div=document.createElement("div");
    div.className="card";
    div.dataset.letter=l;
    div.onclick=clickCard;
    board.appendChild(div);
  });

  showBest(size);
}

function clickCard(){
  if(lock || this.classList.contains("flipped")) return;

  if(!timer){
    timer=setInterval(()=>{
      seconds++;
      document.getElementById("time").textContent=format(seconds);
    },1000);
  }

  this.textContent=this.dataset.letter;
  this.classList.add("flipped");

  if(!first){ first=this; return; }

  second=this;
  moves++;
  document.getElementById("moves").textContent=moves+" coups";

  if(first.dataset.letter===second.dataset.letter){
    matches++;
    first=null; second=null;

    let size=document.getElementById("size").value;

    if(matches===document.querySelectorAll(".card").length/2){
      clearInterval(timer);
      let best=saveBest(size);
      showBest(size);
    }

  }else{
    lock=true;
    setTimeout(()=>{
      first.classList.remove("flipped");
      second.classList.remove("flipped");
      first.textContent="";
      second.textContent="";
      first=null; second=null;
      lock=false;
    },600);
  }
}

function showBest(size){
  let best=loadBest(size);
  if(best){
    document.getElementById("best").textContent=
      "Record "+best.moves+" coups ("+format(best.seconds)+")";
  }else{
    document.getElementById("best").textContent="Record --";
  }
}

document.getElementById("size").addEventListener("change",startGame);

startGame();
</script>

</body>
</html>
