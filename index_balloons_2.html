<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>BALLOONS</title>

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
}

body{
  background:
    radial-gradient(circle at 12% 12%, rgba(255,239,118,.95) 0 0, rgba(255,239,118,0) 17%),
    radial-gradient(circle at 84% 12%, rgba(74,196,255,.92) 0 0, rgba(74,196,255,0) 18%),
    radial-gradient(circle at 82% 86%, rgba(86,255,227,.80) 0 0, rgba(86,255,227,0) 22%),
    radial-gradient(circle at 18% 88%, rgba(255,122,214,.72) 0 0, rgba(255,122,214,0) 22%),
    linear-gradient(150deg,#5ae8ff,#3a67ff,#7b43ff,#ff58ab);
}

.board{
  position:fixed;
  inset:0;
  overflow:hidden;
}

.balloon{
  position:absolute;
  border:none;
  border-radius:48% 48% 45% 45% / 43% 43% 57% 57%;
  transform:translate(-50%,-50%);
  box-shadow:
    inset -10px -14px 22px rgba(0,0,0,.16),
    inset 7px 10px 12px rgba(255,255,255,.20),
    0 16px 24px rgba(0,0,0,.16);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}

.balloon::before{
  content:"";
  position:absolute;
  width:26%;
  height:12%;
  left:19%;
  top:15%;
  border-radius:50%;
  background:rgba(255,255,255,.22);
}

.balloon.wrong{
  animation:wrongShake .34s ease;
}

.balloon.fly{
  pointer-events:none;
  animation:fly 2.4s ease-out forwards;
}

@keyframes fly{
  0%{
    opacity:1;
    transform:translate(-50%,-50%);
  }
  100%{
    opacity:0;
    transform:translate(
      calc(-50% + var(--dx)),
      calc(-50% - 500px)
    );
  }
}

@keyframes wrongShake{
  0%,100%{transform:translate(-50%,-50%)}
  25%{transform:translate(calc(-50% - 7px),-50%)}
  50%{transform:translate(calc(-50% + 7px),-50%)}
  75%{transform:translate(calc(-50% - 5px),-50%)}
}
</style>
</head>

<body>

<div class="board" id="board"></div>

<script>
const board = document.getElementById("board");

const COLORS = [
  ["#ff8bac","#ff2d67"],
  ["#7bff85","#19bb41"],
  ["#ffe86d","#ffbb0f"],
  ["#84dfff","#149dff"],
  ["#c89cff","#8250ff"],
  ["#ffbf7f","#ff7315"],
  ["#71fff0","#07c7b2"],
  ["#ff8ee3","#ff3dc3"]
];

let balloons = [];
let resolving = false;

function create(){
  balloons = [];
  board.innerHTML = "";
  resolving = false;

  const cols = 6;
  const rows = 10;
  const total = cols * rows;

  const width = window.innerWidth;
  const height = window.innerHeight;

  const cellW = width / cols;
  const cellH = height / rows;

  for(let row = 0; row < rows; row++){
    for(let col = 0; col < cols; col++){
      const b = document.createElement("button");
      b.type = "button";
      b.className = "balloon";

      const sizeBase = Math.min(cellW, cellH) * 0.62;
      const size = sizeBase + (Math.random() * 10 - 5);

      b.style.width = size + "px";
      b.style.height = (size * 1.22) + "px";

      const x = col * cellW + cellW / 2 + (Math.random() * 16 - 8);
      const y = row * cellH + cellH / 2 + (Math.random() * 16 - 8);

      b.style.left = x + "px";
      b.style.top = y + "px";

      const colorIndex = Math.floor(Math.random() * COLORS.length);
      const color = COLORS[colorIndex];

      b.style.background = `radial-gradient(circle at 30% 30%, ${color[0]}, ${color[1]})`;
      b.dataset.color = String(colorIndex);

      b.addEventListener("click", () => pop(String(colorIndex), b));

      board.appendChild(b);
      balloons.push(b);
    }
  }
}

function getColorCounts(){
  const counts = new Map();

  for(const b of balloons){
    const color = b.dataset.color;
    counts.set(color, (counts.get(color) || 0) + 1);
  }

  return counts;
}

function getMostNumerousColors(){
  const counts = getColorCounts();
  let max = 0;

  for(const count of counts.values()){
    if(count > max) max = count;
  }

  const winners = new Set();

  for(const [color, count] of counts.entries()){
    if(count === max){
      winners.add(color);
    }
  }

  return winners;
}

function pop(color, clickedBalloon){
  if(resolving) return;

  const mostNumerous = getMostNumerousColors();

  if(!mostNumerous.has(color)){
    clickedBalloon.classList.remove("wrong");
    void clickedBalloon.offsetWidth;
    clickedBalloon.classList.add("wrong");
    return;
  }

  const group = balloons.filter(b => b.dataset.color === color);
  if(group.length < 1) return;

  resolving = true;

  group.forEach(b => {
    b.style.setProperty("--dx", (Math.random() * 120 - 60) + "px");
    b.classList.add("fly");
    setTimeout(() => b.remove(), 2300);
  });

  balloons = balloons.filter(b => b.dataset.color !== color);

  setTimeout(() => {
    resolving = false;

    if(balloons.length < 2){
      setTimeout(create, 500);
    }
  }, 2350);
}

window.addEventListener("resize", create);
create();
</script>

</body>
</html>
