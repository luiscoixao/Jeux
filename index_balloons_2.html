<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>BALLOONS</title>

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
}

body{
  background:
    radial-gradient(circle at 12% 12%, rgba(255,239,118,.95) 0 0, transparent 17%),
    radial-gradient(circle at 84% 12%, rgba(74,196,255,.92) 0 0, transparent 18%),
    radial-gradient(circle at 82% 86%, rgba(86,255,227,.80) 0 0, transparent 22%),
    radial-gradient(circle at 18% 88%, rgba(255,122,214,.72) 0 0, transparent 22%),
    linear-gradient(150deg,#5ae8ff,#3a67ff,#7b43ff,#ff58ab);
}

.board{
  position:fixed;
  inset:0;
  overflow:hidden;
}

/* BALLOONS */
.balloon{
  position:absolute;
  border:none;
  border-radius:48% 48% 45% 45% / 43% 43% 57% 57%;
  transform:translate(-50%,-50%);
  box-shadow:
    inset -14px -18px 28px rgba(0,0,0,.18),
    inset 10px 14px 16px rgba(255,255,255,.22),
    0 20px 28px rgba(0,0,0,.18);
  cursor:pointer;
}

.balloon::before{
  content:"";
  position:absolute;
  width:28%;
  height:14%;
  left:18%;
  top:14%;
  border-radius:50%;
  background:rgba(255,255,255,.25);
}

.balloon.fly{
  pointer-events:none;
  animation:fly 2.2s ease-out forwards;
}

@keyframes fly{
  100%{
    opacity:0;
    transform:translate(
      calc(-50% + var(--dx)),
      calc(-50% - 520px)
    );
  }
}

.balloon.wrong{
  animation:shake .3s;
}

@keyframes shake{
  25%{transform:translate(calc(-50% - 6px),-50%)}
  50%{transform:translate(calc(-50% + 6px),-50%)}
}
</style>
</head>

<body>

<div class="board" id="board"></div>

<script>
const board = document.getElementById("board")

const COLORS = [
  ["#ff8bac","#ff2d67"],
  ["#7bff85","#19bb41"],
  ["#ffe86d","#ffbb0f"],
  ["#84dfff","#149dff"],
  ["#c89cff","#8250ff"],
  ["#ffbf7f","#ff7315"],
  ["#71fff0","#07c7b2"],
  ["#ff8ee3","#ff3dc3"]
]

let balloons = []

function create(){
  balloons=[]
  board.innerHTML=""

  const total = 200
  const width = window.innerWidth
  const height = window.innerHeight

  for(let i=0;i<total;i++){

    const b=document.createElement("button")
    b.className="balloon"

    // 🔥 taille X2
    const size = 45 + Math.random()*30

    b.style.width=size+"px"
    b.style.height=size*1.25+"px"

    // position libre mais contrôlée
    b.style.left=(Math.random()*90+5)+"vw"
    b.style.top=(Math.random()*90+5)+"vh"

    const cIndex=Math.floor(Math.random()*COLORS.length)
    const c=COLORS[cIndex]

    b.style.background=`radial-gradient(circle at 30% 30%,${c[0]},${c[1]})`
    b.dataset.color=cIndex
    b.dataset.flying="0"

    b.onclick=()=>pop(cIndex,b)

    board.appendChild(b)
    balloons.push(b)
  }
}

function active(){
  return balloons.filter(b=>b.dataset.flying==="0")
}

function counts(){
  const map={}
  active().forEach(b=>{
    map[b.dataset.color]=(map[b.dataset.color]||0)+1
  })
  return map
}

function winners(){
  const c=counts()
  let max=0
  Object.values(c).forEach(v=>{if(v>max)max=v})

  return Object.keys(c).filter(k=>c[k]===max)
}

function pop(color,clicked){

  if(clicked.dataset.flying==="1")return

  const win=winners()

  if(!win.includes(String(color))){
    clicked.classList.remove("wrong")
    void clicked.offsetWidth
    clicked.classList.add("wrong")
    return
  }

  const group=balloons.filter(b=>b.dataset.color==color && b.dataset.flying==="0")

  group.forEach(b=>{
    b.dataset.flying="1"
    b.style.setProperty("--dx",(Math.random()*140-70)+"px")
    b.classList.add("fly")

    setTimeout(()=>{
      b.remove()
      balloons=balloons.filter(x=>x.isConnected)

      if(active().length<2){
        setTimeout(create,400)
      }
    },2000)
  })
}

create()
</script>

</body>
</html>
