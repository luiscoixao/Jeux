<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>CHESSMEMORY</title>

<link rel="apple-touch-icon" href="iconchessmemory.png" />
<link rel="icon" href="iconchessmemory.png" />

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CHESSMEMORY" />
<meta name="theme-color" content="#2c2c2c" />

<style>
:root{
  --bg:#2c2c2c;
  --panel:#3a3a3a;
  --light:#eeeed2;
  --dark:#769656;
  --text:#ffffff;
  --gold:#d4af37;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0 12px calc(18px + env(safe-area-inset-bottom));
}

h1{
  margin:calc(env(safe-area-inset-top) + 18px) 0 12px;
  font-size:28px;
  line-height:1.08;
  font-weight:700;
  text-align:center;
}

.app{
  width:100%;
  max-width:560px;
}

.controls-panel,
.timer-panel{
  background:var(--panel);
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.18);
}

#board-container{
  width:95vw;
  max-width:500px;
  aspect-ratio:1 / 1;
  overflow:hidden;
  margin-bottom:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

#board{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  width:100%;
  height:100%;
}

.square{
  position:relative;
  width:100%;
  height:100%;
  user-select:none;
  overflow:hidden;
  perspective:900px;
  -webkit-perspective:900px;
}

.white{ background:var(--light); }
.black{ background:var(--dark); }

.coord{
  position:absolute;
  font-size:10px;
  opacity:.65;
  font-weight:700;
  pointer-events:none;
  z-index:4;
}

.coord.file{
  left:5px;
  bottom:3px;
}

.coord.rank{
  right:4px;
  top:2px;
}

.card{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:none;
  background:none;
  padding:0;
  margin:0;
  cursor:pointer;
  touch-action:manipulation;
  appearance:none;
  -webkit-appearance:none;
}

.card-inner{
  position:relative;
  width:100%;
  height:100%;
  transition:transform .42s ease;
  transform-style:preserve-3d;
  -webkit-transform-style:preserve-3d;
}

.square.flipped .card-inner{
  transform:rotateY(180deg);
  -webkit-transform:rotateY(180deg);
}

.face{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
}

.back{
  background:transparent;
}

.back::before{
  content:"";
  width:44%;
  height:44%;
  border-radius:50%;
  background:rgba(0,0,0,.10);
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.08),
    0 1px 3px rgba(0,0,0,.12);
}

.front{
  transform:rotateY(180deg);
  -webkit-transform:rotateY(180deg);
}

.piece{
  line-height:1;
  position:relative;
  z-index:2;
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
  filter:drop-shadow(0 1px 0 rgba(0,0,0,.22));
  transform-origin:center center;
  font-size:clamp(56px, 11vw, 82px);
  font-family:"Arial Unicode MS","Segoe UI Symbol","Apple Symbols","Noto Sans Symbols 2",-apple-system,sans-serif;
}

/* Réglages fins pièce par pièce */
.piece-K{ transform:scale(1.00); }
.piece-k{ transform:scale(1.12); }

.piece-Q{ transform:scale(1.00); }
.piece-q{ transform:scale(1.02); }

.piece-R{ transform:scale(0.88); }
.piece-r{ transform:scale(1.02); }

.piece-B{ transform:scale(0.98); }
.piece-b{ transform:scale(1.02); }

.piece-N{ transform:scale(1.00); }
.piece-n{ transform:scale(1.00); }

.white-piece{
  color:#ffffff;
  text-shadow:
    0 0 1px #000,
    0 0 2px #000,
    0 1px 2px rgba(0,0,0,.55),
    0 0 6px rgba(255,255,255,.16);
}

.black-piece{
  color:#141414;
  text-shadow:
    0 0 1px rgba(255,255,255,.18),
    0 1px 1px rgba(255,255,255,.06);
}

.square.matched{
  box-shadow:inset 0 0 0 3px rgba(212,175,55,.95);
}

.controls{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:28px;
  background:var(--panel);
}

.control-btn{
  width:52px;
  height:52px;
  border:none;
  background:var(--bg);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  appearance:none;
  -webkit-appearance:none;
}

.control-btn span{
  font-size:24px;
  line-height:1;
  display:block;
}

#memoryStatus{
  text-align:center;
  font-size:16px;
  font-weight:700;
  margin-bottom:6px;
}

#memoryTimer{
  text-align:center;
  font-size:22px;
  font-weight:700;
  color:var(--gold);
  min-height:28px;
}

.footer-note{
  text-align:center;
  font-size:12px;
  margin-top:4px;
  opacity:.82;
}

@media (max-width:420px){
  .piece{
    font-size:clamp(50px, 11vw, 70px);
  }

  .control-btn{
    width:46px;
    height:46px;
  }

  .control-btn span{
    font-size:22px;
  }
}
</style>
</head>
<body>

<h1>CHESSMEMORY</h1>

<div class="app">
  <div id="board-container">
    <div id="board"></div>
  </div>

  <div class="timer-panel">
    <div id="memoryStatus">Mat en 1</div>
    <div id="memoryTimer">Position 1</div>
  </div>

  <div class="controls-panel">
    <div class="controls">
      <button class="control-btn" id="mate1Btn" type="button" aria-label="Mat en 1"><span>1</span></button>
      <button class="control-btn" id="mate2Btn" type="button" aria-label="Mat en 2"><span>2</span></button>
      <button class="control-btn" id="mate3Btn" type="button" aria-label="Mat en 3"><span>3</span></button>
      <button class="control-btn" id="prevBtn" type="button" aria-label="Position précédente"><span>◀</span></button>
      <button class="control-btn" id="restartBtn" type="button" aria-label="Rejouer"><span>🔄</span></button>
      <button class="control-btn" id="nextBtn" type="button" aria-label="Position suivante"><span>▶</span></button>
    </div>
  </div>

  <div class="footer-note">Jeu imaginé par Luis et créé par ChatGPT</div>
</div>

<script>
const boardEl=document.getElementById("board");
const restartBtn=document.getElementById("restartBtn");
const prevBtn=document.getElementById("prevBtn");
const nextBtn=document.getElementById("nextBtn");
const mate1Btn=document.getElementById("mate1Btn");
const mate2Btn=document.getElementById("mate2Btn");
const mate3Btn=document.getElementById("mate3Btn");
const memoryStatusEl=document.getElementById("memoryStatus");
const memoryTimerEl=document.getElementById("memoryTimer");

const FILES=["a","b","c","d","e","f","g","h"];
const PIECES={
  "P":"♙","N":"♘","B":"♗","R":"♖","Q":"♕","K":"♔",
  "p":"♟","n":"♞","b":"♝","r":"♜","q":"♛","k":"♚"
};

const POSITIONS = {
  1: [
    {label:"Position 1", fen:"6k1/5ppp/8/8/8/8/5PPP/5RK1"},
    {label:"Position 2", fen:"7k/5K2/6Q1/8/8/8/8/8"},
    {label:"Position 3", fen:"k7/1R6/K7/8/8/8/8/8"},
    {label:"Position 4", fen:"7k/6R1/6K1/8/8/8/8/8"},
    {label:"Position 5", fen:"k7/8/1QK5/8/8/8/8/8"},
    {label:"Position 6", fen:"6k1/5ppp/8/8/8/6Q1/5PPP/6K1"}
  ],
  2: [
    {label:"Position 1", fen:"6k1/5ppp/8/8/8/6Q1/5PPP/5RK1"},
    {label:"Position 2", fen:"k7/1R6/2K5/8/8/8/8/8"},
    {label:"Position 3", fen:"7k/6pp/6Q1/6K1/8/8/8/8"},
    {label:"Position 4", fen:"6k1/6pp/8/8/8/6R1/6PP/6K1"},
    {label:"Position 5", fen:"7k/5K2/8/6Q1/8/8/8/8"},
    {label:"Position 6", fen:"k7/8/2QK4/8/8/8/8/8"}
  ],
  3: [
    {label:"Position 1", fen:"6k1/6pp/8/8/8/6R1/6PP/6K1"},
    {label:"Position 2", fen:"7k/5K2/6Q1/8/8/8/8/8"},
    {label:"Position 3", fen:"k7/8/2QK4/8/8/8/8/8"},
    {label:"Position 4", fen:"7k/6R1/6K1/8/8/8/8/8"},
    {label:"Position 5", fen:"6k1/5ppp/8/8/8/6Q1/5PPP/6K1"},
    {label:"Position 6", fen:"k7/8/1QK5/8/8/8/8/8"}
  ]
};

let currentMode=1;
let currentIndex=0;
let squares=[];

function fenToSquares(fen){
  const rows = fen.split("/");   // rang 8 -> rang 1
  const result = [];
  for(let boardRow=7; boardRow>=0; boardRow--){
    const fenRow = rows[7-boardRow];
    const expanded = [];
    for(const ch of fenRow){
      if(/[1-8]/.test(ch)){
        for(let i=0;i<Number(ch);i++) expanded.push("");
      }else{
        expanded.push(ch);
      }
    }
    for(let col=0; col<8; col++){
      result.push(expanded[col] || "");
    }
  }
  return result;
}

function coordsToSquare(file,rank){
  return FILES[file]+String(rank+1);
}

function getCurrentPosition(){
  return POSITIONS[currentMode][currentIndex];
}

function loadPosition(){
  const position = getCurrentPosition();
  squares = fenToSquares(position.fen);
  memoryStatusEl.textContent = "Mat en " + currentMode;
  memoryTimerEl.textContent = position.label;
  renderBoard();
}

function renderBoard(){
  boardEl.innerHTML="";

  for(let row=7;row>=0;row--){
    for(let col=0;col<8;col++){
      const idx=row*8+col;
      const pieceCode=squares[idx];

      const sq=document.createElement("div");
      sq.className="square "+(((row+col)%2===0)?"white":"black");
      sq.classList.add("flipped");

      const button=document.createElement("button");
      button.className="card";
      button.type="button";
      button.setAttribute("aria-label", coordsToSquare(col,row));

      const inner=document.createElement("div");
      inner.className="card-inner";

      const back=document.createElement("div");
      back.className="face back";

      const front=document.createElement("div");
      front.className="face front";

      if(pieceCode){
        const piece=document.createElement("span");
        piece.className="piece "+(pieceCode===pieceCode.toUpperCase() ? "white-piece " : "black-piece ")+"piece-"+pieceCode;
        piece.textContent=PIECES[pieceCode];
        front.appendChild(piece);
      }

      inner.appendChild(back);
      inner.appendChild(front);
      button.appendChild(inner);
      sq.appendChild(button);

      if(row===0){
        const file=document.createElement("span");
        file.className="coord file";
        file.textContent=FILES[col];
        sq.appendChild(file);
      }

      if(col===7){
        const rank=document.createElement("span");
        rank.className="coord rank";
        rank.textContent=String(row+1);
        sq.appendChild(rank);
      }

      boardEl.appendChild(sq);
    }
  }
}

function setMode(mode){
  currentMode=mode;
  currentIndex=0;
  loadPosition();
}

function prevPosition(){
  const list = POSITIONS[currentMode];
  currentIndex = (currentIndex - 1 + list.length) % list.length;
  loadPosition();
}

function nextPosition(){
  const list = POSITIONS[currentMode];
  currentIndex = (currentIndex + 1) % list.length;
  loadPosition();
}

mate1Btn.addEventListener("click",()=>setMode(1));
mate2Btn.addEventListener("click",()=>setMode(2));
mate3Btn.addEventListener("click",()=>setMode(3));
prevBtn.addEventListener("click",prevPosition);
nextBtn.addEventListener("click",nextPosition);
restartBtn.addEventListener("click",loadPosition);

loadPosition();
</script>

</body>
</html>
