<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>MEMORY COLORS</title>

<meta name="theme-color" content="#5b3df5" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="MEMORY COLORS" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="apple-touch-icon" href="iconmemorycolors.png" />
<link rel="icon" type="image/png" href="iconmemorycolors.png" />

<style>
:root{
  --bg1:#4338ca;
  --bg2:#7c3aed;
  --bg3:#312e81;
  --text:#ffffff;

  --green:#22c55e;
  --yellow:#facc15;
  --pink:#ec4899;
  --cyan:#06b6d4;
  --orange:#f97316;
  --red:#ef4444;
  --lime:#84cc16;
  --teal:#14b8a6;
  --amber:#f59e0b;
  --coral:#fb7185;
  --mint:#34d399;
  --gold:#eab308;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;}

body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 10% 15%, rgba(56,189,248,.22), transparent 20%),
    radial-gradient(circle at 90% 12%, rgba(255,60,172,.18), transparent 20%),
    radial-gradient(circle at 20% 90%, rgba(34,197,94,.10), transparent 22%),
    linear-gradient(135deg,var(--bg1),var(--bg2) 55%, #5b21b6 75%, var(--bg3));
}

.app{
  width:100vw;
  height:100dvh;
  padding:calc(env(safe-area-inset-top) + 8px) 0 calc(env(safe-area-inset-bottom) + 10px) 0;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  flex:0 0 auto;
  text-align:center;
  padding:10px 6px 12px;
  overflow:hidden;
}

h1{
  margin:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:1px;
}

.title-line{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:1px;
  font-size:clamp(36px, 9vw, 68px);
  line-height:.92;
  font-weight:1000;
  letter-spacing:.04em;
  text-transform:uppercase;
  text-shadow:
    0 3px 14px rgba(0,0,0,.22),
    0 0 22px rgba(255,255,255,.10);
}

.title-line:first-child{
  transform:translateY(2px);
}

.title-letter{display:inline-block;}

.t1{color:var(--green);}
.t2{color:var(--yellow);}
.t3{color:var(--pink);}
.t4{color:var(--cyan);}
.t5{color:var(--orange);}
.t6{color:var(--red);}
.t7{color:var(--lime);}
.t8{color:var(--teal);}
.t9{color:var(--amber);}
.t10{color:var(--coral);}
.t11{color:var(--mint);}
.t12{color:var(--gold);}

/* BOARD */
.board-wrap{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  overflow:hidden;
}

.board{
  width:min(100vw, calc((100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 98px) * 0.6667));
  height:min(calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 98px), calc(100vw * 1.5));
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(6,1fr);
  background:rgba(255,255,255,.04);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);
}

.tile{
  border:none;
  cursor:pointer;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.10);
  transition:.15s;
}

.tile:active{transform:scale(.985);}

.tile.hidden{
  background:rgba(255,255,255,.03);
}

.tile.open,
.tile.matched{
  box-shadow:inset 0 0 0 3px rgba(255,255,255,.58);
}

/* COULEURS */
.seq-green{background:var(--green);}
.seq-yellow{background:var(--yellow);}
.seq-pink{background:var(--pink);}
.seq-cyan{background:var(--cyan);}
.seq-orange{background:var(--orange);}
.seq-red{background:var(--red);}
.seq-lime{background:var(--lime);}
.seq-teal{background:var(--teal);}
.seq-amber{background:var(--amber);}
.seq-coral{background:var(--coral);}
.seq-mint{background:var(--mint);}
.seq-gold{background:var(--gold);}

/* FIN */
.end-message{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(10,12,28,.42);
  backdrop-filter:blur(8px);
  opacity:0;
  pointer-events:none;
  transition:.22s;
}
.end-message.show{
  opacity:1;
  pointer-events:auto;
}

.end-box{
  padding:24px;
  background:rgba(12,18,40,.62);
  border:1px solid rgba(255,255,255,.16);
}

.signature{
  margin-top:10px;
  text-align:center;
  font-size:10px;
  opacity:.5;
}
</style>
</head>

<body>
<div class="app">

<header class="header">
<h1>
  <div class="title-line">
    <span class="title-letter t1">M</span>
    <span class="title-letter t2">E</span>
    <span class="title-letter t3">M</span>
    <span class="title-letter t4">O</span>
    <span class="title-letter t5">R</span>
    <span class="title-letter t6">Y</span>
  </div>
  <div class="title-line">
    <span class="title-letter t7">C</span>
    <span class="title-letter t8">O</span>
    <span class="title-letter t9">L</span>
    <span class="title-letter t10">O</span>
    <span class="title-letter t11">R</span>
    <span class="title-letter t12">S</span>
  </div>
</h1>
</header>

<section class="board-wrap">
<div id="board" class="board"></div>
<div class="signature">Jeu créé par Luis Coixao</div>
</section>

</div>

<div id="endMessage" class="end-message">
<div class="end-box">
<div id="endText"></div>
</div>
</div>

<script>
const COLORS = [
"seq-green","seq-yellow","seq-pink","seq-cyan",
"seq-orange","seq-red","seq-lime","seq-teal",
"seq-amber","seq-coral","seq-mint","seq-gold"
];

const state={locked:true,moves:0,matched:0,first:null,second:null,board:[],finished:false};

const boardEl=document.getElementById("board");

function shuffle(a){return a.sort(()=>Math.random()-.5)}

function buildBoard(){
  const pairs=[...COLORS,...COLORS];
  state.board=shuffle(pairs).map((c,i)=>({id:i,color:c,open:false,matched:false}));
}

function renderBoard(){
  boardEl.innerHTML="";
  state.board.forEach((c,i)=>{
    const b=document.createElement("button");
    b.className="tile "+(c.matched?c.color+" matched":c.open?c.color+" open":"hidden");
    b.onclick=()=>clickTile(i);
    boardEl.appendChild(b);
  });
}

function clickTile(i){
  if(state.locked||state.finished)return;
  const c=state.board[i];
  if(c.open||c.matched)return;

  c.open=true; renderBoard();

  if(state.first==null){state.first=i;return;}

  state.second=i; state.locked=true;

  const a=state.board[state.first];
  const b=state.board[state.second];

  if(a.color===b.color){
    a.matched=b.matched=true;
    state.first=state.second=null;
    state.locked=false;
    renderBoard();
  }else{
    setTimeout(()=>{
      a.open=b.open=false;
      state.first=state.second=null;
      state.locked=false;
      renderBoard();
    },500);
  }
}

function start(){
  buildBoard();
  renderBoard();
  state.locked=false;
}

start();
</script>
</body>
</html>
