<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>MEMORY COLORS</title>

<meta name="theme-color" content="#5b3df5" />
<link rel="apple-touch-icon" href="iconmemorycolors.png" />

<style>
:root{
  --bg1:#4338ca;
  --bg2:#7c3aed;
  --bg3:#312e81;
  --text:#ffffff;

  --green:#22c55e;
  --yellow:#facc15;
  --pink:#ec4899;
  --cyan:#06b6d4;
  --orange:#f97316;
  --red:#ef4444;
  --purple:#a855f7;
  --blue:#3b82f6;
  --lime:#84cc16;
  --turquoise:#2dd4bf;
  --fuchsia:#d946ef;
  --amber:#f59e0b;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;overflow:hidden;}

body{
  font-family:-apple-system;
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  color:white;
}

.app{
  height:100dvh;
  display:flex;
  flex-direction:column;
}

/* ===== TITRE ===== */
.header{
  text-align:center;
  padding:10px;
}

h1{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
  margin:0;
}

.title-line{
  display:flex;
  gap:2px;
  font-size:clamp(36px,9vw,68px);
  font-weight:900;
  text-shadow:0 4px 18px rgba(0,0,0,.25);
}

.t1{color:var(--green);}
.t2{color:var(--yellow);}
.t3{color:var(--pink);}
.t4{color:var(--cyan);}
.t5{color:var(--orange);}
.t6{color:var(--red);}
.t7{color:var(--lime);}
.t8{color:var(--turquoise);}
.t9{color:var(--amber);}
.t10{color:var(--fuchsia);}
.t11{color:var(--blue);}
.t12{color:var(--purple);}

/* ===== GRILLE ===== */
.board{
  flex:1;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(6,1fr);
}

.tile{
  border:none;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.1);
}

.tile.hidden{background:rgba(255,255,255,.05);}

.tile.open,
.tile.matched{
  box-shadow:inset 0 0 0 3px rgba(255,255,255,.6);
}

/* couleurs */
.seq-green{background:var(--green);}
.seq-yellow{background:var(--yellow);}
.seq-pink{background:var(--pink);}
.seq-cyan{background:var(--cyan);}
.seq-orange{background:var(--orange);}
.seq-red{background:var(--red);}
.seq-purple{background:var(--purple);}
.seq-blue{background:var(--blue);}
.seq-lime{background:var(--lime);}
.seq-turquoise{background:var(--turquoise);}
.seq-fuchsia{background:var(--fuchsia);}
.seq-amber{background:var(--amber);}

/* ===== FIN ===== */
.end{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(6px);
  opacity:0;
  pointer-events:none;
}

.end.show{
  opacity:1;
  pointer-events:auto;
}

.box{
  background:#111;
  padding:20px;
  border-radius:12px;
}

.signature{
  text-align:center;
  font-size:10px;
  opacity:.5;
  padding:6px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<h1>
  <div class="title-line">
    <span class="t1">M</span><span class="t2">E</span><span class="t3">M</span><span class="t4">O</span><span class="t5">R</span><span class="t6">Y</span>
  </div>
  <div class="title-line">
    <span class="t7">C</span><span class="t8">O</span><span class="t9">L</span><span class="t10">O</span><span class="t11">R</span><span class="t12">S</span>
  </div>
</h1>
</div>

<div id="board" class="board"></div>

<div class="signature">Jeu créé par Luis Coixao</div>

</div>

<div id="end" class="end">
  <div class="box" id="endText"></div>
</div>

<script>
const COLORS = [
"seq-green","seq-yellow","seq-pink","seq-cyan",
"seq-orange","seq-red","seq-purple","seq-blue",
"seq-lime","seq-turquoise","seq-fuchsia","seq-amber"
];

let state={first:null,second:null,locked:false,matched:0,moves:0,finished:false};

const board=document.getElementById("board");
const end=document.getElementById("end");
const endText=document.getElementById("endText");

function shuffle(a){return a.sort(()=>Math.random()-.5)}

function start(){
  state={first:null,second:null,locked:false,matched:0,moves:0,finished:false};
  const cards=shuffle([...COLORS,...COLORS]);
  board.innerHTML="";
  cards.forEach((c,i)=>{
    const b=document.createElement("button");
    b.className="tile hidden";
    b.onclick=()=>click(i,b,c);
    board.appendChild(b);
  });
}

function click(i,el,color){
  if(state.locked||state.finished||el.classList.contains("open"))return;

  el.className="tile open "+color;

  if(state.first===null){state.first={el,color};return;}

  state.second={el,color};
  state.moves++;
  state.locked=true;

  if(state.first.color===state.second.color){
    state.first.el.classList.add("matched");
    state.second.el.classList.add("matched");
    state.matched+=2;

    reset();

    if(state.matched===24) finish();
  }else{
    setTimeout(()=>{
      state.first.el.className="tile hidden";
      state.second.el.className="tile hidden";
      reset();
    },500);
  }
}

function reset(){
  state.first=null;
  state.second=null;
  state.locked=false;
}

function finish(){
  state.finished=true;
  endText.innerHTML="Terminé en "+state.moves+" coups<br><small>Tap pour rejouer</small>";
  end.classList.add("show");
}

end.onclick=()=>{end.classList.remove("show");start();};

start();
</script>

</body>
</html>
