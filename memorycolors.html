<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>MEMORY COLORS</title>

<meta name="theme-color" content="#5b3df5" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="MEMORY COLORS" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="apple-touch-icon" href="iconmemorycolors.png" />
<link rel="icon" type="image/png" href="iconmemorycolors.png" />

<style>
:root{
  --bg1:#4338ca;
  --bg2:#7c3aed;
  --bg3:#312e81;
  --text:#ffffff;

  --green1:#34d399;  --green2:#059669;
  --yellow1:#facc15; --yellow2:#a16207;
  --pink1:#f472b6;   --pink2:#be185d;
  --cyan1:#22d3ee;   --cyan2:#0369a1;
  --orange1:#fb923c; --orange2:#c2410c;
  --blue1:#fff700;   --blue2:#ffcc00;
  --red1:#f43f5e;    --red2:#9f1239;
  --lime1:#a3e635;   --lime2:#4d7c0f;
  --purple1:#c084fc; --purple2:#6d28d9;
  --teal1:#2dd4bf;   --teal2:#0f766e;
  --indigo1:#818cf8; --indigo2:#4338ca;
  --rose1:#fb7185;   --rose2:#be123c;
}
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 10% 15%, rgba(56,189,248,.35), transparent 20%),
    radial-gradient(circle at 90% 12%, rgba(255,60,172,.28), transparent 20%),
    radial-gradient(circle at 20% 90%, rgba(34,197,94,.18), transparent 22%),
    linear-gradient(135deg,var(--bg1),var(--bg2) 55%, #5b21b6 75%, var(--bg3));
}
.app{
  width:100vw;
  height:100dvh;
  padding:
    calc(env(safe-area-inset-top) + 10px)
    10px
    calc(env(safe-area-inset-bottom) + 10px)
    10px;
  display:flex;
  justify-content:center;
  align-items:center;
}
.board-shell{
  width:min(100vw - 20px, calc((100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 20px) * 0.6666667));
  height:min(calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 20px), calc((100vw - 20px) * 1.5));
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  grid-template-rows:repeat(6, 1fr);
  gap:8px;
}
.tile{
  width:100%;
  height:100%;
  min-width:0;
  min-height:0;
  border:none;
  border-radius:0;
  cursor:pointer;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.16),
    0 4px 14px rgba(0,0,0,.12);
  transition:transform .16s ease, box-shadow .16s ease, opacity .16s ease, filter .16s ease;
}
.tile:active{
  transform:scale(.97);
}
.tile.hidden{
  background:rgba(255,255,255,.09);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.10),
    0 3px 10px rgba(0,0,0,.10);
}
.tile.open{
  transform:scale(.985);
}
.tile.matched{
  box-shadow:
    inset 0 0 0 4px rgba(255,255,255,.72),
    0 0 16px rgba(255,255,255,.10);
}
.seq-green{background:linear-gradient(135deg,var(--green1),var(--green2));}
.seq-yellow{background:linear-gradient(135deg,var(--yellow1),var(--yellow2));}
.seq-pink{background:linear-gradient(135deg,var(--pink1),var(--pink2));}
.seq-cyan{background:linear-gradient(135deg,var(--cyan1),var(--cyan2));}
.seq-orange{background:linear-gradient(135deg,var(--orange1),var(--orange2));}
.seq-blue{background:linear-gradient(135deg,var(--blue1),var(--blue2));}
.seq-red{background:linear-gradient(135deg,var(--red1),var(--red2));}
.seq-lime{background:linear-gradient(135deg,var(--lime1),var(--lime2));}
.seq-purple{background:linear-gradient(135deg,var(--purple1),var(--purple2));}
.seq-teal{background:linear-gradient(135deg,var(--teal1),var(--teal2));}
.seq-indigo{background:linear-gradient(135deg,var(--indigo1),var(--indigo2));}
.seq-rose{background:linear-gradient(135deg,var(--rose1),var(--rose2));}

.title-tile{
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:8px;
  background:rgba(255,255,255,.08);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.14),
    0 4px 14px rgba(0,0,0,.12);
}
.title-text{
  font-size:clamp(16px, 3.5vw, 28px);
  line-height:.95;
  font-weight:1000;
  letter-spacing:.10em;
  text-transform:uppercase;
  color:#fff;
  text-shadow:
    0 2px 10px rgba(0,0,0,.18),
    0 0 20px rgba(255,255,255,.08);
}
.end-message{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(10,12,28,.42);
  backdrop-filter:blur(8px);
  opacity:0;
  pointer-events:none;
  transition:opacity .22s ease;
  z-index:50;
}
.end-message.show{
  opacity:1;
  pointer-events:auto;
}
.end-box{
  min-width:min(88vw, 360px);
  padding:24px 22px;
  text-align:center;
  background:rgba(12,18,40,.58);
  border:1px solid rgba(255,255,255,.18);
  box-shadow:
    0 24px 60px rgba(0,0,0,.28),
    inset 0 0 0 1px rgba(255,255,255,.04);
}
.end-title{
  font-size:28px;
  font-weight:1000;
  letter-spacing:.06em;
  text-transform:uppercase;
  margin-bottom:10px;
}
.end-text{
  font-size:16px;
  font-weight:700;
  color:rgba(255,255,255,.92);
  line-height:1.4;
}
.signature{
  position:fixed;
  left:0;
  right:0;
  bottom:calc(env(safe-area-inset-bottom) + 4px);
  text-align:center;
  font-size:10px;
  color:rgba(255,255,255,.42);
  pointer-events:none;
  z-index:12;
}
@media (max-width:420px){
  .board-shell{ gap:7px; }
}
</style>
</head>
<body>
  <div class="app">
    <div id="boardShell" class="board-shell"></div>
  </div>

  <div id="endMessage" class="end-message">
    <div class="end-box">
      <div class="end-title">Bravo</div>
      <div id="endText" class="end-text"></div>
    </div>
  </div>

  <div class="signature">Jeu créé par Luis Coixao à l'aide de ChatGPT.</div>

<script>
const COLORS = [
  "seq-green",
  "seq-yellow",
  "seq-pink",
  "seq-cyan",
  "seq-orange",
  "seq-blue",
  "seq-red",
  "seq-lime",
  "seq-purple",
  "seq-teal",
  "seq-indigo",
  "seq-rose"
];

const TOTAL_TILES = 24; // 24 cases = 12 paires
const TITLE_INDEX = 13; // case centrale visuelle dans une grille 4x6

const state = {
  locked: true,
  moves: 0,
  matched: 0,
  first: null,
  second: null,
  board: [],
  finished: false
};

const boardShell = document.getElementById("boardShell");
const endMessage = document.getElementById("endMessage");
const endText = document.getElementById("endText");

function wait(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}

function shuffle(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildBoard(){
  const pairs = [...COLORS, ...COLORS];
  state.board = shuffle(pairs).map((color, index) => ({
    id: index,
    color,
    open: false,
    matched: false
  }));
}

function createTitleTile(){
  const tile = document.createElement("div");
  tile.className = "title-tile";
  tile.innerHTML = '<div class="title-text">MEMORY<br>COLORS</div>';
  return tile;
}

function renderBoard(){
  boardShell.innerHTML = "";

  state.board.forEach((card, index) => {
    if(index === TITLE_INDEX){
      boardShell.appendChild(createTitleTile());
      return;
    }

    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "tile " + (
      card.matched ? card.color + " matched" :
      card.open ? card.color + " open" :
      "hidden"
    );
    btn.addEventListener("click", () => handleTileClick(index));
    boardShell.appendChild(btn);
  });
}

async function previewBoard(){
  state.locked = true;
  state.board.forEach(card => card.open = true);
  renderBoard();
  await wait(1400);
  state.board.forEach(card => {
    if(!card.matched) card.open = false;
  });
  renderBoard();
  state.locked = false;
}

async function startGame(){
  state.locked = true;
  state.moves = 0;
  state.matched = 0;
  state.first = null;
  state.second = null;
  state.finished = false;
  endMessage.classList.remove("show");

  buildBoard();
  renderBoard();
  await previewBoard();
}

async function handleTileClick(index){
  if(state.locked || state.finished) return;
  if(index === TITLE_INDEX) return;

  const card = state.board[index];
  if(!card || card.open || card.matched) return;

  card.open = true;
  renderBoard();

  if(state.first === null){
    state.first = index;
    return;
  }

  state.second = index;
  state.moves += 1;
  state.locked = true;

  const firstCard = state.board[state.first];
  const secondCard = state.board[state.second];

  if(firstCard.color === secondCard.color){
    firstCard.matched = true;
    secondCard.matched = true;
    state.matched += 2;

    state.first = null;
    state.second = null;
    renderBoard();

    if(state.matched === state.board.length){
      state.finished = true;
      await wait(250);
      endText.textContent = "Partie terminée en " + state.moves + " coups.";
      endMessage.classList.add("show");
      return;
    }

    state.locked = false;
    return;
  }

  await wait(650);

  firstCard.open = false;
  secondCard.open = false;
  state.first = null;
  state.second = null;
  renderBoard();
  state.locked = false;
}

startGame();
</script>
</body>
</html>
