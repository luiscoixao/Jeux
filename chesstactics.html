<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>CHESSTACTICS</title>

<link rel="apple-touch-icon" href="iconchessmemory.png" />
<link rel="icon" href="iconchessmemory.png" />

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CHESSMEMORY" />
<meta name="theme-color" content="#2c2c2c" />

<style>
:root{
  --bg:#2c2c2c;
  --panel:#3a3a3a;
  --light:#eeeed2;
  --dark:#769656;
  --text:#ffffff;
  --gold:#d4af37;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{
  margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:0 12px calc(18px + env(safe-area-inset-bottom));
}

h1{
  margin:calc(env(safe-area-inset-top) + 18px) 0 12px;
  font-size:28px;font-weight:700;text-align:center;
}

.app{width:100%;max-width:560px}

.controls-panel{
  background:var(--panel);padding:14px;margin-bottom:12px;
}

#board-container{
  width:95vw;max-width:500px;aspect-ratio:1/1;
}

#board{
  display:grid;grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);width:100%;height:100%;
}

.square{position:relative}
.white{background:var(--light)}
.black{background:var(--dark)}

.card{position:absolute;inset:0;border:none;background:none}

.card-inner{
  width:100%;height:100%;transition:.4s;transform-style:preserve-3d;
}

.square.flipped .card-inner{transform:rotateY(180deg)}

.face{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;backface-visibility:hidden}

.front{transform:rotateY(180deg)}

.mini{width:100%;height:100%;background-size:cover}

.square.matched{box-shadow:inset 0 0 0 3px gold}

.controls{display:flex;justify-content:center}

.control-btn{
  width:52px;height:52px;border:none;background:var(--bg);color:#fff;
}

.footer-note{text-align:center;font-size:12px;margin-top:6px}
</style>
</head>
<body>

<h1>CHESSTACTICS</h1>

<div class="app">
  <div id="board-container"><div id="board"></div></div>

  <div class="controls-panel">
    <div class="controls">
      <button class="control-btn" id="restartBtn">🔄</button>
    </div>
  </div>

  <div class="footer-note">Jeu imaginé par Luis et créé par ChatGPT</div>
</div>

<script>
const boardEl=document.getElementById("board");
const restartBtn=document.getElementById("restartBtn");

const FILES=["a","b","c","d","e","f","g","h"];
const PIECES={"P":"♙","N":"♘","B":"♗","R":"♖","Q":"♕","K":"♔","p":"♟","n":"♞","b":"♝","r":"♜","q":"♛","k":"♚"};

const TACTIC_CARDS=[
{pairId:"fork",pieces:[["e5","N"],["d7","q"],["f7","r"],["g1","K"],["g8","k"]]},
{pairId:"fork",pieces:[["d6","n"],["c4","Q"],["e4","R"],["b1","K"],["g8","k"]]},
{pairId:"pin",pieces:[["b5","B"],["c6","n"],["e8","k"],["g1","K"]]},
{pairId:"pin",pieces:[["g5","b"],["f4","N"],["e3","K"],["c1","k"]]},
{pairId:"mate1",pieces:[["g7","Q"],["h6","K"],["g8","k"]]},
{pairId:"mate1",pieces:[["b7","q"],["a6","k"],["b1","K"]]},
{pairId:"skewer",pieces:[["c4","B"],["d5","q"],["e6","k"],["g1","K"]]},
{pairId:"skewer",pieces:[["h5","b"],["g4","Q"],["f3","K"],["a8","k"]]}
];

let squares=[],picks=[],lock=false,matched=0,totalPairs=4;

function shuffle(a){return a.sort(()=>Math.random()-0.5)}

function squareToCoords(s){return{file:FILES.indexOf(s[0]),rank:+s[1]-1}}

function mini(card){
 let svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">';
 for(let r=0;r<8;r++)for(let c=0;c<8;c++){
  let f=(r+c)%2?"#769656":"#eeeed2";
  svg+=`<rect x="${c*20}" y="${r*20}" width="20" height="20" fill="${f}"/>`
 }
 card.pieces.forEach(([sq,p])=>{
  let {file,rank}=squareToCoords(sq)
  svg+=`<text x="${file*20+10}" y="${(7-rank)*20+15}" font-size="18" text-anchor="middle">${PIECES[p]}</text>`
 })
 svg+='</svg>'
 return `url("data:image/svg+xml;utf8,${encodeURIComponent(svg)}")`
}

function createBoard(){
 let deck=shuffle(TACTIC_CARDS.map((c,i)=>({...c,image:mini(c),state:"hidden",uid:i})))
 squares=Array(64).fill({empty:true})
 let pos=[1,3,5,7,8,10,12,14,17,19,21,23,24,26,28,30]
 pos.forEach((p,i)=>squares[p]=deck[i])
 render()
}

function render(){
 boardEl.innerHTML=""
 for(let i=0;i<64;i++){
  let d=squares[i]||{empty:true}
  let sq=document.createElement("div")
  sq.className="square "+((Math.floor(i/8)+i%8)%2?"black":"white")
  if(!d.empty&&(d.state==="revealed"||d.state==="matched"))sq.classList.add("flipped")
  if(d.state==="matched")sq.classList.add("matched")

  if(!d.empty){
   let b=document.createElement("button")
   b.className="card"
   b.onclick=()=>click(i)
   b.innerHTML=`<div class="card-inner">
   <div class="face"></div>
   <div class="face front"><div class="mini" style="background-image:${d.image}"></div></div>
   </div>`
   sq.appendChild(b)
  }
  boardEl.appendChild(sq)
 }
}

function click(i){
 if(lock)return
 let c=squares[i]
 if(!c||c.empty||c.state!=="hidden")return
 c.state="revealed"
 picks.push(i)
 render()

 if(picks.length<2)return
 lock=true
 let [a,b]=picks.map(i=>squares[i])

 if(a.pairId===b.pairId){
  a.state=b.state="matched"
  matched++;picks=[];lock=false;render()
  return
 }

 setTimeout(()=>{
  a.state=b.state="hidden"
  picks=[];lock=false;render()
 },700)
}

restartBtn.onclick=createBoard
createBoard()
</script>

</body>
</html>
