<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>COLOR BOWLS</title>

<meta name="theme-color" content="#42c8ff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="COLOR BOWLS" />

<link rel="apple-touch-icon" href="icon.png" />
<link rel="icon" type="image/png" href="icon.png" />

<style>
:root{
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
  --safe-left: env(safe-area-inset-left);
  --safe-right: env(safe-area-inset-right);
  --text:#fff;
  --glass:rgba(255,255,255,.16);
  --glass-strong:rgba(255,255,255,.22);
  --line:rgba(255,255,255,.24);
  --shadow:0 18px 40px rgba(0,0,0,.22);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",sans-serif;
  background:
    radial-gradient(circle at 18% 16%, #fff06a 0%, rgba(255,240,106,0) 20%),
    radial-gradient(circle at 85% 18%, #7b6dff 0%, rgba(123,109,255,0) 24%),
    radial-gradient(circle at 78% 82%, #5ff8cf 0%, rgba(95,248,207,0) 22%),
    linear-gradient(145deg, #3ab5ff 0%, #8e5bff 48%, #ff5ea8 100%);
}
body{color:var(--text)}
body::before,
body::after{
  content:"";
  position:fixed;
  inset:auto;
  border-radius:50%;
  filter:blur(42px);
  opacity:.34;
  pointer-events:none;
}
body::before{
  width:42vw;height:42vw;left:-8vw;bottom:6vh;background:#62fff0;
}
body::after{
  width:38vw;height:38vw;right:-8vw;top:8vh;background:#ffdf57;
}

.game{
  position:fixed;
  inset:0;
}

.board{
  position:absolute;
  inset:0;
  overflow:hidden;
  touch-action:manipulation;
}

.topLayer{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.header{
  position:absolute;
  top:calc(10px + var(--safe-top));
  left:calc(10px + var(--safe-left));
  right:calc(10px + var(--safe-right));
  display:grid;
  grid-template-columns:minmax(0,1fr) auto auto;
  gap:10px;
  align-items:start;
  pointer-events:none;
}

.brand,
.counter,
.footerBar,
.endCard{
  background:var(--glass);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px) saturate(1.15);
  -webkit-backdrop-filter:blur(18px) saturate(1.15);
}

.brand{
  border-radius:28px;
  padding:14px 16px 12px;
}

h1{
  margin:0;
  font-size:clamp(26px,8vw,44px);
  line-height:.92;
  letter-spacing:.08em;
  font-weight:1000;
}
.sub{
  margin-top:5px;
  font-size:11px;
  line-height:1.15;
  letter-spacing:.14em;
  font-weight:900;
  opacity:.95;
}

.counter{
  min-width:94px;
  padding:10px 10px 9px;
  border-radius:24px;
  text-align:center;
}
.counter .label{
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:.14em;
  font-weight:900;
  opacity:.9;
}
.counter .value{
  margin-top:4px;
  font-size:24px;
  line-height:1;
  font-weight:1000;
}

.footerWrap{
  position:absolute;
  left:calc(10px + var(--safe-left));
  right:calc(10px + var(--safe-right));
  bottom:calc(10px + var(--safe-bottom));
  pointer-events:none;
}
.footerBar{
  border-radius:26px;
  padding:10px;
  display:grid;
  grid-template-columns:minmax(0,1fr) auto auto;
  gap:10px;
  align-items:center;
  pointer-events:auto;
}
.info{
  min-width:0;
  padding:4px 6px;
  font-size:14px;
  line-height:1.2;
  font-weight:800;
}
.btn{
  appearance:none;
  border:none;
  border-radius:20px;
  min-width:86px;
  padding:14px 16px;
  font-size:15px;
  font-weight:1000;
  cursor:pointer;
  box-shadow:var(--shadow);
}
.btn.primary{
  background:rgba(255,255,255,.92);
  color:#1a2140;
}
.btn.secondary{
  background:var(--glass-strong);
  color:#fff;
  border:1px solid var(--line);
  backdrop-filter:blur(18px) saturate(1.15);
  -webkit-backdrop-filter:blur(18px) saturate(1.15);
}

.ball{
  position:absolute;
  border:none;
  border-radius:50%;
  transform:translate(-50%,-50%);
  box-shadow:
    inset -12px -18px 28px rgba(0,0,0,.14),
    inset 11px 13px 26px rgba(255,255,255,.34),
    0 12px 24px rgba(0,0,0,.2);
  transition:
    left .55s cubic-bezier(.22,.8,.18,1),
    top .55s cubic-bezier(.22,.8,.18,1),
    transform .14s ease,
    filter .2s ease;
  cursor:pointer;
}
.ball::before{
  content:"";
  position:absolute;
  width:42%;
  height:28%;
  left:18%;
  top:16%;
  border-radius:50%;
  background:rgba(255,255,255,.36);
  filter:blur(1px);
  transform:rotate(-16deg);
}
.ball:active{
  transform:translate(-50%,-50%) scale(.92);
}
.ball.hint{ animation:hintPulse 1s ease-in-out infinite; }
.ball.wrong{ animation:wrongShake .34s ease; }
.ball.pop{
  animation:dropBurst .52s cubic-bezier(.18,.8,.22,1) forwards;
  pointer-events:none;
}

.particle{
  position:absolute;
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  animation:particle .72s ease-out forwards;
}

.endOverlay{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:rgba(13,18,40,.14);
  pointer-events:auto;
}
.endOverlay.show{display:flex}
.endCard{
  width:min(92vw,520px);
  border-radius:34px;
  padding:24px 20px 20px;
  text-align:center;
}
.endMini{
  font-size:12px;
  letter-spacing:.14em;
  text-transform:uppercase;
  font-weight:900;
  opacity:.95;
}
.endCard h2{
  margin:8px 0 10px;
  font-size:clamp(28px,8vw,42px);
  line-height:.95;
}
.endTime{
  font-size:clamp(52px,15vw,86px);
  line-height:.92;
  font-weight:1000;
  margin:10px 0;
}
.endText{
  font-size:17px;
  line-height:1.25;
  font-weight:800;
}
.endActions{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:18px;
}

@keyframes dropBurst{
  0%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  30%{opacity:1;transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy1))) scale(1.08)}
  100%{opacity:0;transform:translate(calc(-50% + var(--dx2)), calc(-50% + var(--dy2))) scale(.18)}
}
@keyframes particle{
  0%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(.1)}
}
@keyframes wrongShake{
  0%,100%{transform:translate(-50%,-50%)}
  20%{transform:translate(calc(-50% - 7px),-50%)}
  40%{transform:translate(calc(-50% + 7px),-50%)}
  60%{transform:translate(calc(-50% - 5px),-50%)}
  80%{transform:translate(calc(-50% + 5px),-50%)}
}
@keyframes hintPulse{
  0%,100%{filter:none}
  50%{filter:drop-shadow(0 0 16px rgba(255,255,255,.72))}
}

@media (max-width: 760px){
  .header{grid-template-columns:minmax(0,1fr) 92px 92px}
  .footerBar{grid-template-columns:minmax(0,1fr) 82px 92px}
  .btn{min-width:0;padding:14px 12px}
}
</style>
</head>
<body>
<div class="game">
  <div class="board" id="board"></div>

  <div class="topLayer">
    <div class="header">
      <div class="brand">
        <h1>COLOR BOWLS</h1>
        <div class="sub">TOUCHE UNE COULEUR MAJORITAIRE</div>
      </div>

      <div class="counter">
        <div class="label">Chrono</div>
        <div class="value" id="timer">00:00</div>
      </div>

      <div class="counter">
        <div class="label">Record</div>
        <div class="value" id="best">--:--</div>
      </div>
    </div>

    <div class="footerWrap">
      <div class="footerBar">
        <div class="info" id="info">Trouve une couleur majoritaire.</div>
        <button class="btn secondary" id="hintBtn">AIDE</button>
        <button class="btn primary" id="restartBtn">REJOUER</button>
      </div>
    </div>

    <div class="endOverlay" id="endOverlay">
      <div class="endCard">
        <div class="endMini">Partie terminée</div>
        <h2>COLOR BOWLS</h2>
        <div class="endTime" id="endTime">00:00</div>
        <div class="endText" id="endText">Bravo.</div>
        <div class="endActions">
          <button class="btn primary" id="playAgainBtn">REJOUER</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const COLORS = [
    {name:"jaune", base:"#ffd835", shadow:"#ffb800"},
    {name:"turquoise", base:"#16ebc2", shadow:"#05bfa0"},
    {name:"orange", base:"#ff8437", shadow:"#ff5f00"},
    {name:"violet", base:"#b76aff", shadow:"#8d39f6"},
    {name:"rose", base:"#ff5fab", shadow:"#ff2b87"},
    {name:"bleu", base:"#5dabff", shadow:"#2f7dff"}
  ];

  const STORAGE_BEST = 'color-bowls-best-ms-v2';

  const board = document.getElementById('board');
  const timerEl = document.getElementById('timer');
  const bestEl = document.getElementById('best');
  const infoEl = document.getElementById('info');
  const hintBtn = document.getElementById('hintBtn');
  const restartBtn = document.getElementById('restartBtn');
  const endOverlay = document.getElementById('endOverlay');
  const endTimeEl = document.getElementById('endTime');
  const endTextEl = document.getElementById('endText');
  const playAgainBtn = document.getElementById('playAgainBtn');

  let state = null;
  let timerId = null;
  let startTs = 0;
  let bestMs = Number(localStorage.getItem(STORAGE_BEST) || 0);

  function fmt(ms){
    const total = Math.max(0, Math.floor(ms / 1000));
    const m = String(Math.floor(total / 60)).padStart(2, '0');
    const s = String(total % 60).padStart(2, '0');
    return `${m}:${s}`;
  }

  function updateBest(){
    bestEl.textContent = bestMs ? fmt(bestMs) : '--:--';
  }
  updateBest();

  function rect(){
    return board.getBoundingClientRect();
  }

  function buildWeightedPool(targetCount){
    const dominant = [0,1,2,3].sort(() => Math.random() - 0.5).slice(0,3);
    const counts = [
      Math.floor(targetCount * 0.21),
      Math.floor(targetCount * 0.21),
      Math.floor(targetCount * 0.18),
      Math.floor(targetCount * 0.14),
      Math.floor(targetCount * 0.13),
      0
    ];
    counts[dominant[0]] += 4;
    counts[dominant[1]] += 4;
    counts[dominant[2]] += 2;
    let used = counts.reduce((a,b)=>a+b,0);
    while(used < targetCount){
      counts[Math.floor(Math.random() * COLORS.length)]++;
      used++;
    }
    const pool = [];
    counts.forEach((n, i) => {
      for(let k=0;k<n;k++) pool.push(i);
    });
    return pool.sort(() => Math.random() - 0.5);
  }

  function generateLevel(){
    const r = rect();
    const w = Math.max(320, r.width);
    const h = Math.max(560, r.height);

    const targetCount = w < 430 ? 78 : 108;
    const cols = w < 430 ? 7 : 9;
    const rows = Math.ceil(targetCount / cols);

    const topReserved = Math.max(96, h * 0.14);
    const bottomReserved = Math.max(96, h * 0.14);
    const usableTop = topReserved;
    const usableBottom = h - bottomReserved;
    const usableH = usableBottom - usableTop;
    const cellW = w / cols;
    const cellH = usableH / rows;
    const baseSize = Math.max(34, Math.min(cellW, cellH) * 0.94);

    const pool = buildWeightedPool(targetCount);
    const balls = [];

    for(let i = 0; i < targetCount; i++){
      const c = i % cols;
      const row = Math.floor(i / cols);
      const size = baseSize * (0.9 + Math.random() * 0.22);
      const jitterX = (Math.random() - 0.5) * cellW * 0.55;
      const jitterY = (Math.random() - 0.5) * cellH * 0.5;
      const x = c * cellW + cellW / 2 + jitterX;
      const y = usableTop + row * cellH + cellH / 2 + jitterY;
      const colorIndex = pool[i % pool.length];
      balls.push({
        id: `b_${Date.now()}_${i}_${Math.random().toString(36).slice(2,6)}`,
        colorIndex,
        color: COLORS[colorIndex],
        x, y,
        size,
        el:null
      });
    }

    return { balls, started:false, finished:false };
  }

  function counts(){
    const map = new Map();
    for(const b of state.balls){
      map.set(b.colorIndex, (map.get(b.colorIndex) || 0) + 1);
    }
    return map;
  }

  function majorities(){
    const map = counts();
    let max = 0;
    for(const value of map.values()) max = Math.max(max, value);
    const winners = [];
    for(const [k,v] of map.entries()) if(v === max) winners.push(k);
    return { winners, max };
  }

  function ballStyle(ball){
    return `
      width:${ball.size}px;
      height:${ball.size}px;
      left:${ball.x}px;
      top:${ball.y}px;
      z-index:${Math.round(ball.y)};
      background:
        radial-gradient(circle at 32% 28%, rgba(255,255,255,.68), rgba(255,255,255,.18) 23%, transparent 28%),
        radial-gradient(circle at 45% 42%, ${ball.color.base} 0%, ${ball.color.base} 58%, ${ball.color.shadow} 100%);
    `;
  }

  function render(){
    board.innerHTML = '';
    for(const b of state.balls){
      const el = document.createElement('button');
      el.className = 'ball';
      el.style.cssText = ballStyle(b);
      el.dataset.id = b.id;
      el.dataset.colorIndex = String(b.colorIndex);
      el.setAttribute('aria-label', b.color.name);
      el.addEventListener('click', onBallClick, { passive:true });
      b.el = el;
      board.appendChild(el);
    }
    refreshInfo();
  }

  function refreshInfo(){
    if(!state || state.finished) return;
    const { winners, max } = majorities();
    const names = winners.map(i => COLORS[i].name.toUpperCase()).join(' / ');
    infoEl.innerHTML = `Majoritaire : <strong>${names}</strong> · <strong>${max}</strong>`;
  }

  function clearHints(){
    board.querySelectorAll('.ball.hint').forEach(el => el.classList.remove('hint'));
  }

  function showHints(){
    if(!state || state.finished) return;
    clearHints();
    const { winners } = majorities();
    board.querySelectorAll('.ball').forEach(el => {
      if(winners.includes(Number(el.dataset.colorIndex))) el.classList.add('hint');
    });
    setTimeout(clearHints, 1300);
  }

  function startTimer(){
    if(state.started) return;
    state.started = true;
    startTs = performance.now();
    timerId = setInterval(() => {
      timerEl.textContent = fmt(performance.now() - startTs);
    }, 100);
  }

  function stopTimer(){
    if(timerId){
      clearInterval(timerId);
      timerId = null;
    }
  }

  function compactLayout(){
    const r = rect();
    const w = Math.max(320, r.width);
    const h = Math.max(560, r.height);
    const n = state.balls.length;
    if(!n) return;

    const topReserved = Math.max(96, h * 0.14);
    const bottomReserved = Math.max(96, h * 0.14);
    const usableTop = topReserved;
    const usableBottom = h - bottomReserved;
    const usableH = usableBottom - usableTop;

    let cols;
    if(n <= 1) cols = 1;
    else if(n <= 4) cols = 2;
    else if(n <= 9) cols = 3;
    else if(n <= 16) cols = 4;
    else if(n <= 25) cols = 5;
    else cols = w < 430 ? 6 : 8;

    const rows = Math.ceil(n / cols);
    const cellW = w / cols;
    const cellH = usableH / rows;
    const baseSize = Math.min(118, Math.max(36, Math.min(cellW, cellH) * 0.88));

    state.balls.forEach((b, i) => {
      const c = i % cols;
      const row = Math.floor(i / cols);
      b.size = baseSize;
      b.x = c * cellW + cellW / 2;
      b.y = usableTop + row * cellH + cellH / 2;
    });
  }

  function explodeColor(colorIndex){
    const doomed = state.balls.filter(b => b.colorIndex === colorIndex);
    const survivors = state.balls.filter(b => b.colorIndex !== colorIndex);
    const r = rect();

    doomed.forEach(b => {
      const el = b.el;
      if(!el) return;
      el.style.setProperty('--dx', `${(Math.random()*80 - 40).toFixed(1)}px`);
      el.style.setProperty('--dy1', `${(Math.random()*40 - 10).toFixed(1)}px`);
      el.style.setProperty('--dx2', `${(Math.random()*180 - 90).toFixed(1)}px`);
      el.style.setProperty('--dy2', `${(r.height + b.size + 130 + Math.random()*140).toFixed(1)}px`);
      el.classList.add('pop');

      for(let i=0;i<7;i++){
        const p = document.createElement('div');
        p.className = 'particle';
        const size = 8 + Math.random() * 12;
        p.style.width = `${size}px`;
        p.style.height = `${size}px`;
        p.style.left = `${b.x}px`;
        p.style.top = `${b.y}px`;
        p.style.background = `radial-gradient(circle at 35% 35%, rgba(255,255,255,.94), ${b.color.base} 58%, ${b.color.shadow} 100%)`;
        p.style.setProperty('--tx', `${(Math.random()*170 - 85).toFixed(1)}px`);
        p.style.setProperty('--ty', `${(Math.random()*170 - 80).toFixed(1)}px`);
        board.appendChild(p);
        setTimeout(() => p.remove(), 760);
      }
    });

    if(navigator.vibrate){
      navigator.vibrate(doomed.length >= 5 ? [18, 18, 45] : 18);
    }

    setTimeout(() => {
      state.balls = survivors;
      compactLayout();
      render();
      if(state.balls.length <= 1){
        finishGame();
      }
    }, 520);
  }

  function onBallClick(e){
    if(!state || state.finished) return;
    const colorIndex = Number(e.currentTarget.dataset.colorIndex);
    const { winners } = majorities();

    if(!winners.includes(colorIndex)){
      e.currentTarget.classList.add('wrong');
      setTimeout(() => e.currentTarget.classList.remove('wrong'), 360);
      infoEl.innerHTML = `Non. Choisis une couleur <strong>majoritaire</strong>.`;
      if(navigator.vibrate) navigator.vibrate(40);
      return;
    }

    startTimer();
    clearHints();
    explodeColor(colorIndex);
  }

  function finishGame(){
    state.finished = true;
    stopTimer();
    const elapsed = Math.floor(performance.now() - startTs);
    timerEl.textContent = fmt(elapsed);
    endTimeEl.textContent = fmt(elapsed);

    let isBest = false;
    if(!bestMs || elapsed < bestMs){
      bestMs = elapsed;
      localStorage.setItem(STORAGE_BEST, String(bestMs));
      updateBest();
      isBest = true;
    }

    endTextEl.innerHTML = isBest
      ? 'Nouveau <strong>meilleur chrono</strong> !'
      : 'Bravo. Essaie d’aller encore plus vite.';

    endOverlay.classList.add('show');
  }

  function newGame(){
    stopTimer();
    timerEl.textContent = '00:00';
    endOverlay.classList.remove('show');
    state = generateLevel();
    render();
  }

  hintBtn.addEventListener('click', showHints);
  restartBtn.addEventListener('click', newGame);
  playAgainBtn.addEventListener('click', newGame);

  window.addEventListener('resize', () => {
    if(!state || state.finished) return;
    compactLayout();
    render();
  }, { passive:true });

  newGame();
})();
</script>
</body>
</html>
