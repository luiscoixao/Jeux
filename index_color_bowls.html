<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>COLOR BOWLS</title>

<meta name="theme-color" content="#42c8ff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="COLOR BOWLS" />

<link rel="apple-touch-icon" href="icon.png" />
<link rel="icon" type="image/png" href="icon.png" />

<style>
:root{
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
  --safe-left: env(safe-area-inset-left);
  --safe-right: env(safe-area-inset-right);
  --text:#fff;
  --glass:rgba(255,255,255,.18);
  --glass-strong:rgba(255,255,255,.94);
  --line:rgba(255,255,255,.24);
  --shadow:0 18px 40px rgba(0,0,0,.22);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",sans-serif;
  background:
    radial-gradient(circle at 12% 14%, #fff06a 0%, rgba(255,240,106,0) 18%),
    radial-gradient(circle at 86% 16%, #7b6dff 0%, rgba(123,109,255,0) 24%),
    radial-gradient(circle at 80% 82%, #5ff8cf 0%, rgba(95,248,207,0) 22%),
    radial-gradient(circle at 22% 82%, #ff7fbe 0%, rgba(255,127,190,0) 24%),
    linear-gradient(145deg, #31b6ff 0%, #7d5dff 44%, #ff4e9e 100%);
}
body{color:var(--text)}
body::before,
body::after{
  content:"";
  position:fixed;
  border-radius:50%;
  filter:blur(44px);
  opacity:.36;
  pointer-events:none;
}
body::before{
  width:42vw;height:42vw;left:-10vw;bottom:2vh;background:#62fff0;
}
body::after{
  width:40vw;height:40vw;right:-10vw;top:4vh;background:#ffdf57;
}

.game,
.board,
.overlay,
.endOverlay{
  position:fixed;
  inset:0;
}
.board{
  overflow:hidden;
  touch-action:manipulation;
}
.overlay{pointer-events:none}

.topBar{
  position:absolute;
  top:calc(10px + var(--safe-top));
  left:calc(10px + var(--safe-left));
  right:calc(10px + var(--safe-right));
  display:grid;
  grid-template-columns:minmax(0,1fr) auto auto auto auto;
  gap:8px;
  align-items:start;
}

.titleWrap{
  min-width:0;
  padding:4px 2px;
}
.title{
  margin:0;
  font-size:clamp(28px,8vw,48px);
  line-height:.9;
  letter-spacing:.1em;
  font-weight:1000;
  text-shadow:0 10px 20px rgba(0,0,0,.22);
}

.pill,
.controlBtn,
.endCard{
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px) saturate(1.15);
  -webkit-backdrop-filter:blur(18px) saturate(1.15);
}
.pill{
  min-width:84px;
  background:var(--glass);
  border-radius:22px;
  padding:10px 10px 9px;
  text-align:center;
  pointer-events:auto;
}
.pill .label{
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:.14em;
  font-weight:900;
  opacity:.94;
}
.pill .value{
  margin-top:4px;
  font-size:22px;
  line-height:1;
  font-weight:1000;
}
.controlBtn{
  appearance:none;
  border-radius:22px;
  min-width:96px;
  padding:14px 16px;
  font-size:14px;
  line-height:1;
  font-weight:1000;
  background:var(--glass-strong);
  color:#1a2140;
  pointer-events:auto;
}

.ruleText{
  position:absolute;
  top:calc(80px + var(--safe-top));
  left:calc(12px + var(--safe-left));
  right:calc(12px + var(--safe-right));
  text-align:center;
  font-size:13px;
  line-height:1.2;
  font-weight:900;
  letter-spacing:.08em;
  text-shadow:0 8px 18px rgba(0,0,0,.18);
  opacity:.96;
}

.ball{
  position:absolute;
  border:none;
  border-radius:50%;
  transform:translate(-50%,-50%);
  box-shadow:
    inset -12px -18px 28px rgba(0,0,0,.14),
    inset 11px 13px 26px rgba(255,255,255,.34),
    0 14px 26px rgba(0,0,0,.2);
  transition:
    left .55s cubic-bezier(.22,.8,.18,1),
    top .55s cubic-bezier(.22,.8,.18,1),
    transform .14s ease,
    filter .2s ease,
    opacity .25s ease;
  cursor:pointer;
}
.ball::before{
  content:"";
  position:absolute;
  width:42%;
  height:28%;
  left:18%;
  top:16%;
  border-radius:50%;
  background:rgba(255,255,255,.36);
  filter:blur(1px);
  transform:rotate(-16deg);
}
.ball:active{transform:translate(-50%,-50%) scale(.92)}
.ball.wrong{ animation:wrongShake .34s ease; }
.ball.pop{
  animation:dropBurst .52s cubic-bezier(.18,.8,.22,1) forwards;
  pointer-events:none;
}
.ball.majorityMark{filter:drop-shadow(0 0 18px rgba(255,255,255,.55))}

.particle{
  position:absolute;
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  animation:particle .72s ease-out forwards;
}

.endOverlay{
  display:none;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:rgba(13,18,40,.12);
}
.endOverlay.show{display:flex}
.endCard{
  width:min(90vw,520px);
  background:rgba(255,255,255,.18);
  border-radius:34px;
  padding:24px 20px 20px;
  text-align:center;
}
.endMini{
  font-size:12px;
  letter-spacing:.14em;
  text-transform:uppercase;
  font-weight:900;
  opacity:.95;
}
.endCard h2{
  margin:8px 0 10px;
  font-size:clamp(28px,8vw,42px);
  line-height:.95;
}
.endTime{
  font-size:clamp(52px,15vw,86px);
  line-height:.92;
  font-weight:1000;
  margin:10px 0;
}
.endText{
  font-size:17px;
  line-height:1.25;
  font-weight:800;
}

@keyframes dropBurst{
  0%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  30%{opacity:1;transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy1))) scale(1.08)}
  100%{opacity:0;transform:translate(calc(-50% + var(--dx2)), calc(-50% + var(--dy2))) scale(.18)}
}
@keyframes particle{
  0%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(.1)}
}
@keyframes wrongShake{
  0%,100%{transform:translate(-50%,-50%)}
  20%{transform:translate(calc(-50% - 7px),-50%)}
  40%{transform:translate(calc(-50% + 7px),-50%)}
  60%{transform:translate(calc(-50% - 5px),-50%)}
  80%{transform:translate(calc(-50% + 5px),-50%)}
}

@media (max-width:760px){
  .topBar{grid-template-columns:minmax(0,1fr) 74px 74px 74px 98px}
  .pill{min-width:0}
  .controlBtn{min-width:0;padding:14px 12px}
  .ruleText{top:calc(84px + var(--safe-top));font-size:12px}
}
</style>
</head>
<body>
<div class="game">
  <div class="board" id="board"></div>

  <div class="overlay">
    <div class="topBar">
      <div class="titleWrap">
        <h1 class="title">COLOR BOWLS</h1>
      </div>

      <div class="pill">
        <div class="label">Niveau</div>
        <div class="value" id="levelValue">1</div>
      </div>

      <div class="pill">
        <div class="label">Chrono</div>
        <div class="value" id="timer">00:00</div>
      </div>

      <div class="pill">
        <div class="label">Record</div>
        <div class="value" id="bestValue">--:--</div>
      </div>

      <button class="controlBtn" id="toggleBtn">ARRÊTER</button>
    </div>

    <div class="ruleText">Touchez l’une des couleurs les plus nombreuses.</div>
  </div>

  <div class="endOverlay" id="endOverlay">
    <div class="endCard">
      <div class="endMini">Série terminée</div>
      <h2>COLOR BOWLS</h2>
      <div class="endTime" id="endTime">00:00</div>
      <div class="endText" id="endText">Bravo.</div>
    </div>
  </div>
</div>

<script>
(() => {
  const COLORS = [
    {name:"jaune", base:"#ffd835", shadow:"#ffb800"},
    {name:"turquoise", base:"#16ebc2", shadow:"#05bfa0"},
    {name:"orange", base:"#ff8437", shadow:"#ff5f00"},
    {name:"violet", base:"#b76aff", shadow:"#8d39f6"},
    {name:"rose", base:"#ff5fab", shadow:"#ff2b87"},
    {name:"bleu", base:"#5dabff", shadow:"#2f7dff"}
  ];

  const MAX_LEVEL = 100;
  const STORAGE_BEST = 'color-bowls-best-series-ms-v3';

  const board = document.getElementById('board');
  const timerEl = document.getElementById('timer');
  const levelValueEl = document.getElementById('levelValue');
  const toggleBtn = document.getElementById('toggleBtn');
  const bestValueEl = document.getElementById('bestValue');
  const endOverlay = document.getElementById('endOverlay');
  const endTimeEl = document.getElementById('endTime');
  const endTextEl = document.getElementById('endText');

  let state = null;
  let timerId = null;
  let startTs = 0;
  let bestMs = Number(localStorage.getItem(STORAGE_BEST) || 0);

  function updateBest(){
    bestValueEl.textContent = bestMs ? fmt(bestMs) : '--:--';
  }
  updateBest();

  function fmt(ms){
    const total = Math.max(0, Math.floor(ms / 1000));
    const m = String(Math.floor(total / 60)).padStart(2, '0');
    const s = String(total % 60).padStart(2, '0');
    return `${m}:${s}`;
  }

  function rect(){
    return board.getBoundingClientRect();
  }

  function levelBallCount(level, width){
    const mobile = width < 430;
    const min = mobile ? 140 : 180;
    const max = mobile ? 220 : 290;
    return Math.round(min + ((max - min) * (level - 1) / (MAX_LEVEL - 1)));
  }

  function buildWeightedPool(targetCount){
    const dominantCount = 2 + Math.floor(Math.random() * 2);
    const dominant = [...Array(COLORS.length).keys()].sort(() => Math.random() - 0.5).slice(0, dominantCount);
    const counts = new Array(COLORS.length).fill(0);

    const main1 = Math.max(2, Math.floor(targetCount * 0.24));
    const main2 = Math.max(2, Math.floor(targetCount * 0.22));
    counts[dominant[0]] += main1;
    counts[dominant[1]] += main2;
    if(dominant[2] !== undefined) counts[dominant[2]] += Math.floor(targetCount * 0.16);

    let used = counts.reduce((a,b)=>a+b,0);
    while(used < targetCount){
      counts[Math.floor(Math.random() * COLORS.length)]++;
      used++;
    }

    const pool = [];
    counts.forEach((n, i) => {
      for(let k=0;k<n;k++) pool.push(i);
    });
    return pool.sort(() => Math.random() - 0.5);
  }

  function generateLevel(level){
    const r = rect();
    const w = Math.max(320, r.width);
    const h = Math.max(560, r.height);
    const targetCount = levelBallCount(level, w);

    const topReserved = Math.max(108, h * 0.18);
    const bottomReserved = Math.max(20, h * 0.03);
    const usableTop = topReserved;
    const usableBottom = h - bottomReserved;
    const usableH = usableBottom - usableTop;

    const rows = Math.max(11, Math.round(Math.sqrt(targetCount * (usableH / w)) * 1.04));
    const cols = Math.ceil(targetCount / rows);
    const cellW = w / cols;
    const cellH = usableH / rows;
    const baseSize = Math.max(20, Math.min(cellW, cellH) * 1.28);

    const pool = buildWeightedPool(targetCount);
    const balls = [];

    for(let i = 0; i < targetCount; i++){
      const c = i % cols;
      const row = Math.floor(i / cols);
      const size = baseSize * (0.9 + Math.random() * 0.28);
      const jitterX = (Math.random() - 0.5) * cellW * 0.9;
      const jitterY = (Math.random() - 0.5) * cellH * 0.9;
      const x = c * cellW + cellW / 2 + jitterX;
      const y = usableTop + row * cellH + cellH / 2 + jitterY;
      const colorIndex = pool[i % pool.length];
      balls.push({
        id: `b_${level}_${Date.now()}_${i}_${Math.random().toString(36).slice(2,6)}`,
        colorIndex,
        color: COLORS[colorIndex],
        x, y,
        size,
        el:null
      });
    }

    return {
      level,
      balls,
      running:true,
      finished:false,
      justWon:false
    };
  }

  function counts(){
    const map = new Map();
    for(const b of state.balls) map.set(b.colorIndex, (map.get(b.colorIndex) || 0) + 1);
    return map;
  }

  function majorities(){
    const map = counts();
    let max = 0;
    for(const value of map.values()) max = Math.max(max, value);
    const winners = [];
    for(const [k,v] of map.entries()) if(v === max) winners.push(k);
    return { winners, max };
  }

  function ballStyle(ball){
    return `
      width:${ball.size}px;
      height:${ball.size}px;
      left:${ball.x}px;
      top:${ball.y}px;
      z-index:${Math.round(ball.y)};
      background:
        radial-gradient(circle at 32% 28%, rgba(255,255,255,.68), rgba(255,255,255,.18) 23%, transparent 28%),
        radial-gradient(circle at 45% 42%, ${ball.color.base} 0%, ${ball.color.base} 58%, ${ball.color.shadow} 100%);
    `;
  }

  function render(){
    board.innerHTML = '';
    const majority = majorities().winners;
    for(const b of state.balls){
      const el = document.createElement('button');
      el.className = 'ball';
      if(state.balls.length <= 18 && majority.includes(b.colorIndex)) el.classList.add('majorityMark');
      el.style.cssText = ballStyle(b);
      el.dataset.id = b.id;
      el.dataset.colorIndex = String(b.colorIndex);
      el.setAttribute('aria-label', b.color.name);
      el.addEventListener('click', onBallClick, { passive:true });
      b.el = el;
      board.appendChild(el);
    }
    levelValueEl.textContent = `${state.level}`;
  }

  function startSeries(){
    stopTimer();
    startTs = performance.now();
    timerEl.textContent = '00:00';
    timerId = setInterval(() => {
      timerEl.textContent = fmt(performance.now() - startTs);
    }, 100);
    endOverlay.classList.remove('show');
    state = generateLevel(1);
    toggleBtn.textContent = 'ARRÊTER';
    render();
  }

  function stopTimer(){
    if(timerId){
      clearInterval(timerId);
      timerId = null;
    }
  }

  function stopSeries(manual = false){
    stopTimer();
    board.innerHTML = '';
    state = { level:1, balls:[], running:false, finished:manual };
    timerEl.textContent = '00:00';
    levelValueEl.textContent = '1';
    toggleBtn.textContent = 'JOUER';
    if(manual) endOverlay.classList.remove('show');
  }

  function compactLayout(){
    const r = rect();
    const w = Math.max(320, r.width);
    const h = Math.max(560, r.height);
    const n = state.balls.length;
    if(!n) return;

    const topReserved = Math.max(112, h * 0.18);
    const bottomReserved = Math.max(20, h * 0.03);
    const usableTop = topReserved;
    const usableBottom = h - bottomReserved;
    const usableH = usableBottom - usableTop;

    let cols;
    if(n <= 1) cols = 1;
    else if(n <= 4) cols = 2;
    else if(n <= 9) cols = 3;
    else if(n <= 16) cols = 4;
    else if(n <= 25) cols = 5;
    else if(n <= 36) cols = 6;
    else cols = w < 430 ? 7 : 9;

    const rows = Math.ceil(n / cols);
    const cellW = w / cols;
    const cellH = usableH / rows;
    const baseSize = Math.min(116, Math.max(24, Math.min(cellW, cellH) * 1.08));

    state.balls.forEach((b, i) => {
      const c = i % cols;
      const row = Math.floor(i / cols);
      b.size = baseSize;
      b.x = c * cellW + cellW / 2;
      b.y = usableTop + row * cellH + cellH / 2;
    });
  }

  function explodeColor(colorIndex){
    const doomed = state.balls.filter(b => b.colorIndex === colorIndex);
    const survivors = state.balls.filter(b => b.colorIndex !== colorIndex);
    const r = rect();

    doomed.forEach(b => {
      const el = b.el;
      if(!el) return;
      el.style.setProperty('--dx', `${(Math.random()*90 - 45).toFixed(1)}px`);
      el.style.setProperty('--dy1', `${(Math.random()*42 - 10).toFixed(1)}px`);
      el.style.setProperty('--dx2', `${(Math.random()*220 - 110).toFixed(1)}px`);
      el.style.setProperty('--dy2', `${(r.height + b.size + 130 + Math.random()*160).toFixed(1)}px`);
      el.classList.add('pop');

      for(let i=0;i<8;i++){
        const p = document.createElement('div');
        p.className = 'particle';
        const size = 8 + Math.random() * 12;
        p.style.width = `${size}px`;
        p.style.height = `${size}px`;
        p.style.left = `${b.x}px`;
        p.style.top = `${b.y}px`;
        p.style.background = `radial-gradient(circle at 35% 35%, rgba(255,255,255,.94), ${b.color.base} 58%, ${b.color.shadow} 100%)`;
        p.style.setProperty('--tx', `${(Math.random()*180 - 90).toFixed(1)}px`);
        p.style.setProperty('--ty', `${(Math.random()*180 - 80).toFixed(1)}px`);
        board.appendChild(p);
        setTimeout(() => p.remove(), 760);
      }
    });

    if(navigator.vibrate){
      navigator.vibrate(doomed.length >= 6 ? [18, 18, 50] : 18);
    }

    setTimeout(() => {
      state.balls = survivors;
      if(state.balls.length <= 1){
        nextLevelOrFinish();
        return;
      }
      compactLayout();
      render();
    }, 520);
  }

  function nextLevelOrFinish(){
    if(state.level >= MAX_LEVEL){
      finishSeries();
      return;
    }
    const nextLevel = state.level + 1;
    state = generateLevel(nextLevel);
    render();
  }

  function onBallClick(e){
    if(!state || !state.running || state.finished) return;
    const colorIndex = Number(e.currentTarget.dataset.colorIndex);
    const { winners } = majorities();

    if(!winners.includes(colorIndex)){
      e.currentTarget.classList.add('wrong');
      setTimeout(() => e.currentTarget.classList.remove('wrong'), 360);
      if(navigator.vibrate) navigator.vibrate(36);
      return;
    }

    explodeColor(colorIndex);
  }

  function finishSeries(){
    stopTimer();
    const elapsed = Math.floor(performance.now() - startTs);
    timerEl.textContent = fmt(elapsed);
    endTimeEl.textContent = fmt(elapsed);

    let isBest = false;
    if(!bestMs || elapsed < bestMs){
      bestMs = elapsed;
      localStorage.setItem(STORAGE_BEST, String(bestMs));
      updateBest();
      isBest = true;
    }

    endTextEl.innerHTML = isBest
      ? 'Série 1 à 100 terminée. <strong>Nouveau meilleur chrono</strong>.'
      : 'Série 1 à 100 terminée. Touchez <strong>JOUER</strong> pour recommencer.';

    endOverlay.classList.add('show');
    toggleBtn.textContent = 'JOUER';
    state.running = false;
    state.finished = true;
  }

  toggleBtn.addEventListener('click', () => {
    if(!state || !state.running){
      startSeries();
    }else{
      stopSeries(true);
    }
  });

  window.addEventListener('resize', () => {
    if(!state || !state.running || state.finished || !state.balls.length) return;
    compactLayout();
    render();
  }, { passive:true });

  startSeries();
})();
</script>
</body>
</html>
