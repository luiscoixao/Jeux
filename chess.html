<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>La Dame Blanche</title>

<link rel="apple-touch-icon" href="icon.png">

<!-- PWA iPhone -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2c2c2c">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #2c2c2c;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Titre */
h1 {
  margin-top: 40px;
  margin-bottom: 10px;
  font-size: 28px;
}

/* Échiquier */
#board-container {
  width: 95vw;
  max-width: 500px;
  aspect-ratio: 1;
}

#board {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  width: 100%;
  height: 100%;
}

.square {
  position: relative;
}

.square-content {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.white { background: #eeeed2; }
.black { background: #769656; }

.queen {
  font-size: 24px;
}

.correct { background: #a9d18e !important; }
.wrong { outline: 2px solid red; }

/* UI */
#target { margin-top: 15px; font-size: 22px; }
#info { margin-top: 10px; }

/* Boutons */
#controls {
  margin-top: 20px;
  display: flex;
  gap: 20px;
}

.control-btn {
  background: #3a3a3a;
  border-radius: 16px;
  padding: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.control-btn span {
  font-size: 26px;
}

#end {
  margin-top: 20px;
  text-align: center;
}
</style>
</head>

<body>

<h1>La Dame Blanche ♕</h1>

<div id="board-container">
  <div id="board"></div>
</div>

<div id="target">▶️ Appuie pour commencer</div>
<div id="info"></div>

<div id="controls">
  <div class="control-btn" id="playBtn" onclick="startGame()">
    <span>▶️</span>
  </div>

  <div class="control-btn" id="pauseBtn" onclick="togglePause()" style="display:none;">
    <span id="pauseIcon">⏸️</span>
  </div>

  <div class="control-btn" id="stopBtn" onclick="stopGame()" style="display:none;">
    <span>⏹️</span>
  </div>
</div>

<div id="end"></div>

<script>
const board = document.getElementById("board");
const targetDisplay = document.getElementById("target");
const infoDisplay = document.getElementById("info");
const endDisplay = document.getElementById("end");

const playBtn = document.getElementById("playBtn");
const pauseBtn = document.getElementById("pauseBtn");
const stopBtn = document.getElementById("stopBtn");

const letters = ['a','b','c','d','e','f','g','h'];

let target = "";
let score = 0;
let moves = 0;
let locked = false;

let running = false;
let paused = false;

const maxMoves = 10;

let startTime = 0;
let pausedTime = 0;
let pauseStart = 0;
let timerInterval;

/* Chrono */
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!running || paused) return;

    const elapsed = Math.floor((Date.now() - startTime - pausedTime)/1000);
    infoDisplay.innerText = "Temps : " + elapsed + "s | Score : " + moves + "/" + maxMoves;
  }, 300);
}

/* Démarrer */
function startGame() {
  running = true;
  paused = false;

  score = 0;
  moves = 0;
  pausedTime = 0;
  startTime = Date.now();

  playBtn.style.display = "none";
  pauseBtn.style.display = "flex";
  stopBtn.style.display = "flex";

  generateTarget();
  createBoard();
  startTimer();
}

/* Pause / reprise */
function togglePause() {
  if (!paused) {
    paused = true;
    pauseStart = Date.now();
    document.getElementById("pauseIcon").innerText = "▶️";
  } else {
    paused = false;
    pausedTime += Date.now() - pauseStart;
    document.getElementById("pauseIcon").innerText = "⏸️";
  }
}

/* Stop */
function stopGame() {
  running = false;
  clearInterval(timerInterval);

  playBtn.style.display = "flex";
  pauseBtn.style.display = "none";
  stopBtn.style.display = "none";

  targetDisplay.innerText = "▶️ Nouvelle partie ?";
  infoDisplay.innerText = "";
  endDisplay.innerText = "";
}

/* Position */
function generateTarget() {
  const col = letters[Math.floor(Math.random()*8)];
  const row = Math.floor(Math.random()*8) + 1;
  target = col + row;
  targetDisplay.innerText = target;
}

/* Échiquier (fix iPhone touch) */
function createBoard() {
  board.innerHTML = "";

  for (let row = 8; row >= 1; row--) {
    for (let col = 0; col < 8; col++) {

      const square = document.createElement("div");
      square.className = "square " + ((row + col)%2===0 ? "white":"black");

      const position = letters[col] + row;

      square.addEventListener("touchstart", (e) => {
        e.preventDefault();

        if (!running || paused || locked || moves >= maxMoves) return;

        if (position === target) {
          locked = true;

          square.innerHTML = "<div class='square-content'><span class='queen'>♕</span></div>";
          square.classList.add("correct");

          score++;
          moves++;

          setTimeout(() => {
            if (moves >= maxMoves) {
              endGame();
            } else {
              generateTarget();
              createBoard();
              locked = false;
            }
          }, 500);

        } else {
          square.classList.add("wrong");
          setTimeout(() => square.classList.remove("wrong"), 300);
        }
      });

      board.appendChild(square);
    }
  }
}

/* Fin */
function endGame() {
  running = false;
  clearInterval(timerInterval);

  const total = Math.floor((Date.now() - startTime - pausedTime)/1000);

  endDisplay.innerHTML =
    "🏁 Terminé<br>Score : " + score + "/" + maxMoves + "<br>Temps : " + total + "s";

  playBtn.style.display = "flex";
  pauseBtn.style.display = "none";
  stopBtn.style.display = "none";
}

/* Init */
createBoard();
</script>

</body>
</html>
