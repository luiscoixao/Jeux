<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>La Dame Blanche</title>

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2c2c2c">

<style>
:root {
  --bg: #2c2c2c;
  --light: #eeeed2;
  --dark: #769656;
  --ok: #a9d18e;
  --btn-bg: #353535;
  --text: #ffffff;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: env(safe-area-inset-bottom);
}

h1 {
  margin-top: calc(env(safe-area-inset-top) + 20px);
  margin-bottom: 12px;
  font-size: 28px;
  line-height: 1.1;
  font-weight: 700;
  text-align: center;
}

#board-container {
  width: 95vw;
  max-width: 500px;
  aspect-ratio: 1;
}

#board {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  width: 100%;
  height: 100%;
}

.square {
  position: relative;
  width: 100%;
  height: 100%;
}

.square-content {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.white { background: var(--light); }
.black { background: var(--dark); }

.queen {
  font-size: 24px;
  line-height: 1;
  display: block;
}

.correct {
  background: var(--ok) !important;
}

.wrong {
  outline: 2px solid red;
}

#target {
  margin-top: 18px;
  font-size: 22px;
  text-align: center;
  min-height: 32px;
}

#info {
  margin-top: 10px;
  font-size: 16px;
  text-align: center;
  min-height: 24px;
}

#controls {
  margin-top: 22px;
  display: flex;
  gap: 20px;
  justify-content: center;
  align-items: center;
  min-height: 92px;
}

.control-btn {
  width: 84px;
  height: 84px;
  border: none;
  border-radius: 22px;
  background: var(--btn-bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  box-shadow: none;
  outline: none;
}

.control-btn span {
  font-size: 30px;
  line-height: 1;
}

.control-btn:active {
  transform: scale(0.97);
}

#end {
  margin-top: 22px;
  font-size: 20px;
  text-align: center;
  min-height: 110px;
  line-height: 1.4;
}
</style>
</head>

<body>

<h1>La Dame Blanche ♕</h1>

<div id="board-container">
  <div id="board"></div>
</div>

<div id="target">▶️ Appuie pour commencer</div>
<div id="info"></div>

<div id="controls">
  <button class="control-btn" id="playBtn" type="button" onclick="startGame()">
    <span>▶️</span>
  </button>

  <button class="control-btn" id="pauseBtn" type="button" onclick="togglePause()" style="display:none;">
    <span id="pauseIcon">⏸️</span>
  </button>

  <button class="control-btn" id="stopBtn" type="button" onclick="stopGame()" style="display:none;">
    <span>⏹️</span>
  </button>
</div>

<div id="end"></div>

<script>
const board = document.getElementById("board");
const targetDisplay = document.getElementById("target");
const infoDisplay = document.getElementById("info");
const endDisplay = document.getElementById("end");

const playBtn = document.getElementById("playBtn");
const pauseBtn = document.getElementById("pauseBtn");
const stopBtn = document.getElementById("stopBtn");
const pauseIcon = document.getElementById("pauseIcon");

const letters = ["a","b","c","d","e","f","g","h"];

let target = "";
let score = 0;
let moves = 0;
let locked = false;

let running = false;
let paused = false;

const maxMoves = 10;

let startTime = 0;
let pausedTime = 0;
let pauseStart = 0;
let timerInterval = null;

function updateInfo() {
  if (!running) return;
  const elapsed = Math.floor((Date.now() - startTime - pausedTime) / 1000);
  infoDisplay.innerText = "Temps : " + elapsed + "s | Score : " + moves + "/" + maxMoves;
}

function startTimer() {
  clearInterval(timerInterval);
  updateInfo();
  timerInterval = setInterval(() => {
    if (!running || paused) return;
    updateInfo();
  }, 300);
}

function generateTarget() {
  const col = letters[Math.floor(Math.random() * 8)];
  const row = Math.floor(Math.random() * 8) + 1;
  target = col + row;
  targetDisplay.innerText = target;
}

function handleSquareTap(square, position) {
  if (!running || paused || locked || moves >= maxMoves) return;

  if (position === target) {
    locked = true;

    square.innerHTML = "<div class='square-content'><span class='queen'>♕</span></div>";
    square.classList.add("correct");

    score++;
    moves++;
    updateInfo();

    setTimeout(() => {
      if (moves >= maxMoves) {
        endGame();
      } else {
        generateTarget();
        createBoard();
        locked = false;
      }
    }, 500);
  } else {
    square.classList.add("wrong");
    setTimeout(() => square.classList.remove("wrong"), 300);
  }
}

function createBoard() {
  board.innerHTML = "";

  for (let row = 8; row >= 1; row--) {
    for (let col = 0; col < 8; col++) {
      const square = document.createElement("div");
      square.className = "square " + (((row + col) % 2 === 0) ? "white" : "black");

      const position = letters[col] + row;

      square.addEventListener("touchstart", (e) => {
        e.preventDefault();
        handleSquareTap(square, position);
      }, { passive: false });

      square.addEventListener("click", () => {
        handleSquareTap(square, position);
      });

      board.appendChild(square);
    }
  }
}

function startGame() {
  running = true;
  paused = false;
  locked = false;

  score = 0;
  moves = 0;
  pausedTime = 0;
  pauseStart = 0;
  startTime = Date.now();

  endDisplay.innerHTML = "";
  pauseIcon.innerText = "⏸️";

  playBtn.style.display = "none";
  pauseBtn.style.display = "flex";
  stopBtn.style.display = "flex";

  generateTarget();
  createBoard();
  startTimer();
}

function togglePause() {
  if (!running) return;

  if (!paused) {
    paused = true;
    pauseStart = Date.now();
    pauseIcon.innerText = "▶️";
  } else {
    paused = false;
    pausedTime += Date.now() - pauseStart;
    pauseIcon.innerText = "⏸️";
    updateInfo();
  }
}

function stopGame() {
  running = false;
  paused = false;
  locked = false;
  clearInterval(timerInterval);

  playBtn.style.display = "flex";
  pauseBtn.style.display = "none";
  stopBtn.style.display = "none";
  pauseIcon.innerText = "⏸️";

  targetDisplay.innerText = "▶️ Nouvelle partie ?";
  infoDisplay.innerText = "";
  endDisplay.innerText = "";
  createBoard();
}

function endGame() {
  running = false;
  paused = false;
  locked = false;
  clearInterval(timerInterval);

  const total = Math.floor((Date.now() - startTime - pausedTime) / 1000);

  endDisplay.innerHTML =
    "🏁 Terminé<br>" +
    "Score : " + score + "/" + maxMoves + "<br>" +
    "Temps : " + total + "s";

  playBtn.style.display = "flex";
  pauseBtn.style.display = "none";
  stopBtn.style.display = "none";
  pauseIcon.innerText = "⏸️";
}

createBoard();
</script>

</body>
</html>
