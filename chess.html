<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>La Dame Blanche</title>

<link rel="apple-touch-icon" href="icon.png">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #2c2c2c;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Titre ajusté */
h1 {
  margin-top: 40px;
  margin-bottom: 10px;
  font-size: 28px;
}

/* Échiquier */
#board-container {
  width: 95vw;
  max-width: 500px;
  aspect-ratio: 1;
}

#board {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  width: 100%;
  height: 100%;
}

/* Cases */
.square {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
}

.white { background: #eeeed2; }
.black { background: #769656; }

/* Feedback */
.correct { background: #a9d18e !important; }
.wrong { outline: 2px solid red; }

/* UI */
#target {
  margin-top: 15px;
  font-size: 22px;
}

#info {
  margin-top: 10px;
  font-size: 16px;
  opacity: 0.9;
}

#end {
  margin-top: 20px;
  font-size: 20px;
  text-align: center;
}
</style>
</head>

<body>

<h1>La Dame Blanche ♕</h1>

<div id="board-container">
  <div id="board"></div>
</div>

<div id="target"></div>
<div id="info"></div>
<div id="end"></div>

<script>
const board = document.getElementById("board");
const targetDisplay = document.getElementById("target");
const infoDisplay = document.getElementById("info");
const endDisplay = document.getElementById("end");

const letters = ['a','b','c','d','e','f','g','h'];

let target = "";
let score = 0;
let locked = false;
let moves = 0;
const maxMoves = 10;

let startTime = Date.now();
let timerInterval;

/* Chrono */
function startTimer() {
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    infoDisplay.innerText = "Temps : " + elapsed + "s | Score : " + moves + "/" + maxMoves;
  }, 500);
}

/* Génère position */
function generateTarget() {
  const col = letters[Math.floor(Math.random()*8)];
  const row = Math.floor(Math.random()*8) + 1;
  target = col + row;
  targetDisplay.innerText = target;
}

/* Création échiquier */
function createBoard() {
  board.innerHTML = "";

  for (let row = 8; row >= 1; row--) {
    for (let col = 0; col < 8; col++) {

      const square = document.createElement("div");
      square.classList.add("square");

      const isWhite = (row + col) % 2 === 0;
      square.classList.add(isWhite ? "white" : "black");

      const position = letters[col] + row;

      square.onclick = () => {
        if (locked || moves >= maxMoves) return;

        if (position === target) {
          locked = true;

          square.innerHTML = "♕";
          square.classList.add("correct");

          score++;
          moves++;

          setTimeout(() => {
            if (moves >= maxMoves) {
              endGame();
            } else {
              generateTarget();
              createBoard();
              locked = false;
            }
          }, 500);

        } else {
          square.classList.add("wrong");
          setTimeout(() => square.classList.remove("wrong"), 300);
        }
      };

      board.appendChild(square);
    }
  }
}

/* Fin de partie */
function endGame() {
  clearInterval(timerInterval);

  const totalTime = Math.floor((Date.now() - startTime) / 1000);

  endDisplay.innerHTML =
    "🏁 Terminé !<br>" +
    "Score : " + score + " / " + maxMoves + "<br>" +
    "Temps : " + totalTime + "s<br><br>" +
    "<button onclick='restart()'>Rejouer</button>";
}

/* Restart */
function restart() {
  score = 0;
  moves = 0;
  startTime = Date.now();
  endDisplay.innerHTML = "";
  generateTarget();
  createBoard();
  startTimer();
}

/* Init */
generateTarget();
createBoard();
startTimer();
</script>

</body>
</html>
