<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>La Dame Blanche</title>

<link rel="apple-touch-icon" href="icon.png">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #2c2c2c;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Titre */
h1 {
  margin: 20px 0 10px;
  font-size: 28px;
}

/* Échiquier plein largeur */
#board-container {
  width: 95vw;
  max-width: 500px;
  aspect-ratio: 1;
  position: relative;
}

#board {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  width: 100%;
  height: 100%;
}

/* Cases */
.square {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}

.white { background: #eeeed2; }
.black { background: #769656; }

/* Coordonnées */
.coord {
  position: absolute;
  font-size: 12px;
  opacity: 0.8;
}

.coord.bottom { bottom: 2px; }
.coord.left { left: 2px; }

/* Feedback */
.correct { background: #a9d18e !important; }
.wrong { outline: 2px solid red; }

/* UI */
#target {
  margin-top: 15px;
  font-size: 22px;
}

#score {
  margin-top: 5px;
  opacity: 0.7;
}
</style>
</head>

<body>

<h1>La Dame Blanche</h1>

<div id="board-container">
  <div id="board"></div>
</div>

<div id="target"></div>
<div id="score"></div>

<script>
const board = document.getElementById("board");
const targetDisplay = document.getElementById("target");
const scoreDisplay = document.getElementById("score");

const letters = ['a','b','c','d','e','f','g','h'];

let target = "";
let score = 0;
let locked = false;

/* Génère position */
function generateTarget() {
  const col = letters[Math.floor(Math.random()*8)];
  const row = Math.floor(Math.random()*8) + 1;
  target = col + row;
  targetDisplay.innerText = target;
}

/* Création échiquier */
function createBoard() {
  board.innerHTML = "";

  for (let row = 8; row >= 1; row--) {
    for (let col = 0; col < 8; col++) {

      const square = document.createElement("div");
      square.classList.add("square");

      const isWhite = (row + col) % 2 === 0;
      square.classList.add(isWhite ? "white" : "black");

      const position = letters[col] + row;

      /* Coordonnées */
      if (row === 1) {
        const coord = document.createElement("div");
        coord.className = "coord bottom";
        coord.innerText = letters[col];
        square.appendChild(coord);
      }

      if (col === 0) {
        const coord = document.createElement("div");
        coord.className = "coord left";
        coord.innerText = row;
        square.appendChild(coord);
      }

      square.onclick = () => {
        if (locked) return;

        if (position === target) {
          locked = true;

          square.innerHTML = "♕";
          square.classList.add("correct");

          score++;
          updateScore();

          setTimeout(() => {
            generateTarget();
            createBoard();
            locked = false;
          }, 700);

        } else {
          square.classList.add("wrong");
          setTimeout(() => square.classList.remove("wrong"), 300);
        }
      };

      board.appendChild(square);
    }
  }
}

function updateScore() {
  scoreDisplay.innerText = "Score : " + score;
}

/* Init */
generateTarget();
createBoard();
updateScore();

</script>

</body>
</html>
