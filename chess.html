<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Trouve la Dame</title>

<link rel="apple-touch-icon" href="icon.png">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #222;
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* Échiquier FIXE */
#board {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  width: 360px;
  height: 360px;
}

/* Cases */
.square {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  user-select: none;
}

/* Couleurs style réel */
.white { background: #eeeed2; }
.black { background: #769656; }

/* Feedback */
.correct {
  background: #a9d18e !important;
}

.wrong {
  outline: 2px solid red;
}

/* Texte */
#target {
  margin-top: 20px;
  font-size: 22px;
}

#score {
  margin-top: 8px;
  font-size: 16px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div id="board"></div>

<div id="target"></div>
<div id="score"></div>

<script>
const board = document.getElementById("board");
const targetDisplay = document.getElementById("target");
const scoreDisplay = document.getElementById("score");

const letters = ['a','b','c','d','e','f','g','h'];

let target = "";
let score = 0;
let locked = false;

/* Génère position */
function generateTarget() {
  const col = letters[Math.floor(Math.random()*8)];
  const row = Math.floor(Math.random()*8) + 1;
  target = col + row;
  targetDisplay.innerText = target;
}

/* Création échiquier FIXE */
function createBoard() {
  board.innerHTML = "";

  for (let row = 8; row >= 1; row--) {
    for (let col = 0; col < 8; col++) {

      const square = document.createElement("div");
      square.classList.add("square");

      const isWhite = (row + col) % 2 === 0;
      square.classList.add(isWhite ? "white" : "black");

      const position = letters[col] + row;

      square.onclick = () => {
        if (locked) return;

        if (position === target) {
          locked = true;

          square.innerHTML = "♕"; // dame blanche
          square.classList.add("correct");

          score++;
          updateScore();

          setTimeout(() => {
            generateTarget();
            createBoard(); // recrée sans changer taille
            locked = false;
          }, 700);

        } else {
          square.classList.add("wrong");
          setTimeout(() => square.classList.remove("wrong"), 300);
        }
      };

      board.appendChild(square);
    }
  }
}

function updateScore() {
  scoreDisplay.innerText = "Score : " + score;
}

/* Init */
generateTarget();
createBoard();
updateScore();

</script>

</body>
</html>
