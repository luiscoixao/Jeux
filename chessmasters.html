<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Maîtres d'Échecs</title>

<meta name="theme-color" content="#2c2c2c" />

<style>
:root{
  --bg:#2c2c2c;
  --light:#eeeed2;
  --dark:#769656;
  --text:#ffffff;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h1{
  margin:20px 0 10px;
  font-size:28px;
  text-align:center;
}

#board-container{
  width:95vw;
  max-width:500px;
  height:95vw;
  max-height:500px;
}

#board{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  width:100%;
  height:100%;
}

.square{
  display:flex;
  align-items:center;
  justify-content:center;
}

.white{background:var(--light);}
.black{background:var(--dark);}

.piece{
  font-size:32px;
}

#controls{
  margin-top:20px;
  display:flex;
  gap:20px;
}

button{
  width:70px;
  height:70px;
  font-size:30px;
  background:var(--bg);
  border:none;
  color:white;
}

button:active{
  transform:scale(0.9);
}
</style>
</head>

<body>

<h1>Maîtres d'Échecs</h1>

<div id="board-container">
  <div id="board"></div>
</div>

<div id="controls">
  <button onclick="prev()">◀️</button>
  <button onclick="playPause()" id="play">▶️</button>
  <button onclick="next()">▶️</button>
</div>

<script>
const board = document.getElementById("board");

const start = [
"rnbqkbnr",
"pppppppp",
"........",
"........",
"........",
"........",
"PPPPPPPP",
"RNBQKBNR"
];

const pieces = {
"P":"♙","R":"♖","N":"♘","B":"♗","Q":"♕","K":"♔",
"p":"♟","r":"♜","n":"♞","b":"♝","q":"♛","k":"♚"
};

let state = JSON.parse(JSON.stringify(start));
let moves = [
["e2","e4"],
["e7","e5"],
["g1","f3"],
["b8","c6"]
];

let index = 0;
let timer = null;

function draw(){
  board.innerHTML="";
  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      const sq = document.createElement("div");
      sq.className="square "+((r+c)%2?"black":"white");

      const piece = state[r][c];
      if(piece !== "."){
        const span = document.createElement("span");
        span.className="piece";
        span.textContent = pieces[piece];
        sq.appendChild(span);
      }

      board.appendChild(sq);
    }
  }
}

function coord(pos){
  return [8 - pos[1], pos.charCodeAt(0)-97];
}

function move(m){
  const [r1,c1] = coord(m[0]);
  const [r2,c2] = coord(m[1]);

  state[r2] = state[r2].split("");
  state[r1] = state[r1].split("");

  state[r2][c2] = state[r1][c1];
  state[r1][c1] = ".";

  state[r1] = state[r1].join("");
  state[r2] = state[r2].join("");
}

function next(){
  if(index >= moves.length) return;
  move(moves[index]);
  index++;
  draw();
}

function prev(){
  index = 0;
  state = JSON.parse(JSON.stringify(start));
  for(let i=0;i<index;i++) move(moves[i]);
  draw();
}

function playPause(){
  if(timer){
    clearInterval(timer);
    timer=null;
    play.innerText="▶️";
  }else{
    play.innerText="⏸️";
    timer=setInterval(next,1000);
  }
}

draw();
</script>

</body>
</html>
