<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CHESSMASTERS</title>

<meta name="theme-color" content="#2c2c2c">

<style>
:root{
  --bg:#2c2c2c;
  --panel:#3a3a3a;
  --light:#eeeed2;
  --dark:#769656;
  --text:#ffffff;
  --muted:#cfcfcf;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h1{
  margin:20px 0 10px;
  font-size:28px;
}

.app{width:100%;max-width:560px}

.top-panel,.move-panel{
  background:var(--panel);
  padding:14px;
  margin-bottom:12px;
}

select{
  width:100%;
  height:48px;
  background:#4a4a4a;
  border:none;
  color:#fff;
  padding:0 10px;
}

#board-container{
  width:95vw;
  max-width:500px;
  aspect-ratio:1;
}

#board{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  width:100%;
  height:100%;
}

.square{
  display:flex;
  align-items:center;
  justify-content:center;
}

.white{background:var(--light)}
.black{background:var(--dark)}

.piece-wrap{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.piece{
  font-size:85%;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.piece-P{font-size:78%}
.piece-p{font-size:70%}

.white-piece{
  color:#fff;
  text-shadow:0 0 2px #000;
}

.black-piece{
  color:#111;
}

#move-counter{
  text-align:center;
  font-size:18px;
  margin-bottom:6px;
}

#status{
  text-align:center;
  font-size:15px;
  color:var(--muted);
}

.note{
  font-size:12px;
  margin-top:4px;
}

.controls{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:20px;
}

button{
  width:52px;
  height:52px;
  background:var(--bg);
  border:none;
  color:white;
  font-size:24px;
}
</style>
</head>

<body>

<h1>CHESSMASTERS</h1>

<div class="app">

<div class="top-panel">
<select id="gameSelect"></select>
</div>

<div id="board-container">
<div id="board"></div>
</div>

<div class="move-panel">
<div id="move-counter"></div>
<div id="status"></div>
</div>

<div class="controls">
<button id="prevBtn">◀️</button>
<button id="nextBtn">▶️</button>
</div>

</div>

<script>
const board = document.getElementById("board");
const statusEl = document.getElementById("status");
const counter = document.getElementById("move-counter");

const FILES = ["a","b","c","d","e","f","g","h"];

const PIECES = {
"P":"♙","N":"♘","B":"♗","R":"♖","Q":"♕","K":"♔",
"p":"♟","n":"♞","b":"♝","r":"♜","q":"♛","k":"♚"
};

const START_FEN = "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR";

function fenToBoard(fen){
  const rows = fen.split("/");
  const board = Array.from({length:8}, () => Array(8).fill(""));
  for(let r=0;r<8;r++){
    let f=0;
    for(const ch of rows[r]){
      if(/\d/.test(ch)) f+=parseInt(ch);
      else{ board[7-r][f]=ch; f++; }
    }
  }
  return board;
}

function clone(b){return b.map(r=>r.slice())}
function isWhite(p){return p && p===p.toUpperCase()}

function coordsToSquare(f,r){return FILES[f]+(r+1)}
function squareToCoords(s){return {file:FILES.indexOf(s[0]),rank:+s[1]-1}}

function pathClear(board,from,to){
  const dx=Math.sign(to.file-from.file);
  const dy=Math.sign(to.rank-from.rank);
  let f=from.file+dx,r=from.rank+dy;
  while(f!==to.file||r!==to.rank){
    if(board[r][f]) return false;
    f+=dx;r+=dy;
  }
  return true;
}

function canMove(board,p,from,to,capture){
  const dx=to.file-from.file,dy=to.rank-from.rank;
  const adx=Math.abs(dx),ady=Math.abs(dy);
  const white=isWhite(p),t=p.toLowerCase();

  if(board[to.rank][to.file] && isWhite(p)===isWhite(board[to.rank][to.file])) return false;

  if(t==="p"){
    const dir=white?1:-1;
    if(capture) return adx===1 && dy===dir;
    return dx===0 && dy===dir && !board[to.rank][to.file];
  }
  if(t==="n") return (adx===1&&ady===2)||(adx===2&&ady===1);
  if(t==="b") return adx===ady && pathClear(board,from,to);
  if(t==="r") return (dx===0||dy===0)&&pathClear(board,from,to);
  if(t==="q") return ((dx===0||dy===0)||adx===ady)&&pathClear(board,from,to);
  if(t==="k") return Math.max(adx,ady)===1;
  return false;
}

function parseSAN(s){
  s=s.replace(/[+#]/g,"");
  let capture=s.includes("x");
  s=s.replace("x","");
  let piece="P";
  if(/^[KQRBN]/.test(s)){piece=s[0];s=s.slice(1);}
  const to=s.slice(-2);
  return {piece,to,capture};
}

function apply(board,turn,san){
  const b=clone(board);
  const m=parseSAN(san);
  const dest=squareToCoords(m.to);
  const char=turn==="w"?m.piece.toUpperCase():m.piece.toLowerCase();

  for(let r=0;r<8;r++){
    for(let f=0;f<8;f++){
      if(b[r][f]===char){
        if(canMove(b,char,{file:f,rank:r},dest,m.capture)){
          b[dest.rank][dest.file]=char;
          b[r][f]="";
          return b;
        }
      }
    }
  }
  return b;
}

const games=[
{
title:"Morphy – Opéra",
moves:[
{san:"e4"},{san:"e5"},{san:"Nf3"},{san:"d6",note:"Philidor"},
{san:"d4"},{san:"Bg4"},{san:"dxe5"},{san:"Bxf3"},
{san:"Qxf3"},{san:"dxe5"},{san:"Bc4"},{san:"Nf6"},
{san:"Qb3"},{san:"Qe7"},{san:"Nc3"},{san:"c6"},
{san:"Bg5"},{san:"b5"},{san:"Nxb5",note:"Sacrifice"},
{san:"cxb5"},{san:"Bxb5+"},{san:"Nbd7"},
{san:"O-O-O",note:"Roques opposés"},
{san:"Rd8"},{san:"Rxd7",note:"Qualité"},
{san:"Rxd7"},{san:"Rd1"},{san:"Qe6"},
{san:"Bxd7+"},{san:"Nxd7"},{san:"Qb8+"},
{san:"Nxb8"},{san:"Rd8#",note:"Mat"}
]
},
{
title:"Anderssen – Immortelle",
moves:[
{san:"e4"},{san:"e5"},
{san:"f4",note:"Gambit du Roi"},
{san:"exf4"},
{san:"Bc4"},{san:"Qh4+"},
{san:"Kf1"},{san:"b5"},
{san:"Bxb5"},{san:"Nf6"},
{san:"Nf3"},{san:"Qh6"},
{san:"d3"},{san:"Nh5"},
{san:"Nh4"},{san:"Qg5"},
{san:"Nf5"},{san:"c6"},
{san:"g4"},{san:"Nf6"},
{san:"Rg1"},{san:"cxb5"},
{san:"h4"},{san:"Qg6"},
{san:"h5"},{san:"Qg5"},
{san:"Qf3"},{san:"Ng8"},
{san:"Bxf4"},{san:"Qf6"},
{san:"Nc3"},{san:"Bc5"},
{san:"Nd5"},{san:"Qxb2"},
{san:"Bd6"},{san:"Bxg1"},
{san:"e5"},{san:"Qxa1+"},
{san:"Ke2"},{san:"Na6"},
{san:"Nxg7+"},{san:"Kd8"},
{san:"Qf6+"},{san:"Nxf6",note:"Dame"},
{san:"Be7#",note:"Mat"}
]
}
];

let gameIndex=0,moveIndex=0;
let state=fenToBoard(START_FEN),turn="w";

function render(){
board.innerHTML="";
for(let r=7;r>=0;r--){
for(let c=0;c<8;c++){
const sq=document.createElement("div");
sq.className="square "+((r+c)%2?"black":"white");

const p=state[r][c];
if(p){
const w=document.createElement("div");
w.className="piece-wrap";
const s=document.createElement("span");
s.className="piece "+(isWhite(p)?"white-piece":"black-piece")+" piece-"+p;
s.textContent=PIECES[p];
w.appendChild(s);
sq.appendChild(w);
}
board.appendChild(sq);
}}
}

function update(){
counter.textContent="Coup "+moveIndex+" / "+games[gameIndex].moves.length;
if(moveIndex===0){
statusEl.innerHTML="Position initiale";
}else{
const m=games[gameIndex].moves[moveIndex-1];
statusEl.innerHTML=m.san+(m.note?'<div class="note">'+m.note+'</div>':"");
}
}

function reset(){
state=fenToBoard(START_FEN);
turn="w";
moveIndex=0;
render();update();
}

function next(){
if(moveIndex>=games[gameIndex].moves.length) return;
const m=games[gameIndex].moves[moveIndex];
state=apply(state,turn,m.san);
turn=turn==="w"?"b":"w";
moveIndex++;
render();update();
}

function prev(){
reset();
for(let i=0;i<moveIndex-1;i++){
state=apply(state,turn,games[gameIndex].moves[i].san);
turn=turn==="w"?"b":"w";
}
moveIndex=Math.max(0,moveIndex-1);
render();update();
}

document.getElementById("nextBtn").onclick=next;
document.getElementById("prevBtn").onclick=prev;

const select=document.getElementById("gameSelect");
games.forEach((g,i)=>{
let o=document.createElement("option");
o.value=i;
o.textContent=g.title;
select.appendChild(o);
});

select.onchange=e=>{
gameIndex=parseInt(e.target.value);
reset();
};

reset();
</script>

</body>
</html>
