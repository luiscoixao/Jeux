<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>CHESSMOVE</title>

<link rel="apple-touch-icon" href="iconchessmove.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CHESSMOVE" />
<meta name="theme-color" content="#2c2c2c" />

<style>
:root{
  --bg:#2c2c2c;
  --panel:#3a3a3a;
  --light:#eeeed2;
  --dark:#769656;
  --text:#ffffff;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  font-family:-apple-system;
  background:var(--bg);
  color:var(--text);
  text-align:center;
}

h1{
  margin:20px 0;
}

#board{
  width:95vw;
  max-width:500px;
  aspect-ratio:1;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(8,1fr);
}

.square{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:38px;
}

.white{background:var(--light)}
.black{background:var(--dark)}

.selected{
  outline:3px solid gold;
}

.controls{
  margin:15px;
}

button{
  padding:12px 18px;
  margin:6px;
  border:none;
  background:#555;
  color:white;
  font-size:16px;
}
</style>
</head>

<body>

<h1>CHESSMOVE</h1>

<div id="board"></div>

<div class="controls">
  <button onclick="loadExample()">Charger position</button>
  <button onclick="toggleEdit()">Mode édition</button>
</div>

<script>
const boardEl = document.getElementById("board");

const pieces = {
  P:"♙",R:"♖",N:"♘",B:"♗",Q:"♕",K:"♔",
  p:"♟",r:"♜",n:"♞",b:"♝",q:"♛",k:"♚"
};

let board = [];
let selected = null;
let editMode = false;

function initBoard(){
  board = Array(8).fill().map(()=>Array(8).fill(""));
  render();
}

function loadExample(){
  const fen = "r5k1/2p2p1p/1p2pqp1/p2p4/2PBn3/1P6/2R2PPP/4QRK1";
  const rows = fen.split("/");

  for(let r=0;r<8;r++){
    let c=0;
    for(let ch of rows[r]){
      if(!isNaN(ch)){
        c+=parseInt(ch);
      }else{
        board[7-r][c]=ch;
        c++;
      }
    }
  }
  render();
}

function render(){
  boardEl.innerHTML="";

  for(let r=7;r>=0;r--){
    for(let c=0;c<8;c++){
      const sq = document.createElement("div");
      sq.className = "square "+((r+c)%2?"black":"white");

      if(selected && selected.r===r && selected.c===c){
        sq.classList.add("selected");
      }

      sq.innerText = pieces[board[r][c]] || "";

      sq.onclick = ()=>clickSquare(r,c);

      boardEl.appendChild(sq);
    }
  }
}

function clickSquare(r,c){

  if(editMode){
    cyclePiece(r,c);
    render();
    return;
  }

  if(!selected){
    if(board[r][c]){
      selected={r,c};
    }
  }else{
    board[r][c] = board[selected.r][selected.c];
    board[selected.r][selected.c] = "";
    selected=null;
  }

  render();
}

const cycle = ["","P","N","B","R","Q","K","p","n","b","r","q","k"];

function cyclePiece(r,c){
  let i = cycle.indexOf(board[r][c]);
  board[r][c] = cycle[(i+1)%cycle.length];
}

function toggleEdit(){
  editMode = !editMode;
  alert(editMode ? "Mode édition activé" : "Mode déplacement");
}

initBoard();
</script>

</body>
</html>
