<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>BALLOONS</title>
<meta name="theme-color" content="#4e63ff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="BALLOONS" />
<link rel="apple-touch-icon" href="icon.png" />
<link rel="icon" type="image/png" href="icon.png" />
<link rel="manifest" href="manifest.webmanifest" />
<style>
:root{
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
  --safe-left: env(safe-area-inset-left);
  --safe-right: env(safe-area-inset-right);
  --white:#fff;
  --line:rgba(255,255,255,.20);
  --glass:rgba(255,255,255,.14);
  --shadow:0 20px 42px rgba(0,0,0,.24);
  --green1:#49ff7c;
  --green2:#08b23d;
  --red1:#ff6784;
  --red2:#cf1532;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",sans-serif;
  color:var(--white);
  background:
    radial-gradient(circle at 10% 12%, rgba(255,239,117,.92) 0 0, rgba(255,239,117,0) 16%),
    radial-gradient(circle at 86% 13%, rgba(104,141,255,.92) 0 0, rgba(104,141,255,0) 20%),
    radial-gradient(circle at 84% 84%, rgba(93,255,220,.94) 0 0, rgba(93,255,220,0) 22%),
    radial-gradient(circle at 15% 87%, rgba(255,120,206,.88) 0 0, rgba(255,120,206,0) 23%),
    radial-gradient(circle at 50% 60%, rgba(155,98,255,.30) 0 0, rgba(155,98,255,0) 34%),
    linear-gradient(145deg,#4fe0ff 0%, #4560ff 38%, #8d54ff 68%, #ff66aa 100%);
}
body::before,
body::after{
  content:"";
  position:fixed;
  border-radius:50%;
  filter:blur(62px);
  opacity:.34;
  pointer-events:none;
}
body::before{width:42vw;height:42vw;left:-8vw;bottom:2vh;background:#53ffe6}
body::after{width:42vw;height:42vw;right:-8vw;top:-2vh;background:#ffe35d}
.game,.board,.hud,.endOverlay{position:fixed;inset:0}
.board{overflow:hidden;touch-action:manipulation}
.hud{pointer-events:none;z-index:5}
.title{
  position:absolute;
  top:calc(6px + var(--safe-top));
  left:calc(12px + var(--safe-left));
  right:calc(12px + var(--safe-right));
  margin:0;
  text-align:center;
  font-weight:1000;
  letter-spacing:.12em;
  line-height:.92;
  font-size:clamp(28px,8vw,52px);
  color:#ffffff;
  text-shadow:
    0 2px 0 rgba(255,255,255,.12),
    0 8px 16px rgba(15,24,88,.38),
    0 0 26px rgba(255,255,255,.18);
}
.bottomBar{
  position:absolute;
  left:calc(10px + var(--safe-left));
  right:calc(10px + var(--safe-right));
  bottom:calc(10px + var(--safe-bottom));
  display:grid;
  grid-template-columns:minmax(112px,1fr) minmax(112px,1fr) minmax(0,1.55fr);
  gap:10px;
  align-items:stretch;
  pointer-events:auto;
}
.stat,.toggleBtn,.endCard{
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px) saturate(1.14);
  -webkit-backdrop-filter:blur(18px) saturate(1.14);
}
.stat{
  min-height:80px;
  background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.10));
  border-radius:24px;
  padding:10px 10px 8px;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.stat .label{
  font-size:11px;
  font-weight:900;
  letter-spacing:.16em;
  text-transform:uppercase;
  opacity:.96;
}
.stat .value{
  margin-top:6px;
  font-size:clamp(19px,5vw,30px);
  line-height:1;
  font-weight:1000;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
  letter-spacing:0;
}
.toggleBtn{
  appearance:none;
  border-radius:28px;
  min-height:80px;
  min-width:0;
  width:100%;
  color:#fff;
  font-weight:1000;
  font-size:clamp(22px,5.3vw,34px);
  letter-spacing:.03em;
  text-shadow:0 2px 8px rgba(0,0,0,.18);
  padding:0 16px;
}
.toggleBtn.play{background:linear-gradient(180deg,var(--green1),var(--green2))}
.toggleBtn.stop{background:linear-gradient(180deg,var(--red1),var(--red2))}
.balloon{
  position:absolute;
  border:none;
  border-radius:50%;
  transform:translate(-50%,-50%);
  box-shadow:
    inset -10px -16px 24px rgba(0,0,0,.12),
    inset 10px 14px 22px rgba(255,255,255,.28),
    0 15px 28px rgba(0,0,0,.16),
    0 0 0 1px rgba(255,255,255,.08);
  transition:
    left .5s cubic-bezier(.22,.8,.18,1),
    top .5s cubic-bezier(.22,.8,.18,1),
    transform .14s ease,
    opacity .24s ease,
    filter .2s ease;
}
.balloon::before{
  content:"";
  position:absolute;
  width:37%;
  height:25%;
  left:17%;
  top:15%;
  border-radius:50%;
  background:rgba(255,255,255,.40);
  transform:rotate(-18deg);
  filter:blur(1px);
}
.balloon::after{
  content:"";
  position:absolute;
  left:50%;
  bottom:-18%;
  width:2px;
  height:36%;
  transform:translateX(-50%);
  background:linear-gradient(180deg, rgba(255,255,255,.58), rgba(255,255,255,.1));
  border-radius:2px;
  opacity:.55;
}
.balloon:active{transform:translate(-50%,-50%) scale(.94)}
.balloon.majority{
  filter:drop-shadow(0 0 16px rgba(255,255,255,.42));
  box-shadow:
    inset -10px -16px 24px rgba(0,0,0,.12),
    inset 10px 14px 22px rgba(255,255,255,.28),
    0 0 0 3px rgba(255,255,255,.14),
    0 18px 28px rgba(0,0,0,.16),
    0 0 24px rgba(255,255,255,.14);
}
.balloon.wrong{animation:wrongShake .34s ease}
.balloon.fly{animation:flyAway .88s cubic-bezier(.12,.74,.18,1) forwards;pointer-events:none}
.particle{
  position:absolute;
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  animation:particle .84s ease-out forwards;
}
.endOverlay{
  display:none;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:rgba(12,16,36,.14);
  z-index:8;
}
.endOverlay.show{display:flex}
.endCard{
  width:min(90vw,520px);
  background:rgba(255,255,255,.18);
  border-radius:34px;
  padding:24px 20px 20px;
  text-align:center;
}
.endMini{font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:900;opacity:.92}
.endTitle{margin:10px 0 6px;font-size:clamp(28px,8vw,42px);line-height:.95;font-weight:1000}
.endTime{font-size:clamp(34px,9vw,52px);font-weight:1000;line-height:1;margin:8px 0 10px;font-variant-numeric:tabular-nums}
.endText{font-size:16px;line-height:1.35;font-weight:700;margin:0 0 14px}
.endBtn{
  appearance:none;
  border:none;
  min-width:180px;
  min-height:56px;
  border-radius:20px;
  font-size:20px;
  font-weight:1000;
  color:#fff;
  background:linear-gradient(180deg,var(--green1),var(--green2));
  box-shadow:var(--shadow);
}
@keyframes wrongShake{
  0%,100%{transform:translate(-50%,-50%)}
  25%{transform:translate(calc(-50% - 7px),-50%)}
  50%{transform:translate(calc(-50% + 7px),-50%)}
  75%{transform:translate(calc(-50% - 5px),-50%)}
}
@keyframes flyAway{
  0%{opacity:1;transform:translate(-50%,-50%) scale(1)}
  35%{opacity:1;transform:translate(calc(-50% + var(--driftx)),calc(-50% - 58px)) scale(1.03)}
  100%{opacity:0;transform:translate(calc(-50% + var(--driftx)),calc(-50% - 280px)) scale(.9)}
}
@keyframes particle{
  0%{opacity:.96}
  100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(.16)}
}
@media (max-width: 430px){
  .bottomBar{grid-template-columns:minmax(98px,1fr) minmax(98px,1fr) minmax(0,1.45fr);gap:8px}
  .stat{min-height:76px;border-radius:22px}
  .toggleBtn{min-height:76px;border-radius:24px;font-size:clamp(20px,5vw,30px);padding:0 12px}
}
</style>
</head>
<body>
<div class="game">
  <div class="board" id="board"></div>
  <div class="hud">
    <h1 class="title">BALLOONS</h1>
    <div class="bottomBar">
      <div class="stat">
        <div class="label">Chrono</div>
        <div class="value" id="timer">00:00.0</div>
      </div>
      <div class="stat">
        <div class="label">Record</div>
        <div class="value" id="best">--:--.-</div>
      </div>
      <button class="toggleBtn play" id="toggleBtn" aria-label="Jouer">JOUER</button>
    </div>
  </div>
</div>

<div class="endOverlay" id="endOverlay">
  <div class="endCard">
    <div class="endMini">Partie terminée</div>
    <div class="endTitle">Bravo</div>
    <div class="endTime" id="endTime">00:00.0</div>
    <p class="endText" id="endText">Tu as vidé les 100 séries.</p>
    <button class="endBtn" id="restartBtn">REJOUER</button>
  </div>
</div>

<script>
(() => {
  const board = document.getElementById('board');
  const timerEl = document.getElementById('timer');
  const bestEl = document.getElementById('best');
  const toggleBtn = document.getElementById('toggleBtn');
  const endOverlay = document.getElementById('endOverlay');
  const endTimeEl = document.getElementById('endTime');
  const endTextEl = document.getElementById('endText');
  const restartBtn = document.getElementById('restartBtn');

  const STORAGE_BEST = 'balloons-best-v1';
  const MAX_SERIES = 100;
  const COLORS = [
    ['#ff6c90','#ff2d5e'],
    ['#5ef36c','#10bf3a'],
    ['#ffe86e','#ffbf16'],
    ['#74d6ff','#19a5ff'],
    ['#bc88ff','#8450ff'],
    ['#ffab69','#ff6718'],
    ['#57f1db','#00c7a7'],
    ['#ff84db','#ff47b7'],
    ['#78ffb6','#27cf6f']
  ];

  let bestMs = Number(localStorage.getItem(STORAGE_BEST) || 0);
  let raf = 0;
  let startTs = 0;
  let state = null;

  function fmt(ms){
    if(ms == null || Number.isNaN(ms)) return '--:--.-';
    const totalTenths = Math.floor(ms / 100);
    const minutes = Math.floor(totalTenths / 600);
    const seconds = Math.floor((totalTenths % 600) / 10);
    const tenths = totalTenths % 10;
    return `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}.${tenths}`;
  }

  function updateBest(){
    bestEl.textContent = bestMs ? fmt(bestMs) : '--:--.-';
  }

  function setButtonState(running){
    toggleBtn.className = 'toggleBtn ' + (running ? 'stop' : 'play');
    toggleBtn.textContent = running ? 'ARRÊTER' : 'JOUER';
    toggleBtn.setAttribute('aria-label', running ? 'Arrêter' : 'Jouer');
  }

  function computeSeriesCount(series){
    const start = 460;
    const end = 345;
    const t = (series - 1) / (MAX_SERIES - 1);
    const eased = Math.pow(t, 1.55);
    return Math.round(start + (end - start) * eased);
  }

  function makeBalancedCounts(total){
    const colorCount = COLORS.length;
    const winnerIndex = Math.floor(Math.random() * colorCount);
    const weights = Array.from({ length: colorCount }, () => 0.92 + Math.random() * 0.20);
    weights[winnerIndex] += 0.09 + Math.random() * 0.04;

    const weightSum = weights.reduce((a,b) => a + b, 0);
    const counts = weights.map(w => Math.max(5, Math.floor(total * w / weightSum)));

    let diff = total - counts.reduce((a,b) => a + b, 0);
    while(diff !== 0){
      if(diff > 0){
        counts[Math.floor(Math.random() * colorCount)]++;
        diff--;
      }else{
        const candidates = counts.map((v,i)=>({v,i})).filter(item => item.v > 5);
        if(!candidates.length) break;
        const idx = candidates[Math.floor(Math.random() * candidates.length)].i;
        counts[idx]--;
        diff++;
      }
    }

    const minVisible = Math.max(12, Math.floor(total / 24));
    for(let i = 0; i < colorCount; i++){
      if(i === winnerIndex) continue;
      while(counts[i] < minVisible){
        const donor = counts
          .map((v,idx)=>({v,idx}))
          .filter(item => item.idx !== i && item.v > minVisible + 2)
          .sort((a,b)=>b.v-a.v)[0];
        if(!donor) break;
        counts[donor.idx]--;
        counts[i]++;
      }
    }

    const topOther = Math.max(...counts.filter((_, idx) => idx !== winnerIndex));
    if(counts[winnerIndex] <= topOther){
      const need = topOther - counts[winnerIndex] + 1;
      counts[winnerIndex] += need;
      for(let k = 0; k < need; k++){
        const donor = counts
          .map((v,idx)=>({v,idx}))
          .filter(item => item.idx !== winnerIndex && item.v > minVisible + 2)
          .sort((a,b)=>b.v-a.v)[0];
        if(!donor) break;
        counts[donor.idx]--;
      }
    }

    return counts;
  }

  function makeBalloons(series){
    const total = computeSeriesCount(series);
    const counts = makeBalancedCounts(total);
    const balloons = [];
    let id = 1;
    counts.forEach((count, colorIndex) => {
      for(let i = 0; i < count; i++){
        const sizeBand = Math.random();
        const r = sizeBand < 0.2 ? 18 + Math.random() * 4 : sizeBand < 0.78 ? 22 + Math.random() * 5 : 27 + Math.random() * 6;
        balloons.push({ id: id++, colorIndex, x: 0, y: 0, r, driftX: (Math.random() - 0.5) * 120 });
      }
    });
    for(let i = balloons.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [balloons[i], balloons[j]] = [balloons[j], balloons[i]];
    }
    return balloons;
  }

  function makeState(series){
    return { series, running: true, finished: false, balloons: makeBalloons(series) };
  }

  function boardRect(){
    const rect = board.getBoundingClientRect();
    const root = getComputedStyle(document.documentElement);
    const safeTop = parseFloat(root.getPropertyValue('--safe-top')) || 0;
    const safeBottom = parseFloat(root.getPropertyValue('--safe-bottom')) || 0;
    return {
      width: rect.width,
      height: rect.height,
      top: 64 + safeTop,
      bottom: rect.height - (6 + safeBottom)
    };
  }

  function shuffle(array){
    for(let i = array.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  function layoutBalloons(){
    const zone = boardRect();
    const total = state.balloons.length;
    const areaW = zone.width;
    const areaH = Math.max(420, zone.bottom - zone.top);
    const positions = [];

    const cols = Math.max(10, Math.floor(areaW / 40) + 3);
    const rows = Math.ceil(total / cols) + 5;
    const stepX = areaW / (cols - 1);
    const stepY = areaH / (rows - 1);

    for(let row = 0; row < rows; row++){
      for(let col = 0; col < cols; col++){
        const x = col * stepX + (row % 2 ? stepX * 0.45 : 0) - stepX * 0.3 + (Math.random() - 0.5) * 16;
        const y = zone.top + row * stepY + (Math.random() - 0.5) * 16;
        positions.push({ x, y });
      }
    }

    shuffle(positions);
    state.balloons.forEach((balloon, index) => {
      const pos = positions[index];
      balloon.x = pos.x;
      balloon.y = pos.y;
    });
  }

  function getMajorityData(){
    const counts = new Map();
    state.balloons.forEach(balloon => counts.set(balloon.colorIndex, (counts.get(balloon.colorIndex) || 0) + 1));
    const max = Math.max(...counts.values());
    const winners = [...counts.entries()].filter(([, value]) => value === max).map(([key]) => key);
    return { counts, winners };
  }

  function render(){
    const frag = document.createDocumentFragment();
    const { winners } = getMajorityData();

    state.balloons.forEach(balloon => {
      const el = document.createElement('button');
      const isWinner = winners.includes(balloon.colorIndex);
      el.className = 'balloon' + (isWinner ? ' majority' : '');
      el.style.width = `${balloon.r * 2}px`;
      el.style.height = `${balloon.r * 2.22}px`;
      el.style.left = `${balloon.x}px`;
      el.style.top = `${balloon.y}px`;
      el.style.setProperty('--driftx', `${balloon.driftX}px`);
      const [c1, c2] = COLORS[balloon.colorIndex];
      el.style.background = `radial-gradient(circle at 34% 30%, ${c1} 0%, ${c1} 32%, ${c2} 100%)`;
      el.dataset.id = String(balloon.id);
      el.dataset.colorIndex = String(balloon.colorIndex);
      el.addEventListener('click', onBalloonClick, { passive: true });
      frag.appendChild(el);
    });

    board.replaceChildren(frag);
  }

  function spawnParticles(x, y, colorIndex, count = 12){
    const [c1, c2] = COLORS[colorIndex];
    for(let i = 0; i < count; i++){
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 5 + Math.random() * 13;
      const angle = Math.random() * Math.PI * 2;
      const dist = 26 + Math.random() * 92;
      p.style.width = `${size}px`;
      p.style.height = `${size}px`;
      p.style.left = `${x}px`;
      p.style.top = `${y}px`;
      p.style.background = Math.random() > 0.5 ? c1 : c2;
      p.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
      p.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
      board.appendChild(p);
      setTimeout(() => p.remove(), 860);
    }
  }

  function removeColor(colorIndex){
    const els = [...board.querySelectorAll(`.balloon[data-color-index="${colorIndex}"]`)];

    els.forEach((el, i) => {
      setTimeout(() => {
        el.classList.add('fly');
        spawnParticles(parseFloat(el.style.left), parseFloat(el.style.top), colorIndex, 7);
      }, i * 8);
    });

    setTimeout(() => {
      state.balloons = state.balloons.filter(balloon => balloon.colorIndex !== colorIndex);
      if(state.balloons.length <= 1){
        advanceSeriesOrFinish();
      }else{
        layoutBalloons();
        render();
      }
    }, 900);
  }

  function advanceSeriesOrFinish(){
    if(state.series >= MAX_SERIES){
      finishGame();
      return;
    }
    state = makeState(state.series + 1);
    layoutBalloons();
    render();
  }

  function onBalloonClick(event){
    if(!state || !state.running || state.finished) return;
    const colorIndex = Number(event.currentTarget.dataset.colorIndex);
    const { winners } = getMajorityData();
    if(!winners.includes(colorIndex)){
      event.currentTarget.classList.add('wrong');
      setTimeout(() => event.currentTarget.classList.remove('wrong'), 340);
      if(navigator.vibrate) navigator.vibrate(28);
      return;
    }
    removeColor(colorIndex);
  }

  function tick(){
    if(!state || !state.running) return;
    timerEl.textContent = fmt(performance.now() - startTs);
    raf = requestAnimationFrame(tick);
  }

  function startTimer(){
    cancelAnimationFrame(raf);
    startTs = performance.now();
    tick();
  }

  function stopTimer(){
    cancelAnimationFrame(raf);
  }

  function startGame(){
    endOverlay.classList.remove('show');
    state = makeState(1);
    layoutBalloons();
    render();
    timerEl.textContent = '00:00.0';
    setButtonState(true);
    startTimer();
  }

  function stopGame(){
    stopTimer();
    state = null;
    board.replaceChildren();
    timerEl.textContent = '00:00.0';
    setButtonState(false);
  }

  function finishGame(){
    stopTimer();
    const elapsed = Math.floor(performance.now() - startTs);
    timerEl.textContent = fmt(elapsed);
    endTimeEl.textContent = fmt(elapsed);

    let newBest = false;
    if(!bestMs || elapsed < bestMs){
      bestMs = elapsed;
      localStorage.setItem(STORAGE_BEST, String(bestMs));
      updateBest();
      newBest = true;
    }

    endTextEl.innerHTML = newBest ? 'Nouveau <strong>record</strong> !' : 'Partie terminée. Essaie encore plus vite.';
    setButtonState(false);
    endOverlay.classList.add('show');
    state = { finished: true, running: false, balloons: [], series: MAX_SERIES };
  }

  toggleBtn.addEventListener('click', () => {
    if(state && state.running && !state.finished) stopGame();
    else startGame();
  });

  restartBtn.addEventListener('click', startGame);

  window.addEventListener('resize', () => {
    if(state && state.running && !state.finished){
      layoutBalloons();
      render();
    }
  }, { passive: true });

  timerEl.textContent = '00:00.0';
  updateBest();
  setButtonState(false);
  startGame();
})();
</script>
</body>
</html>
