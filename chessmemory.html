<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>CHESSMEMORY</title>

<link rel="apple-touch-icon" href="iconchessmemory.png" />
<link rel="icon" href="iconchessmemory.png" />

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CHESSMEMORY" />
<meta name="theme-color" content="#2c2c2c" />

<style>
:root{
  --bg:#2c2c2c;
  --panel:#3a3a3a;
  --light:#eeeed2;
  --dark:#769656;
  --text:#ffffff;
  --gold:#d4af37;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0 12px calc(18px + env(safe-area-inset-bottom));
}

h1{
  margin:calc(env(safe-area-inset-top) + 18px) 0 12px;
  font-size:28px;
  line-height:1.08;
  font-weight:700;
  text-align:center;
}

.app{
  width:100%;
  max-width:560px;
}

.controls-panel,
.timer-panel{
  background:var(--panel);
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.18);
}

#board-container{
  width:95vw;
  max-width:500px;
  aspect-ratio:1 / 1;
  overflow:hidden;
  margin-bottom:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

#board{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  width:100%;
  height:100%;
}

.square{
  position:relative;
  width:100%;
  height:100%;
  user-select:none;
  overflow:hidden;
  perspective:900px;
}

.white{ background:var(--light); }
.black{ background:var(--dark); }

.coord{
  position:absolute;
  font-size:10px;
  opacity:.65;
  font-weight:700;
  pointer-events:none;
  z-index:4;
}

.coord.file{
  left:5px;
  bottom:3px;
}

.coord.rank{
  right:4px;
  top:2px;
}

.card{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:none;
  background:none;
  padding:0;
  margin:0;
  cursor:pointer;
  touch-action:manipulation;
}

.card-inner{
  position:relative;
  width:100%;
  height:100%;
  transition:transform .42s ease;
  transform-style:preserve-3d;
}

.square.flipped .card-inner{
  transform:rotateY(180deg);
}

.face{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
}

.back{
  background:transparent;
}

.back::before{
  content:"";
  width:44%;
  height:44%;
  border-radius:50%;
  background:rgba(0,0,0,.10);
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.08),
    0 1px 3px rgba(0,0,0,.12);
}

.front{
  transform:rotateY(180deg);
}

/* ===== CORRECTION RÉELLE ICI ===== */
.piece{
  line-height:1;
  position:relative;
  z-index:2;
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
  filter:drop-shadow(0 1px 0 rgba(0,0,0,.22));

  /* taille basée sur la case */
  font-size:calc(min(100vw, 500px) / 8 * 0.88);
}

/* uniformité totale */
.piece-N,.piece-B,.piece-R,.piece-Q,.piece-K,
.piece-n,.piece-b,.piece-r,.piece-q,.piece-k{
  font-size:inherit;
}

.white-piece{
  color:#ffffff;
  text-shadow:
    0 0 1px #000,
    0 0 2px #000,
    0 1px 2px rgba(0,0,0,.55),
    0 0 6px rgba(255,255,255,.16);
}

.black-piece{
  color:#141414;
  text-shadow:
    0 0 1px rgba(255,255,255,.18),
    0 1px 1px rgba(255,255,255,.06);
}

.square.matched{
  box-shadow:inset 0 0 0 3px rgba(212,175,55,.95);
}

.controls{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:28px;
  background:var(--panel);
}

.control-btn{
  width:52px;
  height:52px;
  border:none;
  background:var(--bg);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.control-btn span{
  font-size:24px;
}

#memoryStatus{
  text-align:center;
  font-size:16px;
  font-weight:700;
}

#memoryTimer{
  text-align:center;
  font-size:22px;
  font-weight:700;
  color:var(--gold);
}

.footer-note{
  text-align:center;
  font-size:12px;
  margin-top:4px;
}
</style>
</head>

<body>

<h1>CHESSMEMORY</h1>

<div class="app">
  <div id="board-container">
    <div id="board"></div>
  </div>

  <div class="timer-panel">
    <div id="memoryStatus">Mémorisation</div>
    <div id="memoryTimer">30</div>
  </div>

  <div class="controls-panel">
    <div class="controls">
      <button class="control-btn" id="restartBtn"><span>🔄</span></button>
    </div>
  </div>

  <div class="footer-note">Jeu imaginé par Luis et créé par ChatGPT</div>
</div>

<script>
const boardEl=document.getElementById("board");
const restartBtn=document.getElementById("restartBtn");

const PIECES={
  "N":"♘","B":"♗","R":"♖","Q":"♕","K":"♔",
  "n":"♞","b":"♝","r":"♜","q":"♛","k":"♚"
};

const BASE_DECK = [
  {piece:"K"},{piece:"K"},{piece:"k"},{piece:"k"},
  {piece:"Q"},{piece:"Q"},{piece:"q"},{piece:"q"},
  {piece:"R"},{piece:"R"},{piece:"R"},{piece:"R"},
  {piece:"r"},{piece:"r"},{piece:"r"},{piece:"r"},
  {piece:"B"},{piece:"B"},{piece:"B"},{piece:"B"},
  {piece:"b"},{piece:"b"},{piece:"b"},{piece:"b"},
  {piece:"N"},{piece:"N"},{piece:"N"},{piece:"N"},
  {piece:"n"},{piece:"n"},{piece:"n"},{piece:"n"}
];

let cards=[];
let picks=[];
let lock=false;
let matched=0;

function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

function init(){
  const deck=shuffle([...BASE_DECK,...BASE_DECK]);
  cards=deck.map((p,i)=>({p:p.piece,id:i,state:"hidden"}));
  picks=[]; matched=0; lock=false;
  draw();
}

function draw(){
  boardEl.innerHTML="";
  for(let i=0;i<64;i++){
    const c=cards[i];
    const sq=document.createElement("div");
    sq.className="square "+((Math.floor(i/8)+i%8)%2?"black":"white");

    if(c.state!=="hidden") sq.classList.add("flipped");
    if(c.state==="matched") sq.classList.add("matched");

    const btn=document.createElement("button");
    btn.className="card";
    btn.onclick=()=>click(i);

    const inner=document.createElement("div");
    inner.className="card-inner";

    const front=document.createElement("div");
    front.className="face front";

    const back=document.createElement("div");
    back.className="face back";

    const span=document.createElement("span");
    span.className="piece "+(c.p===c.p.toUpperCase()?"white-piece ":"black-piece ")+"piece-"+c.p;
    span.textContent=PIECES[c.p];

    front.appendChild(span);
    inner.appendChild(back);
    inner.appendChild(front);
    btn.appendChild(inner);
    sq.appendChild(btn);
    boardEl.appendChild(sq);
  }
}

function click(i){
  if(lock) return;
  const c=cards[i];
  if(c.state!=="hidden") return;

  c.state="shown";
  picks.push(i);
  draw();

  if(picks.length<2) return;

  lock=true;
  const [a,b]=picks;

  if(cards[a].p===cards[b].p){
    cards[a].state="matched";
    cards[b].state="matched";
    matched++;
    picks=[]; lock=false;
    draw();

    if(matched===32){
      setTimeout(()=>alert("Bravo 🎉"),200);
    }
  }else{
    setTimeout(()=>{
      cards[a].state="hidden";
      cards[b].state="hidden";
      picks=[]; lock=false;
      draw();
    },600);
  }
}

restartBtn.onclick=init;
init();
</script>

</body>
</html>
