<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>CHESSMEMORY</title>

<link rel="apple-touch-icon" href="iconchessmemory.png" />
<link rel="icon" href="iconchessmemory.png" />

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CHESSMEMORY" />
<meta name="theme-color" content="#2c2c2c" />

<style>
:root{
  --bg:#2c2c2c;
  --panel:#3a3a3a;
  --light:#eeeed2;
  --dark:#769656;
  --text:#ffffff;
  --gold:#d4af37;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0 12px calc(18px + env(safe-area-inset-bottom));
}

h1{
  margin:calc(env(safe-area-inset-top) + 18px) 0 12px;
  font-size:28px;
  line-height:1.08;
  font-weight:700;
  text-align:center;
}

.app{
  width:100%;
  max-width:560px;
}

.top-panel,
.controls-panel{
  background:var(--panel);
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.18);
}

select{
  width:100%;
  height:48px;
  border:none;
  background:#4a4a4a;
  color:#fff;
  font-size:16px;
  padding:0 14px;
  appearance:none;
  -webkit-appearance:none;
}

#board-container{
  width:95vw;
  max-width:500px;
  aspect-ratio:1 / 1;
  overflow:hidden;
  margin-bottom:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

#board{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  width:100%;
  height:100%;
}

.square{
  position:relative;
  width:100%;
  height:100%;
  user-select:none;
  overflow:hidden;
  perspective:900px;
}

.white{ background:var(--light); }
.black{ background:var(--dark); }

.coord{
  position:absolute;
  font-size:10px;
  opacity:.65;
  font-weight:700;
  pointer-events:none;
  z-index:4;
}

.coord.file{
  left:5px;
  bottom:3px;
}

.coord.rank{
  right:4px;
  top:2px;
}

.card{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:none;
  background:none;
  padding:0;
  margin:0;
  cursor:pointer;
  touch-action:manipulation;
}

.card-inner{
  position:relative;
  width:100%;
  height:100%;
  transition:transform .42s ease;
  transform-style:preserve-3d;
}

.square.flipped .card-inner,
.square.matched .card-inner{
  transform:rotateY(180deg);
}

.face{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
}

.back{
  background:transparent;
}

.back::before{
  content:"";
  width:44%;
  height:44%;
  border-radius:50%;
  background:rgba(0,0,0,.10);
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.08),
    0 1px 3px rgba(0,0,0,.12);
}

.front{
  transform:rotateY(180deg);
}

.piece{
  line-height:1;
  position:relative;
  z-index:2;
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
  filter:drop-shadow(0 1px 0 rgba(0,0,0,.22));
}

.piece.N,.piece.B,.piece.R,.piece.Q,.piece.K,
.piece.n,.piece.b,.piece.r,.piece.q,.piece.k{
  font-size:clamp(30px, 6.2vw, 46px);
}

.piece.P{
  font-size:clamp(25px, 5.1vw, 38px);
}

.piece.p{
  font-size:clamp(22px, 4.6vw, 33px);
  transform:scale(.78);
}

.white-piece{
  color:#ffffff;
  text-shadow:
    0 0 1px #000,
    0 0 2px #000,
    0 1px 2px rgba(0,0,0,.55),
    0 0 6px rgba(255,255,255,.16);
}

.black-piece{
  color:#141414;
  text-shadow:
    0 0 1px rgba(255,255,255,.18),
    0 1px 1px rgba(255,255,255,.06);
}

.square.matched{
  box-shadow:inset 0 0 0 3px rgba(212,175,55,.95);
}

.controls{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:28px;
  background:var(--panel);
}

.control-btn{
  width:52px;
  height:52px;
  border:none;
  background:var(--bg);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  appearance:none;
  -webkit-appearance:none;
  cursor:pointer;
  touch-action:manipulation;
  box-shadow:none;
  padding:0;
}

.control-btn span{
  font-size:24px;
  line-height:1;
  display:block;
}

.control-btn:active{
  transform:scale(.94);
}

.footer-note{
  text-align:center;
  color:#cfcfcf;
  font-size:12px;
  line-height:1.35;
  margin-top:4px;
  opacity:.82;
}

@media (max-width:420px){
  .control-btn{
    width:46px;
    height:46px;
  }

  .control-btn span{
    font-size:22px;
  }

  .piece.N,.piece.B,.piece.R,.piece.Q,.piece.K,
  .piece.n,.piece.b,.piece.r,.piece.q,.piece.k{
    font-size:clamp(26px, 6vw, 40px);
  }

  .piece.P{
    font-size:clamp(22px, 4.8vw, 34px);
  }

  .piece.p{
    font-size:clamp(20px, 4.1vw, 30px);
  }
}
</style>
</head>
<body>

<h1>CHESSMEMORY</h1>

<div class="app">
  <div class="top-panel">
    <select id="modeSelect">
      <option value="same">Mêmes pièces</option>
      <option value="opposite">Blanc / noir</option>
    </select>
  </div>

  <div id="board-container">
    <div id="board"></div>
  </div>

  <div class="controls-panel">
    <div class="controls">
      <button class="control-btn" id="restartBtn" type="button" aria-label="Rejouer"><span>🔄</span></button>
    </div>
  </div>

  <div class="footer-note">Jeu imaginé par Luis et créé par ChatGPT</div>
</div>

<script>
const boardEl=document.getElementById("board");
const modeSelect=document.getElementById("modeSelect");
const restartBtn=document.getElementById("restartBtn");

const FILES=["a","b","c","d","e","f","g","h"];
const PIECES={
  "P":"♙","N":"♘","B":"♗","R":"♖","Q":"♕","K":"♔",
  "p":"♟","n":"♞","b":"♝","r":"♜","q":"♛","k":"♚"
};

const SAME_MODE_DECK = [
  {piece:"K", pairId:"K1"}, {piece:"K", pairId:"K1"},
  {piece:"k", pairId:"k1"}, {piece:"k", pairId:"k1"},
  {piece:"Q", pairId:"Q1"}, {piece:"Q", pairId:"Q1"},
  {piece:"q", pairId:"q1"}, {piece:"q", pairId:"q1"},

  {piece:"R", pairId:"R1"}, {piece:"R", pairId:"R1"},
  {piece:"R", pairId:"R2"}, {piece:"R", pairId:"R2"},
  {piece:"r", pairId:"r1"}, {piece:"r", pairId:"r1"},
  {piece:"r", pairId:"r2"}, {piece:"r", pairId:"r2"},

  {piece:"B", pairId:"B1"}, {piece:"B", pairId:"B1"},
  {piece:"B", pairId:"B2"}, {piece:"B", pairId:"B2"},
  {piece:"b", pairId:"b1"}, {piece:"b", pairId:"b1"},
  {piece:"b", pairId:"b2"}, {piece:"b", pairId:"b2"},

  {piece:"N", pairId:"N1"}, {piece:"N", pairId:"N1"},
  {piece:"N", pairId:"N2"}, {piece:"N", pairId:"N2"},
  {piece:"n", pairId:"n1"}, {piece:"n", pairId:"n1"},
  {piece:"n", pairId:"n2"}, {piece:"n", pairId:"n2"},

  {piece:"P", pairId:"Pw1"}, {piece:"P", pairId:"Pw1"},
  {piece:"P", pairId:"Pw2"}, {piece:"P", pairId:"Pw2"},
  {piece:"P", pairId:"Pw3"}, {piece:"P", pairId:"Pw3"},
  {piece:"P", pairId:"Pw4"}, {piece:"P", pairId:"Pw4"},
  {piece:"P", pairId:"Pw5"}, {piece:"P", pairId:"Pw5"},
  {piece:"P", pairId:"Pw6"}, {piece:"P", pairId:"Pw6"},
  {piece:"P", pairId:"Pw7"}, {piece:"P", pairId:"Pw7"},
  {piece:"P", pairId:"Pw8"}, {piece:"P", pairId:"Pw8"},

  {piece:"p", pairId:"Pb1"}, {piece:"p", pairId:"Pb1"},
  {piece:"p", pairId:"Pb2"}, {piece:"p", pairId:"Pb2"},
  {piece:"p", pairId:"Pb3"}, {piece:"p", pairId:"Pb3"},
  {piece:"p", pairId:"Pb4"}, {piece:"p", pairId:"Pb4"},
  {piece:"p", pairId:"Pb5"}, {piece:"p", pairId:"Pb5"},
  {piece:"p", pairId:"Pb6"}, {piece:"p", pairId:"Pb6"},
  {piece:"p", pairId:"Pb7"}, {piece:"p", pairId:"Pb7"},
  {piece:"p", pairId:"Pb8"}, {piece:"p", pairId:"Pb8"}
];

const OPPOSITE_MODE_DECK = [
  {piece:"K", pairId:"K1"}, {piece:"k", pairId:"K1"},
  {piece:"Q", pairId:"Q1"}, {piece:"q", pairId:"Q1"},

  {piece:"R", pairId:"R1"}, {piece:"r", pairId:"R1"},
  {piece:"R", pairId:"R2"}, {piece:"r", pairId:"R2"},
  {piece:"R", pairId:"R3"}, {piece:"r", pairId:"R3"},
  {piece:"R", pairId:"R4"}, {piece:"r", pairId:"R4"},

  {piece:"B", pairId:"B1"}, {piece:"b", pairId:"B1"},
  {piece:"B", pairId:"B2"}, {piece:"b", pairId:"B2"},
  {piece:"B", pairId:"B3"}, {piece:"b", pairId:"B3"},
  {piece:"B", pairId:"B4"}, {piece:"b", pairId:"B4"},

  {piece:"N", pairId:"N1"}, {piece:"n", pairId:"N1"},
  {piece:"N", pairId:"N2"}, {piece:"n", pairId:"N2"},
  {piece:"N", pairId:"N3"}, {piece:"n", pairId:"N3"},
  {piece:"N", pairId:"N4"}, {piece:"n", pairId:"N4"},

  {piece:"P", pairId:"P1"}, {piece:"p", pairId:"P1"},
  {piece:"P", pairId:"P2"}, {piece:"p", pairId:"P2"},
  {piece:"P", pairId:"P3"}, {piece:"p", pairId:"P3"},
  {piece:"P", pairId:"P4"}, {piece:"p", pairId:"P4"},
  {piece:"P", pairId:"P5"}, {piece:"p", pairId:"P5"},
  {piece:"P", pairId:"P6"}, {piece:"p", pairId:"P6"},
  {piece:"P", pairId:"P7"}, {piece:"p", pairId:"P7"},
  {piece:"P", pairId:"P8"}, {piece:"p", pairId:"P8"},

  {piece:"K", pairId:"K2"}, {piece:"k", pairId:"K2"},
  {piece:"Q", pairId:"Q2"}, {piece:"q", pairId:"Q2"},

  {piece:"R", pairId:"R5"}, {piece:"r", pairId:"R5"},
  {piece:"R", pairId:"R6"}, {piece:"r", pairId:"R6"},
  {piece:"R", pairId:"R7"}, {piece:"r", pairId:"R7"},
  {piece:"R", pairId:"R8"}, {piece:"r", pairId:"R8"},

  {piece:"B", pairId:"B5"}, {piece:"b", pairId:"B5"},
  {piece:"B", pairId:"B6"}, {piece:"b", pairId:"B6"},
  {piece:"B", pairId:"B7"}, {piece:"b", pairId:"B7"},
  {piece:"B", pairId:"B8"}, {piece:"b", pairId:"B8"},

  {piece:"N", pairId:"N5"}, {piece:"n", pairId:"N5"},
  {piece:"N", pairId:"N6"}, {piece:"n", pairId:"N6"},
  {piece:"N", pairId:"N7"}, {piece:"n", pairId:"N7"},
  {piece:"N", pairId:"N8"}, {piece:"n", pairId:"N8"},

  {piece:"P", pairId:"P9"},  {piece:"p", pairId:"P9"},
  {piece:"P", pairId:"P10"}, {piece:"p", pairId:"P10"},
  {piece:"P", pairId:"P11"}, {piece:"p", pairId:"P11"},
  {piece:"P", pairId:"P12"}, {piece:"p", pairId:"P12"},
  {piece:"P", pairId:"P13"}, {piece:"p", pairId:"P13"},
  {piece:"P", pairId:"P14"}, {piece:"p", pairId:"P14"},
  {piece:"P", pairId:"P15"}, {piece:"p", pairId:"P15"},
  {piece:"P", pairId:"P16"}, {piece:"p", pairId:"P16"}
];

let squares=[];
let picks=[];
let lockBoard=false;
let matchedPairs=0;
let totalPairs=32;

function shuffle(array){
  const arr=[...array];
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function createDeck(){
  const source = modeSelect.value==="opposite" ? OPPOSITE_MODE_DECK : SAME_MODE_DECK;
  return shuffle(source.map((card,index)=>({
    piece:card.piece,
    pairId:card.pairId,
    uid:"u"+index+"-"+Math.random().toString(36).slice(2,8),
    revealed:false,
    matched:false
  })));
}

function coordsToSquare(file,rank){
  return FILES[file]+String(rank+1);
}

function createBoard(){
  squares=createDeck();
  picks=[];
  lockBoard=false;
  matchedPairs=0;
  renderBoard();
}

function renderBoard(){
  boardEl.innerHTML="";

  for(let row=7;row>=0;row--){
    for(let col=0;col<8;col++){
      const idx=row*8+col;
      const data=squares[idx];

      const sq=document.createElement("div");
      sq.className="square "+(((row+col)%2===0)?"white":"black");

      if(data.revealed || data.matched) sq.classList.add("flipped");
      if(data.matched) sq.classList.add("matched");

      const button=document.createElement("button");
      button.className="card";
      button.type="button";
      button.setAttribute("aria-label", coordsToSquare(col,row));

      const inner=document.createElement("div");
      inner.className="card-inner";

      const back=document.createElement("div");
      back.className="face back";

      const front=document.createElement("div");
      front.className="face front";

      const piece=document.createElement("span");
      piece.className="piece "+(data.piece===data.piece.toUpperCase() ? "white-piece " : "black-piece ")+data.piece;
      piece.textContent=PIECES[data.piece];

      front.appendChild(piece);
      inner.appendChild(back);
      inner.appendChild(front);
      button.appendChild(inner);
      button.onclick=()=>handleSquare(idx);
      sq.appendChild(button);

      if(row===0){
        const file=document.createElement("span");
        file.className="coord file";
        file.textContent=FILES[col];
        sq.appendChild(file);
      }

      if(col===7){
        const rank=document.createElement("span");
        rank.className="coord rank";
        rank.textContent=String(row+1);
        sq.appendChild(rank);
      }

      boardEl.appendChild(sq);
    }
  }
}

function isPair(a,b){
  return a.pairId===b.pairId && a.uid!==b.uid;
}

function handleSquare(index){
  if(lockBoard) return;

  const card=squares[index];
  if(card.matched || card.revealed) return;

  card.revealed=true;
  picks.push(index);
  renderBoard();

  if(picks.length<2) return;

  lockBoard=true;

  const [i1,i2]=picks;
  const a=squares[i1];
  const b=squares[i2];

  if(isPair(a,b)){
    a.matched=true;
    b.matched=true;
    matchedPairs++;
    picks=[];
    lockBoard=false;
    renderBoard();

    if(matchedPairs===totalPairs){
      setTimeout(()=>alert("✓"),160);
    }
    return;
  }

  setTimeout(()=>{
    a.revealed=false;
    b.revealed=false;
    picks=[];
    lockBoard=false;
    renderBoard();
  },700);
}

modeSelect.addEventListener("change",createBoard);
restartBtn.addEventListener("click",createBoard);

createBoard();
</script>

</body>
</html>
