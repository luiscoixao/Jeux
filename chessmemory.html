<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>CHESSMEMORY</title>

<link rel="apple-touch-icon" href="iconchessmemory.png" />
<link rel="icon" href="iconchessmemory.png" />

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CHESSMEMORY" />
<meta name="theme-color" content="#2c2c2c" />

<style>
:root{
  --bg:#2c2c2c;
  --panel:#3a3a3a;
  --light:#eeeed2;
  --dark:#769656;
  --text:#ffffff;
  --gold:#d4af37;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0 12px calc(18px + env(safe-area-inset-bottom));
}

h1{
  margin:calc(env(safe-area-inset-top) + 18px) 0 12px;
  font-size:28px;
  font-weight:700;
  text-align:center;
}

.app{
  width:100%;
  max-width:560px;
}

#board-container{
  width:95vw;
  max-width:500px;
  aspect-ratio:1;
  overflow:hidden;
  margin-bottom:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

#board{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  width:100%;
  height:100%;
}

.square{
  position:relative;
  width:100%;
  height:100%;
  user-select:none;
  overflow:hidden;
  perspective:900px;
}

.white{ background:var(--light); }
.black{ background:var(--dark); }

.card{
  position:absolute;
  inset:0;
  border:none;
  background:none;
  cursor:pointer;
}

.card-inner{
  width:100%;
  height:100%;
  transition:transform .42s ease;
  transform-style:preserve-3d;
}

.square.flipped .card-inner{
  transform:rotateY(180deg);
}

.face{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  backface-visibility:hidden;
}

.front{
  transform:rotateY(180deg);
}

/* ===== PIÈCES AGRANDIES (CORRECTION RÉELLE) ===== */
.piece{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
  line-height:1;

  /* taille basée sur la case réelle */
  font-size:calc(min(100vw, 500px) / 8 * 0.88);
}

/* uniformité totale */
.piece-K,.piece-Q,.piece-R,.piece-B,.piece-N,
.piece-k,.piece-q,.piece-r,.piece-b,.piece-n{
  font-size:inherit;
}

.white-piece{
  color:#fff;
  text-shadow:
    0 0 2px #000,
    0 2px 4px rgba(0,0,0,.5);
}

.black-piece{
  color:#111;
  text-shadow:
    0 1px 2px rgba(255,255,255,.2);
}

.square.matched{
  box-shadow:inset 0 0 0 3px gold;
}

.controls-panel{
  background:var(--panel);
  padding:14px;
}

.controls{
  display:flex;
  justify-content:center;
}

.control-btn{
  width:52px;
  height:52px;
  border:none;
  background:var(--bg);
  color:#fff;
  font-size:22px;
}

.footer-note{
  text-align:center;
  font-size:12px;
  margin-top:6px;
  opacity:.7;
}
</style>
</head>

<body>

<h1>CHESSMEMORY</h1>

<div class="app">
  <div id="board-container">
    <div id="board"></div>
  </div>

  <div class="controls-panel">
    <div class="controls">
      <button class="control-btn" id="restartBtn">🔄</button>
    </div>
  </div>

  <div class="footer-note">Jeu imaginé par Luis et créé par ChatGPT</div>
</div>

<script>
const board=document.getElementById("board");
const restartBtn=document.getElementById("restartBtn");

const PIECES={
  K:"♔",Q:"♕",R:"♖",B:"♗",N:"♘",
  k:"♚",q:"♛",r:"♜",b:"♝",n:"♞"
};

const BASE=[
  "K","K","k","k","Q","Q","q","q",
  "R","R","R","R","r","r","r","r",
  "B","B","B","B","b","b","b","b",
  "N","N","N","N","n","n","n","n"
];

let cards=[];
let picks=[];
let lock=false;
let matched=0;

function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

function init(){
  const deck=shuffle([...BASE,...BASE]);
  cards=deck.map((p,i)=>({p,id:i,state:"hidden"}));
  picks=[];
  matched=0;
  lock=false;
  draw();
}

function draw(){
  board.innerHTML="";
  for(let i=0;i<64;i++){
    const c=cards[i];

    const sq=document.createElement("div");
    sq.className="square "+((Math.floor(i/8)+i%8)%2?"black":"white");

    if(c.state!=="hidden") sq.classList.add("flipped");
    if(c.state==="matched") sq.classList.add("matched");

    const btn=document.createElement("button");
    btn.className="card";
    btn.onclick=()=>click(i);

    const inner=document.createElement("div");
    inner.className="card-inner";

    const front=document.createElement("div");
    front.className="face front";

    const back=document.createElement("div");
    back.className="face";

    const span=document.createElement("span");
    span.className="piece "+(c.p===c.p.toUpperCase()?"white-piece ":"black-piece ")+"piece-"+c.p;
    span.textContent=PIECES[c.p];

    front.appendChild(span);
    inner.appendChild(back);
    inner.appendChild(front);
    btn.appendChild(inner);
    sq.appendChild(btn);
    board.appendChild(sq);
  }
}

function click(i){
  if(lock) return;
  const c=cards[i];
  if(c.state!=="hidden") return;

  c.state="shown";
  picks.push(i);
  draw();

  if(picks.length<2) return;

  lock=true;
  const [a,b]=picks;

  if(cards[a].p===cards[b].p){
    cards[a].state="matched";
    cards[b].state="matched";
    matched++;
    picks=[];
    lock=false;
    draw();

    if(matched===32){
      setTimeout(()=>alert("Bravo 🎉"),200);
    }
  }else{
    setTimeout(()=>{
      cards[a].state="hidden";
      cards[b].state="hidden";
      picks=[];
      lock=false;
      draw();
    },600);
  }
}

restartBtn.onclick=init;

init();
</script>

</body>
</html>
