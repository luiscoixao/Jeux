<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>CHESSMEMORY</title>

<link rel="apple-touch-icon" href="iconchessmemory.png" />
<link rel="icon" href="iconchessmemory.png" />

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CHESSMEMORY" />
<meta name="theme-color" content="#2c2c2c" />

<style>
:root{
  --bg:#2c2c2c;
  --panel:#3a3a3a;
  --light:#eeeed2;
  --dark:#769656;
  --text:#ffffff;
  --gold:#d4af37;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0 12px calc(18px + env(safe-area-inset-bottom));
}

h1{
  margin:calc(env(safe-area-inset-top) + 18px) 0 12px;
  font-size:28px;
  line-height:1.08;
  font-weight:700;
  text-align:center;
}

.app{
  width:100%;
  max-width:560px;
}

.top-panel,
.controls-panel{
  background:var(--panel);
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.18);
}

select{
  width:100%;
  height:48px;
  border:none;
  background:#4a4a4a;
  color:#fff;
  font-size:16px;
  padding:0 14px;
  appearance:none;
  -webkit-appearance:none;
}

#board-container{
  width:95vw;
  max-width:500px;
  aspect-ratio:1 / 1;
  overflow:hidden;
  margin-bottom:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

#board{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  width:100%;
  height:100%;
}

.square{
  position:relative;
  width:100%;
  height:100%;
  user-select:none;
  overflow:hidden;
  perspective:900px;
}

.white{ background:var(--light); }
.black{ background:var(--dark); }

.coord{
  position:absolute;
  font-size:10px;
  opacity:.65;
  font-weight:700;
  pointer-events:none;
  z-index:4;
}

.coord.file{
  left:5px;
  bottom:3px;
}

.coord.rank{
  right:4px;
  top:2px;
}

.card{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:none;
  background:none;
  padding:0;
  margin:0;
  cursor:pointer;
  touch-action:manipulation;
}

.card-inner{
  position:relative;
  width:100%;
  height:100%;
  transition:transform .42s ease;
  transform-style:preserve-3d;
}

.square.flipped .card-inner,
.square.matched .card-inner{
  transform:rotateY(180deg);
}

.face{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
}

.back{
  background:transparent;
}

.back::before{
  content:"";
  width:44%;
  height:44%;
  border-radius:50%;
  background:rgba(0,0,0,.10);
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.08),
    0 1px 3px rgba(0,0,0,.12);
}

.front{
  transform:rotateY(180deg);
}

.piece{
  line-height:1;
  position:relative;
  z-index:2;
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
  filter:drop-shadow(0 1px 0 rgba(0,0,0,.22));
}

.piece.N,.piece.B,.piece.R,.piece.Q,.piece.K,
.piece.n,.piece.b,.piece.r,.piece.q,.piece.k{
  font-size:clamp(30px, 6.2vw, 46px);
}

.piece.P{
  font-size:clamp(25px, 5.1vw, 38px);
}

.piece.p{
  font-size:clamp(22px, 4.6vw, 33px);
  transform:scale(.78);
}

.white-piece{
  color:#ffffff;
  text-shadow:
    0 0 1px #000,
    0 0 2px #000,
    0 1px 2px rgba(0,0,0,.55),
    0 0 6px rgba(255,255,255,.16);
}

.black-piece{
  color:#141414;
  text-shadow:
    0 0 1px rgba(255,255,255,.18),
    0 1px 1px rgba(255,255,255,.06);
}

.square.matched{
  box-shadow:inset 0 0 0 3px rgba(212,175,55,.95);
}

.controls{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:28px;
  background:var(--panel);
}

.control-btn{
  width:52px;
  height:52px;
  border:none;
  background:var(--bg);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}

.control-btn span{
  font-size:24px;
}

.footer-note{
  text-align:center;
  color:#cfcfcf;
  font-size:12px;
  margin-top:4px;
  opacity:.82;
}
</style>
</head>
<body>

<h1>CHESSMEMORY</h1>

<div class="app">
  <div class="top-panel">
    <select id="modeSelect">
      <option value="32">32 cases occupées</option>
      <option value="64">64 cases occupées</option>
    </select>
  </div>

  <div id="board-container">
    <div id="board"></div>
  </div>

  <div class="controls-panel">
    <div class="controls">
      <button class="control-btn" id="restartBtn"><span>🔄</span></button>
    </div>
  </div>

  <div class="footer-note">Jeu imaginé par Luis et créé par ChatGPT</div>
</div>

<script>
const boardEl=document.getElementById("board");
const modeSelect=document.getElementById("modeSelect");
const restartBtn=document.getElementById("restartBtn");

const FILES=["a","b","c","d","e","f","g","h"];
const PIECES={
  "P":"♙","N":"♘","B":"♗","R":"♖","Q":"♕","K":"♔",
  "p":"♟","n":"♞","b":"♝","r":"♜","q":"♛","k":"♚"
};

const PAIRS_BASE=[
  ["K","K"],["k","k"],
  ["Q","Q"],["q","q"],
  ["R","R"],["r","r"],["R","R"],["r","r"],
  ["B","B"],["b","b"],["B","B"],["b","b"],
  ["N","N"],["n","n"],["N","N"],["n","n"],
  ["P","P"],["p","p"],["P","P"],["p","p"],
  ["P","P"],["p","p"],["P","P"],["p","p"]
];

let squares=[];
let firstPick=null;
let secondPick=null;
let lockBoard=false;
let matchedPairs=0;
let totalPairs=0;

function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

function buildDeck(mode){
  const pairSource = mode==="64" ? [...PAIRS_BASE, ...PAIRS_BASE] : [...PAIRS_BASE];

  const cards=[];
  pairSource.forEach((pair,idx)=>{
    cards.push({piece:pair[0],pairId:"pair-"+idx,uid:"a-"+idx+Math.random()});
    cards.push({piece:pair[1],pairId:"pair-"+idx,uid:"b-"+idx+Math.random()});
  });

  return shuffle(cards);
}

function createBoard(){
  const deck=buildDeck(modeSelect.value);

  squares=[];
  firstPick=null;
  secondPick=null;
  lockBoard=false;
  matchedPairs=0;
  totalPairs=deck.length/2;

  const needed = modeSelect.value==="64" ? 64 : 32;
  const cells=shuffle([...Array(64).keys()]);
  const filled=new Set(cells.slice(0,needed));

  let d=0;
  for(let i=0;i<64;i++){
    if(filled.has(i)){
      squares.push({...deck[d++],flipped:false,matched:false,empty:false});
    }else{
      squares.push({empty:true});
    }
  }

  renderBoard();
}

function renderBoard(){
  boardEl.innerHTML="";

  for(let r=7;r>=0;r--){
    for(let c=0;c<8;c++){
      const i=r*8+c;
      const data=squares[i];

      const sq=document.createElement("div");
      sq.className="square "+(((r+c)%2===0)?"white":"black");
      if(data.flipped) sq.classList.add("flipped");
      if(data.matched) sq.classList.add("matched");

      if(!data.empty){
        const btn=document.createElement("button");
        btn.className="card";

        const inner=document.createElement("div");
        inner.className="card-inner";

        const back=document.createElement("div");
        back.className="face back";

        const front=document.createElement("div");
        front.className="face front";

        const p=document.createElement("span");
        p.className="piece "+(data.piece===data.piece.toUpperCase()?"white-piece ":"black-piece ")+data.piece;
        p.textContent=PIECES[data.piece];

        front.appendChild(p);
        inner.appendChild(back);
        inner.appendChild(front);
        btn.appendChild(inner);

        btn.onclick=()=>handleSquare(i);
        sq.appendChild(btn);
      }

      boardEl.appendChild(sq);
    }
  }
}

function isPair(a,b){
  return a && b && !a.empty && !b.empty && a.pairId===b.pairId && a.uid!==b.uid;
}

function handleSquare(i){
  if(lockBoard) return;

  const card=squares[i];
  if(card.empty || card.flipped || card.matched) return;

  card.flipped=true;
  renderBoard();

  if(firstPick===null){
    firstPick=i;
    return;
  }

  secondPick=i;
  lockBoard=true;

  const a=squares[firstPick];
  const b=squares[secondPick];

  if(isPair(a,b)){
    a.flipped=true;
    b.flipped=true;
    a.matched=true;
    b.matched=true;

    matchedPairs++;
    firstPick=null;
    secondPick=null;
    lockBoard=false;

    renderBoard();

    if(matchedPairs===totalPairs){
      setTimeout(()=>alert("✓"),150);
    }

    return;
  }

  setTimeout(()=>{
    a.flipped=false;
    b.flipped=false;
    firstPick=null;
    secondPick=null;
    lockBoard=false;
    renderBoard();
  },700);
}

modeSelect.onchange=createBoard;
restartBtn.onclick=createBoard;

createBoard();
</script>

</body>
</html>
