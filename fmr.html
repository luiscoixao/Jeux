<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLASHGRID</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#eef2ff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

.controls{
  display:flex;
  gap:8px;
  margin-bottom:12px;
}

button{
  padding:10px 12px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  background:#fff;
}

.active{
  background:#111;
  color:#fff;
}

.grid{
  display:grid;
  gap:10px;
  width:90vw;
  max-width:420px;
}

.tile{
  aspect-ratio:1;
  background:#fff;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  font-weight:bold;
  cursor:pointer;
}

.hidden{color:transparent}
.correct{background:#22c55e;color:#fff}
</style>
</head>

<body>

<div class="controls">
  <button data-mode="classic" class="active">Classique</button>
  <button data-mode="memory">Mémoire</button>
  <button data-mode="flash">Flash</button>
  <button id="start">Start</button>
</div>

<div id="grid" class="grid"></div>

<script>
let mode="classic";
let size=4;
let order=[];
let next=1;

document.querySelectorAll("[data-mode]").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll("[data-mode]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    mode=btn.dataset.mode;
  };
});

document.getElementById("start").onclick=start;

function start(){
  const total=size*size;
  order=[...Array(total)].map((_,i)=>i+1).sort(()=>Math.random()-0.5);
  next=1;

  const grid=document.getElementById("grid");
  grid.innerHTML="";
  grid.style.gridTemplateColumns=`repeat(${size},1fr)`;

  order.forEach(n=>{
    const tile=document.createElement("div");
    tile.className="tile";
    tile.textContent=n;
    tile.onclick=()=>clickTile(tile,n);
    grid.appendChild(tile);
  });

  if(mode==="memory"){
    setTimeout(hideAll,2000);
  }
  if(mode==="flash"){
    setTimeout(hideAll,800);
  }
}

function hideAll(){
  document.querySelectorAll(".tile").forEach(t=>t.classList.add("hidden"));
}

function clickTile(tile,n){
  if(n===next){
    tile.classList.remove("hidden");
    tile.classList.add("correct");
    next++;
  }
}
</script>

</body>
</html>
