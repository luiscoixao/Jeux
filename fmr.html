<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>Memory Games</title>

<meta name="theme-color" content="#4f46e5" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Memory Games" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="apple-touch-icon" href="iconmemorygames.png" />
<link rel="icon" type="image/png" href="iconmemorygames.png" />

<style>
:root{
  --bg1:#4338ca;
  --bg2:#7c3aed;
  --bg3:#312e81;
  --panel:rgba(255,255,255,.10);
  --panel-line:rgba(255,255,255,.22);
  --text:#ffffff;
  --text-dark:#0f172a;
  --card:#ffffff;
  --green:#22c55e;
  --pink:#ff3cac;
  --cyan:#38bdf8;
  --yellow:#fde047;
  --violet:#8b5cf6;
  --shadow:0 18px 40px rgba(0,0,0,.22);
}
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
html,body{
  margin:0;
  padding:0;
}
body{
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 10% 15%, rgba(56,189,248,.35), transparent 20%),
    radial-gradient(circle at 90% 12%, rgba(255,60,172,.35), transparent 20%),
    radial-gradient(circle at 20% 90%, rgba(34,197,94,.22), transparent 22%),
    linear-gradient(135deg,var(--bg1),var(--bg2) 55%, #5b21b6 75%, var(--bg3));
  padding:18px 16px 120px;
  display:flex;
  justify-content:center;
}
.app{
  width:100%;
  max-width:460px;
}
h1{
  margin:8px 0 14px;
  text-align:center;
  font-size:40px;
  line-height:1;
  font-weight:900;
  letter-spacing:.4px;
}
.hidden{
  display:none !important;
}

.menu{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.game-card{
  border-radius:30px;
  padding:16px 14px 18px;
  min-height:280px;
  position:relative;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.22);
  background:rgba(10,16,40,.36);
  backdrop-filter:blur(10px);
  box-shadow:var(--shadow);
  cursor:pointer;
  transition:transform .15s ease, box-shadow .2s ease, outline .2s ease;
}
.game-card:active{
  transform:scale(.985);
}
.game-card.active{
  outline:3px solid rgba(255,255,255,.28);
}
.game-card.cyan{
  box-shadow:
    0 0 0 1px rgba(255,255,255,.06) inset,
    0 0 26px rgba(56,189,248,.35),
    0 18px 40px rgba(0,0,0,.22);
}
.game-card.pink{
  box-shadow:
    0 0 0 1px rgba(255,255,255,.06) inset,
    0 0 26px rgba(255,60,172,.30),
    0 18px 40px rgba(0,0,0,.22);
}
.mini-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:16px;
}
.mini-cell{
  aspect-ratio:1/1;
  border-radius:16px;
  background:rgba(255,255,255,.15);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);
}
.mini-cell.green{background:linear-gradient(135deg,#22c55e,#16a34a); box-shadow:0 0 18px rgba(34,197,94,.35);}
.mini-cell.yellow{background:linear-gradient(135deg,#fde047,#facc15); box-shadow:0 0 18px rgba(253,224,71,.35);}
.mini-cell.pink{background:linear-gradient(135deg,#ff4fb0,#ec4899); box-shadow:0 0 18px rgba(255,79,176,.35);}
.mini-cell.cyan{background:linear-gradient(135deg,#67e8f9,#38bdf8); box-shadow:0 0 18px rgba(56,189,248,.35);}
.mini-cell.violet{background:linear-gradient(135deg,#a78bfa,#8b5cf6); box-shadow:0 0 18px rgba(139,92,246,.35);}
.game-title{
  font-size:24px;
  line-height:1.05;
  font-weight:900;
  margin-bottom:10px;
}
.game-sub{
  font-size:13px;
  line-height:1.35;
  color:rgba(255,255,255,.82);
}

.signature{
  text-align:center;
  font-size:11px;
  color:rgba(255,255,255,.62);
  margin-top:14px;
}

.status{
  min-height:26px;
  text-align:center;
  font-size:14px;
  font-weight:800;
  color:rgba(255,255,255,.94);
  margin:12px 0 6px;
}

.game-wrap{
  margin-top:14px;
  border-radius:30px;
  border:1px solid var(--panel-line);
  background:var(--panel);
  backdrop-filter:blur(12px);
  padding:14px;
  box-shadow:var(--shadow);
}

.game-grid{
  display:grid;
  gap:12px;
  width:100%;
}
.grid-3{
  grid-template-columns:repeat(3,minmax(0,1fr));
}
.grid-4{
  grid-template-columns:repeat(4,minmax(0,1fr));
}
.tile{
  width:100%;
  aspect-ratio:1/1;
  min-width:0;
  border-radius:20px;
  border:none;
  background:rgba(255,255,255,.18);
  color:transparent;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.08), 0 12px 22px rgba(0,0,0,.16);
  transition:transform .12s ease, opacity .18s ease, background .18s ease, box-shadow .18s ease;
}
.tile:active{
  transform:scale(.97);
}
.tile.seq-green{background:linear-gradient(135deg,#22c55e,#16a34a); box-shadow:0 0 24px rgba(34,197,94,.45);}
.tile.seq-yellow{background:linear-gradient(135deg,#fde047,#facc15); box-shadow:0 0 24px rgba(253,224,71,.45);}
.tile.seq-pink{background:linear-gradient(135deg,#ff4fb0,#ec4899); box-shadow:0 0 24px rgba(255,79,176,.45);}
.tile.seq-cyan{background:linear-gradient(135deg,#67e8f9,#38bdf8); box-shadow:0 0 24px rgba(56,189,248,.45);}
.tile.seq-violet{background:linear-gradient(135deg,#a78bfa,#8b5cf6); box-shadow:0 0 24px rgba(139,92,246,.45);}
.tile.correct{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  box-shadow:0 0 24px rgba(34,197,94,.45);
}
.tile.wrong{
  background:linear-gradient(135deg,#ef4444,#dc2626);
  box-shadow:0 0 20px rgba(239,68,68,.35);
}

.playbar{
  position:fixed;
  left:16px;
  right:16px;
  bottom:16px;
  display:flex;
  justify-content:center;
  z-index:30;
}
.play-btn{
  min-width:220px;
  max-width:460px;
  width:min(100%, 340px);
  min-height:64px;
  border:none;
  border-radius:24px;
  background:linear-gradient(135deg,#22c55e,#10b981);
  color:#fff;
  font-size:20px;
  font-weight:900;
  text-align:center;
  box-shadow:0 18px 34px rgba(0,0,0,.26), 0 0 28px rgba(34,197,94,.28);
  cursor:pointer;
}
@media (max-width:420px){
  .game-title{font-size:21px}
}
</style>
</head>
<body>
  <div class="app">
    <h1>MEMORY GAMES</h1>

    <section id="homeSection" class="menu">
      <div class="game-card cyan active" data-game-card="sequence">
        <div class="mini-grid">
          <div class="mini-cell green"></div>
          <div class="mini-cell"></div>
          <div class="mini-cell pink"></div>
          <div class="mini-cell yellow"></div>
          <div class="mini-cell cyan"></div>
          <div class="mini-cell"></div>
          <div class="mini-cell"></div>
          <div class="mini-cell violet"></div>
          <div class="mini-cell"></div>
        </div>
        <div class="game-title">Séquence<br>à retenir</div>
        <div class="game-sub">Mémorisez la séquence lumineuse, puis reproduisez-la.</div>
      </div>

      <div class="game-card pink" data-game-card="grid">
        <div class="mini-grid">
          <div class="mini-cell"></div>
          <div class="mini-cell cyan"></div>
          <div class="mini-cell"></div>
          <div class="mini-cell"></div>
          <div class="mini-cell"></div>
          <div class="mini-cell pink"></div>
          <div class="mini-cell"></div>
          <div class="mini-cell"></div>
          <div class="mini-cell green"></div>
        </div>
        <div class="game-title">Grille<br>disparaissante</div>
        <div class="game-sub">Mémorisez les cases colorées, puis retrouvez-les.</div>
      </div>
    </section>

    <div id="status" class="status hidden"></div>

    <section id="gameWrap" class="game-wrap hidden">
      <div id="sequenceGrid" class="game-grid grid-3 hidden"></div>
      <div id="gridGame" class="game-grid grid-4 hidden"></div>
    </section>

    <div class="signature">Jeu créé par Luis Coixao à l'aide de ChatGPT.</div>
  </div>

  <div class="playbar hidden" id="playBar">
    <button id="playBtn" class="play-btn" type="button">Jouer</button>
  </div>

<script>
const COLORS = ["seq-green","seq-yellow","seq-pink","seq-cyan","seq-violet"];

const state = {
  game: null,
  playing: false,

  // séquence
  sequenceLevel: 1,
  sequencePattern: [],
  sequenceStep: 0,
  sequenceShowing: false,

  // grille
  gridLevel: 1,
  gridTargets: [],
  gridFound: 0
};

const homeSection = document.getElementById("homeSection");
const gameWrap = document.getElementById("gameWrap");
const playBar = document.getElementById("playBar");
const playBtn = document.getElementById("playBtn");
const statusEl = document.getElementById("status");
const sequenceGrid = document.getElementById("sequenceGrid");
const gridGame = document.getElementById("gridGame");

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function wait(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}

function randomUniqueIndices(count, max){
  return shuffle([...Array(max)].map((_,i)=>i)).slice(0,count);
}

function setActiveCard(game){
  document.querySelectorAll("[data-game-card]").forEach(card=>{
    card.classList.toggle("active", card.dataset.gameCard === game);
  });
}

function showMenu(){
  state.playing = false;
  homeSection.classList.remove("hidden");
  playBar.classList.remove("hidden");
  gameWrap.classList.add("hidden");
  sequenceGrid.classList.add("hidden");
  gridGame.classList.add("hidden");
  statusEl.classList.add("hidden");
  statusEl.textContent = "";
}

function selectGame(game){
  state.game = game;
  setActiveCard(game);
  playBar.classList.remove("hidden");
}

function buildSequenceGrid(){
  sequenceGrid.innerHTML = "";
  for(let i=0;i<9;i++){
    const tile = document.createElement("button");
    tile.type = "button";
    tile.className = "tile";
    tile.addEventListener("click", ()=>handleSequenceClick(i));
    sequenceGrid.appendChild(tile);
  }
}

function buildGridGame(){
  gridGame.innerHTML = "";
  for(let i=0;i<16;i++){
    const tile = document.createElement("button");
    tile.type = "button";
    tile.className = "tile";
    tile.addEventListener("click", ()=>handleGridClick(i, tile));
    gridGame.appendChild(tile);
  }
}

function resetSequenceBoard(){
  [...sequenceGrid.children].forEach(tile => {
    tile.className = "tile";
    tile.disabled = false;
  });
}

function resetGridBoard(){
  [...gridGame.children].forEach(tile => {
    tile.className = "tile";
    tile.disabled = false;
  });
}

function showStatus(text){
  statusEl.textContent = text;
  statusEl.classList.remove("hidden");
}

async function startGame(){
  if(!state.game || state.playing) return;

  state.playing = true;
  homeSection.classList.add("hidden");
  gameWrap.classList.remove("hidden");
  playBar.classList.add("hidden");

  showStatus("Prêt...");
  await wait(1000);

  if(state.game === "sequence"){
    startSequenceMode();
  } else {
    startGridMode();
  }
}

async function startSequenceMode(){
  state.sequenceLevel = 1;
  sequenceGrid.classList.remove("hidden");
  gridGame.classList.add("hidden");
  resetSequenceBoard();
  await playSequenceLevel();
}

async function playSequenceLevel(){
  resetSequenceBoard();
  state.sequenceStep = 0;
  state.sequenceShowing = true;
  state.sequencePattern = shuffle([0,1,2,3,4,5,6,7,8]).slice(0, state.sequenceLevel);

  showStatus(`Niveau ${state.sequenceLevel} / 9`);
  await wait(700);

  for(const idx of state.sequencePattern){
    const tile = sequenceGrid.children[idx];
    const color = COLORS[idx % COLORS.length];
    tile.className = "tile " + color;
    await wait(520);
    tile.className = "tile";
    await wait(160);
  }

  state.sequenceShowing = false;
  showStatus(`Retrouvez ${state.sequenceLevel} case${state.sequenceLevel > 1 ? "s" : ""}`);
}

function handleSequenceClick(index){
  if(!state.playing || state.game !== "sequence" || state.sequenceShowing) return;

  const tile = sequenceGrid.children[index];
  const color = COLORS[index % COLORS.length];
  tile.className = "tile " + color;

  setTimeout(()=>{
    if(state.playing && !tile.classList.contains("correct")){
      tile.className = "tile";
    }
  }, 180);

  if(index === state.sequencePattern[state.sequenceStep]){
    tile.className = "tile correct";
    tile.disabled = true;
    state.sequenceStep++;

    if(state.sequenceStep === state.sequencePattern.length){
      if(state.sequenceLevel === 9){
        finishAndBackToMenu("Bravo !");
      } else {
        state.sequenceLevel++;
        setTimeout(playSequenceLevel, 700);
      }
    }
  } else {
    tile.className = "tile wrong";
    setTimeout(()=>{ if(state.playing) tile.className = "tile"; }, 300);
  }
}

async function startGridMode(){
  state.gridLevel = 1;
  sequenceGrid.classList.add("hidden");
  gridGame.classList.remove("hidden");
  resetGridBoard();
  await playGridLevel();
}

async function playGridLevel(){
  resetGridBoard();
  state.gridFound = 0;
  state.gridTargets = randomUniqueIndices(state.gridLevel, 16);

  showStatus(`Niveau ${state.gridLevel} / 16`);
  await wait(700);

  state.gridTargets.forEach((idx, i)=>{
    gridGame.children[idx].className = "tile " + COLORS[i % COLORS.length];
  });

  await wait(1100);

  state.gridTargets.forEach(idx=>{
    gridGame.children[idx].className = "tile";
  });

  showStatus(`Retrouvez ${state.gridLevel} case${state.gridLevel > 1 ? "s" : ""}`);
}

function handleGridClick(index, tile){
  if(!state.playing || state.game !== "grid") return;
  if(tile.disabled) return;

  if(state.gridTargets.includes(index)){
    const colorIndex = state.gridTargets.indexOf(index) % COLORS.length;
    tile.className = "tile correct " + COLORS[colorIndex];
    tile.disabled = true;
    state.gridFound++;

    if(state.gridFound === state.gridTargets.length){
      if(state.gridLevel === 16){
        finishAndBackToMenu("Bravo !");
      } else {
        state.gridLevel++;
        setTimeout(playGridLevel, 700);
      }
    }
  } else {
    tile.className = "tile wrong";
    setTimeout(()=>{
      if(state.playing) tile.className = "tile";
    }, 300);
  }
}

async function finishAndBackToMenu(message){
  showStatus(message);
  state.playing = false;
  await wait(1200);
  showMenu();
}

document.querySelectorAll("[data-game-card]").forEach(card=>{
  card.addEventListener("click", ()=>{
    selectGame(card.dataset.gameCard);
  });
});

playBtn.addEventListener("click", startGame);

buildSequenceGrid();
buildGridGame();
showMenu();
</script>
</body>
</html>
