<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>BALLOONS</title>
<meta name="theme-color" content="#345dff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="BALLOONS" />
<link rel="apple-touch-icon" href="icon_balloons.png" />
<link rel="icon" type="image/png" href="icon_balloons.png" />
<link rel="manifest" href="manifest.webmanifest" />

<style>
:root{
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
  --safe-left: env(safe-area-inset-left);
  --safe-right: env(safe-area-inset-right);
  --white:#fff;
  --line:rgba(255,255,255,.22);
  --shadow:0 18px 42px rgba(7,10,40,.34);
  --green1:#48ff8c;
  --green2:#06b34a;
  --red1:#ff5e85;
  --red2:#cf1133;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  min-height:100dvh;
  overflow:hidden;
  overscroll-behavior:none;
}

html{
  background:
    radial-gradient(circle at 12% 12%, rgba(255,239,118,.95) 0 0, rgba(255,239,118,0) 17%),
    radial-gradient(circle at 84% 12%, rgba(74,196,255,.92) 0 0, rgba(74,196,255,0) 18%),
    radial-gradient(circle at 82% 86%, rgba(86,255,227,.80) 0 0, rgba(86,255,227,0) 22%),
    radial-gradient(circle at 18% 88%, rgba(255,122,214,.72) 0 0, rgba(255,122,214,0) 22%),
    radial-gradient(circle at 50% 72%, rgba(181,102,255,.45) 0 0, rgba(181,102,255,0) 30%),
    linear-gradient(150deg,#5ae8ff 0%, #3a67ff 32%, #7b43ff 63%, #ff58ab 100%);
}

body{
  min-height:100dvh;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",sans-serif;
  color:var(--white);
  background:transparent;
}

body::before,
body::after{
  content:"";
  position:fixed;
  border-radius:50%;
  filter:blur(72px);
  pointer-events:none;
  opacity:.34;
}

body::before{
  width:38vw;
  height:38vw;
  left:-10vw;
  bottom:8vh;
  background:#67ffe4;
}

body::after{
  width:40vw;
  height:40vw;
  right:-8vw;
  top:4vh;
  background:#ffe660;
}

.game,.board,.hud,.endOverlay,.pauseOverlay{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
}

.game{
  min-height:100dvh;
  padding-bottom:env(safe-area-inset-bottom);
}

.board{
  overflow:hidden;
  touch-action:manipulation;
  height:calc(100dvh + var(--safe-bottom));
  min-height:calc(100dvh + var(--safe-bottom));
}

.hud{
  pointer-events:none;
  z-index:5;
}

.title{
  position:absolute;
  top:calc(8px + var(--safe-top));
  left:calc(10px + var(--safe-left));
  right:calc(10px + var(--safe-right));
  margin:0;
  text-align:center;
  font-weight:1000;
  letter-spacing:.12em;
  line-height:.92;
  font-size:clamp(30px,8.5vw,56px);
  color:#fff;
  text-shadow:
    0 2px 0 rgba(255,255,255,.18),
    0 4px 0 rgba(24,32,110,.35),
    0 10px 20px rgba(10,16,69,.55),
    0 0 24px rgba(255,255,255,.20);
}

.bottomBar{
  position:absolute;
  left:calc(12px + var(--safe-left));
  right:calc(12px + var(--safe-right));
  bottom:calc(10px + var(--safe-bottom));
  display:grid;
  grid-template-columns:minmax(86px,1fr) minmax(86px,1fr) minmax(86px,1fr) minmax(126px,1.24fr);
  gap:10px;
  align-items:stretch;
  pointer-events:auto;
  z-index:6;
}

.stat,.toggleBtn,.endCard,.pauseCard,.pauseBtn{
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  backdrop-filter:blur(16px) saturate(1.15);
  -webkit-backdrop-filter:blur(16px) saturate(1.15);
}

.stat{
  min-height:84px;
  background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.10));
  border-radius:25px;
  padding:10px 12px 8px;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.stat .label{
  font-size:11px;
  font-weight:900;
  letter-spacing:.16em;
  text-transform:uppercase;
  opacity:.98;
}

.stat .value{
  margin-top:7px;
  font-size:clamp(18px,5.2vw,31px);
  line-height:1;
  font-weight:1000;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
  letter-spacing:-.02em;
}

.toggleBtn{
  appearance:none;
  border-radius:29px;
  min-height:84px;
  width:100%;
  min-width:0;
  color:#fff;
  font-weight:1000;
  font-size:clamp(20px,5.3vw,34px);
  letter-spacing:.03em;
  text-shadow:0 2px 10px rgba(0,0,0,.18);
  padding:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.toggleBtn.play{
  background:linear-gradient(180deg,
    rgba(72,255,140,.55),
    rgba(6,179,74,.55)
  );
}

.toggleBtn.stop{
  background:linear-gradient(180deg,
    rgba(255,94,133,.55),
    rgba(207,17,51,.55)
  );
}

.balloon{
  position:absolute;
  border:none;
  border-radius:48% 48% 45% 45% / 43% 43% 57% 57%;
  transform:translate(-50%,-50%);
  box-shadow:
    inset -10px -14px 22px rgba(0,0,0,.16),
    inset 7px 10px 12px rgba(255,255,255,.20),
    0 16px 24px rgba(0,0,0,.16),
    0 0 0 1px rgba(255,255,255,.07);
  transition:
    transform .14s ease,
    opacity .24s ease;
}

.balloon::before{
  content:"";
  position:absolute;
  width:26%;
  height:12%;
  left:19%;
  top:15%;
  border-radius:50%;
  background:rgba(255,255,255,.22);
  transform:rotate(-18deg);
  filter:blur(.6px);
}

.balloon:active{
  transform:translate(-50%,-50%) scale(.95);
}

.balloon:focus,
.balloon:focus-visible{
  outline:none;
}

.balloon.wrong{
  animation:wrongShake .34s ease;
}

.balloon.fly{
  animation:flyAway 2.2s ease-out forwards;
  pointer-events:none;
  will-change:transform, opacity;
}

.pauseOverlay,
.endOverlay{
  display:none;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:rgba(12,16,36,.18);
  z-index:8;
}

.pauseOverlay.show,
.endOverlay.show{
  display:flex;
}

.pauseCard,
.endCard{
  width:min(90vw,520px);
  background:rgba(255,255,255,.18);
  border-radius:34px;
  padding:24px 20px 20px;
  text-align:center;
}

.pauseMini,
.endMini{
  font-size:12px;
  letter-spacing:.14em;
  text-transform:uppercase;
  font-weight:900;
  opacity:.92;
}

.pauseTitle,
.endTitle{
  margin:10px 0 8px;
  font-size:clamp(28px,8vw,42px);
  line-height:.95;
  font-weight:1000;
}

.pauseText,
.endText{
  font-size:16px;
  line-height:1.35;
  font-weight:700;
  margin:0 0 16px;
}

.endTime{
  font-size:clamp(34px,9vw,52px);
  font-weight:1000;
  line-height:1;
  margin:8px 0 10px;
  font-variant-numeric:tabular-nums;
}

.pauseActions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.pauseBtn,
.endBtn{
  appearance:none;
  border:none;
  min-height:56px;
  border-radius:20px;
  font-size:20px;
  font-weight:1000;
  color:#fff;
}

.pauseBtn.resume,
.endBtn{
  background:linear-gradient(180deg,var(--green1),var(--green2));
}

.pauseBtn.stop{
  background:linear-gradient(180deg,var(--red1),var(--red2));
}

@keyframes wrongShake{
  0%,100%{transform:translate(-50%,-50%)}
  25%{transform:translate(calc(-50% - 7px),-50%)}
  50%{transform:translate(calc(-50% + 7px),-50%)}
  75%{transform:translate(calc(-50% - 5px),-50%)}
}

@keyframes flyAway{
  0%{
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
  }
  100%{
    opacity:0;
    transform:translate(
      calc(-50% + var(--driftx)),
      calc(-50% - 620px)
    ) scale(1.015);
  }
}

.board.resolving .balloon:not(.fly){
  transition:none;
}

@media (max-width: 430px){
  .bottomBar{
    grid-template-columns:minmax(80px,1fr) minmax(80px,1fr) minmax(80px,1fr) minmax(112px,1.15fr);
    gap:8px;
  }

  .stat{
    min-height:78px;
    border-radius:22px;
    padding:10px 10px 8px;
  }

  .toggleBtn{
    min-height:78px;
    border-radius:24px;
    font-size:clamp(18px,5vw,28px);
    padding:0;
  }

  .pauseActions{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>
<div class="game">
  <div class="board" id="board"></div>
  <div class="hud">
    <h1 class="title">BALLOONS</h1>
    <div class="bottomBar" id="bottomBar">
      <div class="stat">
        <div class="label">Temps</div>
        <div class="value" id="timer">05:00</div>
      </div>
      <div class="stat">
        <div class="label">Points</div>
        <div class="value" id="points">0</div>
      </div>
      <div class="stat">
        <div class="label">Record</div>
        <div class="value" id="best">0</div>
      </div>
      <button class="toggleBtn play" id="toggleBtn" aria-label="Jouer">JOUER</button>
    </div>
  </div>
</div>

<div class="pauseOverlay" id="pauseOverlay">
  <div class="pauseCard">
    <div class="pauseMini">Partie en pause</div>
    <div class="pauseTitle">Pause</div>
    <p class="pauseText">Reprendre la partie ou l’arrêter ?</p>
    <div class="pauseActions">
      <button class="pauseBtn resume" id="resumeBtn">REPRENDRE</button>
      <button class="pauseBtn stop" id="confirmStopBtn">ARRÊTER</button>
    </div>
  </div>
</div>

<div class="endOverlay" id="endOverlay">
  <div class="endCard">
    <div class="endMini">Partie terminée</div>
    <div class="endTitle">Bravo</div>
    <div class="endTime" id="endTime">0 point</div>
    <p class="endText" id="endText">Tu as terminé les 100 séries.</p>
    <button class="endBtn" id="restartBtn">REJOUER</button>
  </div>
</div>

<script>
(() => {
  const board = document.getElementById('board');
  const timerEl = document.getElementById('timer');
  const pointsEl = document.getElementById('points');
  const bestEl = document.getElementById('best');
  const toggleBtn = document.getElementById('toggleBtn');
  const endOverlay = document.getElementById('endOverlay');
  const pauseOverlay = document.getElementById('pauseOverlay');
  const endTimeEl = document.getElementById('endTime');
  const endTextEl = document.getElementById('endText');
  const restartBtn = document.getElementById('restartBtn');
  const resumeBtn = document.getElementById('resumeBtn');
  const confirmStopBtn = document.getElementById('confirmStopBtn');

  const STORAGE_BEST = 'balloons-best-score-v1';
  const MAX_SERIES = 100;
  const SERIES_DURATION = 30000;
  const GAME_DURATION = 300000;
  const COLORS = [
    ['#ff5a5a','#e00000'],
    ['#7bff85','#19bb41'],
    ['#ffe86d','#ffbb0f'],
    ['#84dfff','#149dff'],
    ['#c89cff','#8250ff'],
    ['#ffbf7f','#ff7315'],
    ['#71fff0','#07c7b2'],
    ['#ff8ee3','#ff3dc3']
  ];

  let bestScore = Number(localStorage.getItem(STORAGE_BEST) || 0);
  let state = null;
  let isResolving = false;
  let isPaused = false;
  let raf = 0;
  let seriesDeadline = 0;
  let gameDeadline = 0;
  let remainingGameMs = GAME_DURATION;
  let remainingSeriesMs = SERIES_DURATION;

  function fmt(ms){
    const safe = Math.max(0, ms);
    const totalSeconds = Math.ceil(safe / 1000);
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    return `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
  }

  function updateBest(){
    bestEl.textContent = String(bestScore || 0);
  }

  function updatePoints(){
    pointsEl.textContent = String(state ? state.points : 0);
  }

  function setButtonState(running){
    toggleBtn.className = 'toggleBtn ' + (running ? 'stop' : 'play');
    toggleBtn.textContent = running ? 'PAUSE' : 'JOUER';
    toggleBtn.setAttribute('aria-label', running ? 'Pause' : 'Jouer');
  }

  function tick(){
    if(!state || !state.running || state.finished || isPaused) return;

    const gameRemaining = Math.max(0, gameDeadline - performance.now());
    const seriesRemaining = Math.max(0, seriesDeadline - performance.now());

    remainingGameMs = gameRemaining;
    remainingSeriesMs = seriesRemaining;
    timerEl.textContent = fmt(gameRemaining);

    if(gameRemaining <= 0){
      state.gameExpired = true;
      if(!isResolving){
        finishGame();
        return;
      }
    }

    if(seriesRemaining <= 0 && !state.gameExpired){
      state.seriesExpired = true;
      if(!isResolving){
        handleSeriesTimeout();
        return;
      }
    }

    raf = requestAnimationFrame(tick);
  }

  function startSeriesTimer(ms = SERIES_DURATION){
    remainingSeriesMs = ms;
    seriesDeadline = performance.now() + ms;
    if(state){
      state.seriesExpired = false;
      state.seriesWon = false;
    }
  }

  function startAllTimers(){
    cancelAnimationFrame(raf);
    remainingGameMs = GAME_DURATION;
    gameDeadline = performance.now() + GAME_DURATION;
    startSeriesTimer(SERIES_DURATION);
    timerEl.textContent = fmt(GAME_DURATION);
    raf = requestAnimationFrame(tick);
  }

  function restartSeriesTimerOnly(){
    startSeriesTimer(SERIES_DURATION);
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(tick);
  }

  function resumeTimers(){
    gameDeadline = performance.now() + remainingGameMs;
    seriesDeadline = performance.now() + remainingSeriesMs;
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(tick);
  }

  function stopTimer(){
    cancelAnimationFrame(raf);
  }

  function computeSeriesCount(series){
    const start = 96;
    const end = 440;
    const t = (series - 1) / Math.max(1, MAX_SERIES - 1);
    const eased = Math.pow(t, 1.18);
    return Math.round(start + (end - start) * eased);
  }

  function makeBalancedCounts(total){
    const n = COLORS.length;

    let gap;
    if(total < 160){
      gap = 4;
    }else if(total < 260){
      gap = 3;
    }else{
      gap = 2;
    }

    const staircase = gap * (n * (n - 1) / 2);
    let base = Math.floor((total - staircase) / n);

    if(base < 2){
      base = 2;
    }

    const counts = [];
    for(let i = 0; i < n; i++){
      counts.push(base + (n - 1 - i) * gap);
    }

    let sum = counts.reduce((a,b) => a + b, 0);
    let diff = total - sum;

    while(diff > 0){
      for(let i = 0; i < n && diff > 0; i++){
        counts[i]++;
        diff--;
      }
    }

    while(diff < 0){
      for(let i = n - 1; i >= 0 && diff < 0; i--){
        const minAllowed = (i === n - 1) ? 2 : counts[i + 1] + 1;
        if(counts[i] > minAllowed){
          counts[i]--;
          diff++;
        }
      }
    }

    const shuffledColors = Array.from({ length: n }, (_, i) => i)
      .sort(() => Math.random() - 0.5);

    const finalCounts = Array(n).fill(0);
    counts.forEach((count, i) => {
      finalCounts[shuffledColors[i]] = count;
    });

    return finalCounts;
  }

  function makeBalloons(series){
    const total = computeSeriesCount(series);
    const counts = makeBalancedCounts(total);
    const balloons = [];
    let id = 1;

    counts.forEach((count, colorIndex) => {
      for(let i = 0; i < count; i++){
        const roll = Math.random();
        let w;

        if(roll < 0.22){
          w = 40 + Math.random() * 10;
        }else if(roll < 0.84){
          w = 52 + Math.random() * 12;
        }else{
          w = 66 + Math.random() * 10;
        }

        const h = w * (1.14 + Math.random() * 0.10);

        balloons.push({
          id: id++,
          colorIndex,
          lane: -1,
          x: 0,
          y: 0,
          w,
          h,
          driftX: (Math.random() - 0.5) * 180
        });
      }
    });

    for(let i = balloons.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [balloons[i], balloons[j]] = [balloons[j], balloons[i]];
    }

    return balloons;
  }

  function boardZone(){
    const rect = board.getBoundingClientRect();
    const root = getComputedStyle(document.documentElement);
    const safeBottom = parseFloat(root.getPropertyValue('--safe-bottom')) || 0;

    return {
      width: rect.width,
      height: rect.height,
      top: 0,
      bottom: rect.height + safeBottom - 4
    };
  }

  function placeIntoLanes(assignLanes = true){
    const zone = boardZone();
    const usableWidth = zone.width - 12;
    const laneCount = Math.max(3, Math.floor(usableWidth / 42));
    const laneStep = usableWidth / laneCount;

    const lanes = Array.from({ length: laneCount }, (_, i) => ({
      x: 6 + laneStep * (i + 0.5) + (Math.random() - 0.5) * 10,
      floor: zone.bottom + 18,
      items: []
    }));

    if(assignLanes){
      const shuffled = [...state.balloons].sort(() => Math.random() - 0.5);
      shuffled.forEach(balloon => {
        const candidates = lanes
          .map((lane, idx) => ({ idx, fill: lane.items.reduce((s,b) => s + b.h, 0) }))
          .sort((a,b) => a.fill - b.fill)
          .slice(0, Math.min(7, lanes.length));

        const pick = candidates[Math.floor(Math.random() * candidates.length)].idx;
        balloon.lane = pick;
        lanes[pick].items.push(balloon);
      });
    }else{
      state.balloons.forEach(balloon => {
        const idx = Math.max(0, Math.min(lanes.length - 1, balloon.lane));
        lanes[idx].items.push(balloon);
      });
    }

    lanes.forEach(lane => {
      let cursor = lane.floor;
      lane.items.sort((a,b) => (b.y || 0) - (a.y || 0));

      lane.items.forEach((balloon, index) => {
        const jitterX = (Math.random() - 0.5) * Math.min(22, laneStep * 0.52);
        const overlap = Math.min(24, balloon.h * 0.26);
        const y = cursor - balloon.h / 2;

        balloon.x = lane.x + jitterX;
        balloon.y = y;
        cursor -= balloon.h - overlap - (index % 3 === 0 ? 3 : 0);
      });
    });
  }

  function getMajorityData(){
    const counts = new Map();
    const visibleEls = [...board.querySelectorAll('.balloon')].filter(el => !el.classList.contains('fly'));

    visibleEls.forEach(el => {
      const rect = el.getBoundingClientRect();
      const visibleW = Math.min(rect.right, window.innerWidth) - Math.max(rect.left, 0);
      const visibleH = Math.min(rect.bottom, window.innerHeight) - Math.max(rect.top, 0);

      if(visibleW <= 0 || visibleH <= 0) return;

      const visibleArea = visibleW * visibleH;
      const colorIndex = Number(el.dataset.colorIndex);
      counts.set(colorIndex, (counts.get(colorIndex) || 0) + visibleArea);
    });

    let winner = null;
    let max = -1;

    for(const [colorIndex, area] of counts.entries()){
      if(area > max){
        max = area;
        winner = colorIndex;
      }
    }

    return {
      counts,
      winners: winner === null ? [] : [winner]
    };
  }

  function render(){
    const frag = document.createDocumentFragment();
    [...state.balloons]
      .sort((a,b) => (a.y + a.h / 2) - (b.y + b.h / 2))
      .forEach(balloon => {
        const el = document.createElement('button');
        el.className = 'balloon';
        el.style.width = `${balloon.w}px`;
        el.style.height = `${balloon.h}px`;
        el.style.left = `${balloon.x}px`;
        el.style.top = `${balloon.y}px`;
        el.style.zIndex = String(Math.round(balloon.y));
        el.style.setProperty('--driftx', `${balloon.driftX}px`);

        const [c1, c2] = COLORS[balloon.colorIndex];
        el.style.background = `radial-gradient(circle at 34% 28%, ${c1} 0%, ${c1} 26%, ${c2} 100%)`;

        el.dataset.id = String(balloon.id);
        el.dataset.colorIndex = String(balloon.colorIndex);
        el.addEventListener('click', onBalloonClick, { passive:true });
        frag.appendChild(el);
      });

    board.replaceChildren(frag);
  }

  function removeColor(colorIndex){
    const els = [...board.querySelectorAll(`.balloon[data-color-index="${colorIndex}"]`)]
      .filter(el => !el.classList.contains('fly'));

    if(!els.length) return;

    isResolving = true;
    board.classList.add('resolving');

    state.balloons = state.balloons.filter(balloon => balloon.colorIndex !== colorIndex);

    if(
      state.balloons.length === 0 &&
      !state.seriesExpired &&
      !state.gameExpired &&
      performance.now() <= seriesDeadline &&
      performance.now() <= gameDeadline
    ){
      state.seriesWon = true;
    }

    let remaining = els.length;

    els.forEach((el) => {
      el.classList.add('fly');

      const done = () => {
        el.removeEventListener('animationend', done);
        if(el.isConnected) el.remove();
        remaining--;

        if(remaining === 0){
          if(state.gameExpired){
            finishGame();
          }else if(state.balloons.length === 0){
            advanceSeriesOrFinish(state.seriesWon);
          }else if(state.seriesExpired){
            advanceSeriesOrFinish(false);
          }else{
            isResolving = false;
            board.classList.remove('resolving');
            render();
          }
        }
      };

      el.addEventListener('animationend', done, { once:true });
    });
  }

  function advanceSeriesOrFinish(won){
    const nextPoints = state.points + (won ? 1 : 0);
    state.points = nextPoints;
    updatePoints();

    if(state.series >= MAX_SERIES || state.gameExpired){
      finishGame();
      return;
    }

    isResolving = false;
    board.classList.remove('resolving');

    const nextSeries = state.series + 1;
    state = {
      series: nextSeries,
      points: nextPoints,
      running: true,
      finished: false,
      balloons: makeBalloons(nextSeries),
      seriesExpired: false,
      seriesWon: false,
      gameExpired: false
    };

    placeIntoLanes(true);
    render();
    restartSeriesTimerOnly();
  }

  function handleSeriesTimeout(){
    if(!state || !state.running || state.finished || state.gameExpired || isPaused) return;
    if(isResolving) return;
    advanceSeriesOrFinish(false);
  }

  function onBalloonClick(event){
    if(!state || !state.running || state.finished || state.seriesExpired || state.gameExpired || isPaused) return;

    const colorIndex = Number(event.currentTarget.dataset.colorIndex);
    const { winners } = getMajorityData();

    if(!winners.includes(colorIndex)){
      event.currentTarget.classList.add('wrong');
      setTimeout(() => event.currentTarget.classList.remove('wrong'), 340);
      if(navigator.vibrate) navigator.vibrate(26);
      return;
    }

    removeColor(colorIndex);
  }

  function startGame(){
    pauseOverlay.classList.remove('show');
    endOverlay.classList.remove('show');
    isResolving = false;
    isPaused = false;
    board.classList.remove('resolving');

    state = {
      series: 1,
      points: 0,
      running: true,
      finished: false,
      balloons: makeBalloons(1),
      seriesExpired: false,
      seriesWon: false,
      gameExpired: false
    };

    pointsEl.textContent = '0';
    placeIntoLanes(true);
    render();
    setButtonState(true);
    startAllTimers();
  }

  function openPause(){
    if(!state || !state.running || state.finished || isResolving) return;
    isPaused = true;
    stopTimer();
    remainingGameMs = Math.max(0, gameDeadline - performance.now());
    remainingSeriesMs = Math.max(0, seriesDeadline - performance.now());
    pauseOverlay.classList.add('show');
  }

  function resumeGame(){
    if(!state || !isPaused) return;
    isPaused = false;
    pauseOverlay.classList.remove('show');
    resumeTimers();
  }

  function stopGame(){
    stopTimer();

    if(state && state.points > bestScore){
      bestScore = state.points;
      localStorage.setItem(STORAGE_BEST, String(bestScore));
      updateBest();
    }

    isResolving = false;
    isPaused = false;
    pauseOverlay.classList.remove('show');
    board.classList.remove('resolving');
    state = null;
    board.replaceChildren();
    pointsEl.textContent = '0';
    timerEl.textContent = '05:00';
    setButtonState(false);
  }

  function finishGame(){
    stopTimer();

    if(!state) return;

    const finalPoints = state.points;
    let newBest = false;

    if(finalPoints > bestScore){
      bestScore = finalPoints;
      localStorage.setItem(STORAGE_BEST, String(bestScore));
      updateBest();
      newBest = true;
    }

    endTimeEl.textContent = `${finalPoints} point${finalPoints > 1 ? 's' : ''}`;
    endTextEl.innerHTML = newBest
      ? 'Nouveau <strong>Record</strong> !'
      : `Tu as marqué ${finalPoints} point${finalPoints > 1 ? 's' : ''} en 5 minutes.`;

    timerEl.textContent = '00:00';
    pauseOverlay.classList.remove('show');
    isPaused = false;
    setButtonState(false);
    endOverlay.classList.add('show');
    state = { finished:true, running:false, balloons:[], series:MAX_SERIES, points:finalPoints, gameExpired:true };
  }

  toggleBtn.addEventListener('click', () => {
    if(state && state.running && !state.finished){
      openPause();
    }else{
      startGame();
    }
  });

  resumeBtn.addEventListener('click', resumeGame);
  confirmStopBtn.addEventListener('click', stopGame);
  restartBtn.addEventListener('click', startGame);

  window.addEventListener('resize', () => {
    if(state && state.running && !state.finished && !isResolving && !isPaused){
      placeIntoLanes(false);
      render();
    }
  }, { passive:true });

  pointsEl.textContent = '0';
  timerEl.textContent = '05:00';
  updateBest();
  setButtonState(false);
  startGame();
})();
</script>
</body>
</html>
