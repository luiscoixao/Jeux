<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CHESSMEMORY</title>

<style>
:root{
  --bg:#2c2c2c;
  --light:#eeeed2;
  --dark:#769656;
  --gold:#d4af37;
}

body{
  margin:0;
  background:var(--bg);
  font-family:-apple-system,sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  color:#fff;
}

h1{ margin:10px 0; }

#board{
  width:95vw;
  max-width:500px;
  aspect-ratio:1;
  display:grid;
  grid-template-columns:repeat(8,1fr);
}

.square{ position:relative; }
.white{ background:var(--light); }
.black{ background:var(--dark); }

.piece{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(60px,11vw,82px);
}

.hidden{ display:none; }

.coord{
  position:absolute;
  font-size:10px;
  font-weight:700;
  opacity:.7;
}

.file{ bottom:2px; left:4px; }
.rank{ top:2px; left:4px; }

#timer{
  margin-top:6px;
  font-size:20px;
  color:var(--gold);
}

#score{
  margin-top:10px;
  font-size:18px;
}
</style>
</head>

<body>

<h1>CHESSMEMORY</h1>
<div id="board"></div>
<div id="timer"></div>
<div id="score"></div>

<script>
const boardEl = document.getElementById("board");
const timerEl = document.getElementById("timer");
const scoreEl = document.getElementById("score");

const PIECES = ["♔","♕","♖","♗","♘","♚","♛","♜","♝","♞"];

let cells = [];
let selected = [];
let locked = true;

let score = 0;
let record = localStorage.getItem("chessMemoryRecord") || 0;

let timerInterval = null;
let roundTimeout = null;

// ---------- UTILS ----------
function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

function randomPiece(){
  return PIECES[Math.floor(Math.random()*PIECES.length)];
}

function clearTimers(){
  if(timerInterval) clearInterval(timerInterval);
  if(roundTimeout) clearTimeout(roundTimeout);
  timerInterval = null;
  roundTimeout = null;
}

// ---------- GAME ----------
function build(){
  cells = Array(64).fill(null).map(()=>({piece:null,visible:false}));

  const p = randomPiece();
  const pos = shuffle([...Array(64).keys()]);

  cells[pos[0]] = {piece:p,visible:true};
  cells[pos[1]] = {piece:p,visible:true};
}

function render(){
  boardEl.innerHTML="";

  for(let i=0;i<64;i++){
    const r=Math.floor(i/8), c=i%8;
    const sq=document.createElement("div");
    sq.className="square "+((r+c)%2?"black":"white");

    const cell=cells[i];

    if(cell.piece){
      const p=document.createElement("div");
      p.className="piece"+(cell.visible?"":" hidden");
      p.textContent=cell.piece;
      sq.appendChild(p);
      sq.onclick=()=>clickCell(i);
    }

    if(r===7){
      const f=document.createElement("div");
      f.className="coord file";
      f.textContent=String.fromCharCode(97+c);
      sq.appendChild(f);
    }

    if(c===0){
      const rk=document.createElement("div");
      rk.className="coord rank";
      rk.textContent=8-r;
      sq.appendChild(rk);
    }

    boardEl.appendChild(sq);
  }
}

function updateScore(){
  if(score > record){
    record = score;
    localStorage.setItem("chessMemoryRecord", record);
  }
  scoreEl.textContent = "Points : "+score+" | Record : "+record;
}

function start(){
  clearTimers();

  selected = [];
  locked = true;

  build();
  render();

  timerEl.textContent = "1";

  // PHASE MÉMOIRE
  setTimeout(()=>{
    cells.forEach(c=>{
      if(c.piece) c.visible = false;
    });

    render();
    locked = false;

    startTimer();

  },1000);
}

function startTimer(){
  let timeLeft = 3;
  timerEl.textContent = timeLeft;

  timerInterval = setInterval(()=>{
    timeLeft--;
    timerEl.textContent = timeLeft;

    if(timeLeft <= 0){
      clearTimers();
      score--;
      updateScore();
      start();
    }
  },1000);
}

function clickCell(i){
  if(locked) return;

  const c = cells[i];
  if(!c.piece || c.visible) return;

  c.visible = true;
  selected.push(i);
  render();

  if(selected.length === 2){
    locked = true;
    clearTimers();

    const [a,b] = selected;

    if(cells[a].piece === cells[b].piece){
      score++;
    }else{
      score--;
    }

    updateScore();

    roundTimeout = setTimeout(start,600);
  }
}

// INIT
updateScore();
start();
</script>

</body>
</html>
