<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>FLASHGRID</title>

<meta name="theme-color" content="#eef2ff">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
:root{
  --bg1:#4f46e5;
  --bg2:#7c3aed;
  --card:#ffffff;
  --text:#0f172a;
  --line:rgba(255,255,255,.22);
  --good:#22c55e;
  --bad:#ef4444;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 18px 120px;
}
.app{width:100%;max-width:460px}
h1{text-align:center;font-size:38px;margin:10px 0;font-weight:900}

.top{
  display:flex;gap:10px;margin-bottom:12px
}
.top div{
  flex:1;
  text-align:center;
  padding:10px;
  background:rgba(255,255,255,.12);
  border-radius:14px;
}

.controls{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:12px;
}

button{
  padding:10px 12px;
  border:none;
  border-radius:12px;
  font-weight:800;
  cursor:pointer;
}

.active{background:#111;color:#fff}
button:not(.active){background:#fff}

.grid{
  display:grid;
  gap:10px;
  width:100%;
}

.tile{
  aspect-ratio:1;
  background:#fff;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  color:#111;
}

.hidden{color:transparent}
.correct{background:#22c55e;color:#fff}
.wrong{background:#ef4444;color:#fff}

.playbar{
  position:fixed;
  bottom:16px;
  left:0;
  right:0;
  display:flex;
  justify-content:center;
}

.play{
  padding:16px 40px;
  font-size:20px;
  border-radius:20px;
  background:#22c55e;
  color:#fff;
}

.help{
  margin-top:10px;
  text-align:center;
  font-size:13px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="app">

<h1>FLASHGRID</h1>

<div class="top">
  <div id="timer">0.00 s</div>
  <div id="best">Meilleur chrono : —</div>
</div>

<div class="controls">
  <button data-mode="classic" class="active">Classique</button>
  <button data-mode="memory">Mémoire</button>
  <button data-size="4" class="active">4×4</button>
  <button data-size="5">4×5</button>
  <button data-size="6">4×6</button>
</div>

<div id="grid" class="grid"></div>

<div id="help" class="help"></div>

</div>

<div class="playbar">
  <button id="play" class="play">Jouer</button>
</div>

<script>
let mode="classic";
let cols=4;
let rows=4;
let order=[];
let next=0;
let startTime;
let timer;

const grid=document.getElementById("grid");
const timerEl=document.getElementById("timer");
const bestEl=document.getElementById("best");
const help=document.getElementById("help");

function randomNumbers(n){
  const s=new Set();
  while(s.size<n){
    s.add(Math.floor(Math.random()*99)+1);
  }
  return Array.from(s);
}

function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

function buildGrid(numbers){
  grid.innerHTML="";
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;

  numbers.forEach(n=>{
    const d=document.createElement("div");
    d.className="tile";
    d.textContent=n;
    d.onclick=()=>clickTile(d,n);
    grid.appendChild(d);
  });
}

function initGrid(){
  const total=rows*cols;
  const nums=randomNumbers(total);
  buildGrid(nums);
}

function start(){
  clearInterval(timer);
  startTime=performance.now();

  timer=setInterval(()=>{
    const t=(performance.now()-startTime)/1000;
    timerEl.textContent=t.toFixed(2)+" s";
  },50);

  order=randomNumbers(rows*cols).sort((a,b)=>a-b);
  next=0;

  const shuffled=shuffle([...order]);
  buildGrid(shuffled);

  if(mode==="memory"){
    setTimeout(()=>hideAll(),3000);
  }
}

function hideAll(){
  document.querySelectorAll(".tile").forEach(t=>t.classList.add("hidden"));
}

function clickTile(tile,n){
  if(n===order[next]){
    tile.classList.remove("hidden");
    tile.classList.add("correct");
    next++;

    if(next===order.length){
      clearInterval(timer);
      const t=(performance.now()-startTime)/1000;
      saveBest(t);
    }
  }else{
    tile.classList.add("wrong");
    setTimeout(()=>tile.classList.remove("wrong"),300);
  }
}

function saveBest(t){
  const key=`best-${rows}x${cols}-${mode}`;
  const best=localStorage.getItem(key);
  if(!best||t<best){
    localStorage.setItem(key,t);
  }
  loadBest();
}

function loadBest(){
  const key=`best-${rows}x${cols}-${mode}`;
  const b=localStorage.getItem(key);
  bestEl.textContent="Meilleur chrono : "+(b?Number(b).toFixed(2)+" s":"—");
}

document.querySelectorAll("[data-mode]").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll("[data-mode]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    mode=btn.dataset.mode;
    help.textContent=mode==="classic"?
    "Touchez les nombres dans l’ordre":
    "Mémorisez puis retrouvez l’ordre";
    loadBest();
  };
});

document.querySelectorAll("[data-size]").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll("[data-size]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    cols=btn.dataset.size;
    rows=4;
    initGrid();
    loadBest();
  };
});

document.getElementById("play").onclick=start;

initGrid();
loadBest();
</script>

</body>
</html>
