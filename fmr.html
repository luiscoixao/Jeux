<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLASHGRID</title>

<style>
:root{
  --bg:linear-gradient(135deg,#4f46e5,#7c3aed);
  --card:#ffffff;
  --text:#0f172a;
  --good:#22c55e;
  --bad:#ef4444;
}

body{
  margin:0;
  font-family:-apple-system;
  background:var(--bg);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

h1{margin:10px 0;font-size:34px;font-weight:900}

.top{
  display:flex;
  justify-content:space-between;
  width:100%;
  max-width:420px;
  font-size:14px;
  margin-bottom:10px;
  opacity:0.9;
}

.controls{
  display:flex;
  gap:6px;
  margin-bottom:12px;
  flex-wrap:wrap;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:12px;
  font-weight:800;
  cursor:pointer;
  background:#fff;
  color:#111;
}

.active{background:#111;color:#fff}
.start{background:#22c55e;color:#fff}

.grid{
  display:grid;
  gap:10px;
  width:90vw;
  max-width:420px;
}

.tile{
  aspect-ratio:1;
  background:var(--card);
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:900;
  color:var(--text);
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.hidden{color:transparent}
.correct{background:var(--good);color:#fff}
.wrong{background:var(--bad);color:#fff}

.footer{
  margin-top:12px;
  font-size:13px;
  opacity:0.8;
  text-align:center;
}
</style>
</head>

<body>

<h1>FLASHGRID</h1>

<div class="top">
  <div id="timer">0.00s</div>
  <div id="best">Best: —</div>
</div>

<div class="controls">
  <button data-mode="classic" class="active">Classique</button>
  <button data-mode="memory">Mémoire</button>
  <button data-size="4" class="active">4×4</button>
  <button data-size="5">4×5</button>
  <button data-size="6">4×6</button>
  <button id="start" class="start">Start</button>
</div>

<div id="grid" class="grid"></div>

<div class="footer">
  Touchez les nombres dans l’ordre le plus vite possible
</div>

<script>
let mode="classic";
let cols=4;
let rows=4;
let order=[];
let next=0;

let startTime=0;
let timerInterval;

const timerEl=document.getElementById("timer");
const bestEl=document.getElementById("best");

function randomNumbers(n){
  const set=new Set();
  while(set.size<n){
    set.add(Math.floor(Math.random()*99)+1);
  }
  return Array.from(set);
}

function updateBest(time){
  const key=`best-${rows}x${cols}-${mode}`;
  const best=localStorage.getItem(key);
  if(!best || time<best){
    localStorage.setItem(key,time);
    bestEl.textContent="Best: "+time.toFixed(2)+"s";
  }
}

function loadBest(){
  const key=`best-${rows}x${cols}-${mode}`;
  const best=localStorage.getItem(key);
  bestEl.textContent="Best: "+(best?Number(best).toFixed(2)+"s":"—");
}

document.querySelectorAll("[data-mode]").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll("[data-mode]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    mode=btn.dataset.mode;
    loadBest();
  };
});

document.querySelectorAll("[data-size]").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll("[data-size]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    cols=parseInt(btn.dataset.size);
    rows=4;
    loadBest();
  };
});

document.getElementById("start").onclick=start;

function start(){
  clearInterval(timerInterval);
  startTime=performance.now();

  timerInterval=setInterval(()=>{
    const t=(performance.now()-startTime)/1000;
    timerEl.textContent=t.toFixed(2)+"s";
  },50);

  const total=rows*cols;
  order=randomNumbers(total).sort((a,b)=>a-b);
  next=0;

  const shuffled=[...order].sort(()=>Math.random()-0.5);

  const grid=document.getElementById("grid");
  grid.innerHTML="";
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;

  shuffled.forEach(n=>{
    const tile=document.createElement("div");
    tile.className="tile";
    tile.textContent=n;
    tile.onclick=()=>clickTile(tile,n);
    grid.appendChild(tile);
  });

  if(mode==="memory"){
    setTimeout(()=>hideAll(),2000);
  }
}

function hideAll(){
  document.querySelectorAll(".tile").forEach(t=>t.classList.add("hidden"));
}

function clickTile(tile,n){
  if(n===order[next]){
    tile.classList.remove("hidden");
    tile.classList.add("correct");
    next++;

    if(next===order.length){
      clearInterval(timerInterval);
      const finalTime=(performance.now()-startTime)/1000;
      updateBest(finalTime);
    }
  }else{
    tile.classList.add("wrong");
    setTimeout(()=>tile.classList.remove("wrong"),300);
  }
}

loadBest();
</script>

</body>
</html>
