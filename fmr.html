<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>CHESSMEMORY</title>

<meta name="theme-color" content="#2c2c2c" />

<style>
:root{
  --bg:#2c2c2c;
  --light:#eeeed2;
  --dark:#769656;
  --gold:#d4af37;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  color:#fff;
}

h1{
  margin:20px 0 10px;
  font-size:28px;
}

#info{
  font-size:18px;
  margin-bottom:6px;
}

#score{
  font-size:16px;
  margin-bottom:10px;
  opacity:.8;
}

#board{
  width:95vw;
  max-width:500px;
  aspect-ratio:1;
  display:grid;
  grid-template-columns:repeat(8,1fr);
}

.square{
  position:relative;
}

.white{background:var(--light)}
.black{background:var(--dark)}

.piece{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(52px,10vw,78px);
}

.white-piece{color:#fff;text-shadow:0 0 2px #000}
.black-piece{color:#111}

.hidden{display:none}

.flash{
  animation:flash .25s;
}

@keyframes flash{
  0%{background:#d4af37}
  100%{background:inherit}
}
</style>
</head>

<body>

<h1>CHESSMEMORY</h1>
<div id="info">Mémorise…</div>
<div id="score">Niveau 1</div>
<div id="board"></div>

<script>
const board=document.getElementById("board");
const info=document.getElementById("info");
const scoreEl=document.getElementById("score");

const PIECES=["♔","♕","♖","♗","♘","♚","♛","♜","♝","♞"];

let level=1;
let pairCount=3;
let cards=[];
let picks=[];
let lock=true;

function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

function newGame(){
  lock=true;
  picks=[];
  pairCount=Math.min(3+level-1,8);

  scoreEl.textContent="Niveau "+level;

  let selected=shuffle(PIECES).slice(0,pairCount);

  cards=[];
  selected.forEach(p=>{
    cards.push({p,id:Math.random()});
    cards.push({p,id:Math.random()});
  });

  while(cards.length<64) cards.push(null);

  cards=shuffle(cards);

  render(true);

  setTimeout(()=>{
    render(false);
    lock=false;
    info.textContent="Trouve toutes les paires";
  },2000);
}

function render(show){
  board.innerHTML="";

  cards.forEach((c,i)=>{
    const sq=document.createElement("div");
    sq.className="square "+(((Math.floor(i/8)+i)%2?"white":"black"));

    if(c){
      const piece=document.createElement("div");
      piece.className="piece "+(show||c.show?"":"hidden");
      piece.textContent=c.p;
      sq.appendChild(piece);

      sq.onclick=()=>click(i,sq);
    }

    board.appendChild(sq);
  });
}

function click(i,sq){
  if(lock) return;
  const c=cards[i];
  if(!c||c.show) return;

  c.show=true;
  picks.push(i);
  render(false);

  if(picks.length<2) return;

  lock=true;

  let [a,b]=picks;

  if(cards[a].p===cards[b].p){
    if(navigator.vibrate) navigator.vibrate(50);

    document.querySelectorAll(".square")[a].classList.add("flash");
    document.querySelectorAll(".square")[b].classList.add("flash");

    picks=[];
    lock=false;

    if(cards.filter(c=>c&&!c.show).length===0){
      level++;
      setTimeout(newGame,800);
    }

  }else{
    if(navigator.vibrate) navigator.vibrate(120);

    setTimeout(()=>{
      cards[a].show=false;
      cards[b].show=false;
      picks=[];
      lock=false;
      render(false);
    },500);
  }
}

newGame();
</script>

</body>
</html>
