<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>BALLOONS</title>

<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
}

body{
  background:
    radial-gradient(circle at 12% 12%, rgba(255,239,118,.95) 0 0, rgba(255,239,118,0) 17%),
    radial-gradient(circle at 84% 12%, rgba(74,196,255,.92) 0 0, rgba(74,196,255,0) 18%),
    radial-gradient(circle at 82% 86%, rgba(86,255,227,.80) 0 0, rgba(86,255,227,0) 22%),
    radial-gradient(circle at 18% 88%, rgba(255,122,214,.72) 0 0, rgba(255,122,214,0) 22%),
    linear-gradient(150deg,#5ae8ff,#3a67ff,#7b43ff,#ff58ab);
}

.board{
  position:fixed;
  inset:0;
  overflow:hidden;
}

/* BALLOONS */
.balloon{
  position:absolute;
  border-radius:48% 48% 45% 45% / 43% 43% 57% 57%;
  transform:translate(-50%,-50%);
  box-shadow:
    inset -10px -14px 22px rgba(0,0,0,.16),
    inset 7px 10px 12px rgba(255,255,255,.20),
    0 16px 24px rgba(0,0,0,.16);
}

.balloon::before{
  content:"";
  position:absolute;
  width:26%;
  height:12%;
  left:19%;
  top:15%;
  border-radius:50%;
  background:rgba(255,255,255,.22);
}

/* ENVOI */
.balloon.fly{
  animation:fly 3.4s ease-out forwards;
}

@keyframes fly{
  0%{
    opacity:1;
    transform:translate(-50%,-50%);
  }
  100%{
    opacity:0;
    transform:translate(
      calc(-50% + var(--dx)),
      calc(-50% - 650px)
    );
  }
}
</style>
</head>

<body>

<div class="board" id="board"></div>

<script>
const board = document.getElementById("board")

const COLORS = [
  ["#ff8bac","#ff2d67"],
  ["#7bff85","#19bb41"],
  ["#ffe86d","#ffbb0f"],
  ["#84dfff","#149dff"],
  ["#c89cff","#8250ff"],
  ["#ffbf7f","#ff7315"],
  ["#71fff0","#07c7b2"],
  ["#ff8ee3","#ff3dc3"]
]

let balloons = []

function create(){
  balloons=[]
  board.innerHTML=""

  const total = 180

  for(let i=0;i<total;i++){

    const b=document.createElement("div")
    b.className="balloon"

    const r=Math.random()
    let size
    if(r<0.2){
      size=38+Math.random()*10
    }else if(r<0.85){
      size=50+Math.random()*18
    }else{
      size=68+Math.random()*14
    }

    b.style.width=size+"px"
    b.style.height=size*1.2+"px"

    b.style.left=Math.random()*100+"vw"
    b.style.top=Math.random()*100+"vh"

    const color=COLORS[Math.floor(Math.random()*COLORS.length)]
    b.style.background=`radial-gradient(circle at 30% 30%,${color[0]},${color[1]})`

    b.dataset.color=color[1]

    b.onclick=()=>pop(color[1])

    board.appendChild(b)
    balloons.push(b)
  }
}

function pop(color){

  const group=balloons.filter(b=>b.dataset.color===color)

  if(group.length<2)return

  group.forEach(b=>{
    b.style.setProperty("--dx",(Math.random()*200-100)+"px")
    b.classList.add("fly")
    setTimeout(()=>b.remove(),3200)
  })

  balloons=balloons.filter(b=>b.dataset.color!==color)

  if(balloons.length<2){
    setTimeout(create,800)
  }
}

create()
</script>

</body>
</html>
