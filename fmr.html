<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>FLASHGRID</title>

<meta name="theme-color" content="#eef2ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FLASHGRID">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="iconflashgrid.png">
<link rel="icon" type="image/png" href="iconflashgrid.png">

<style>
:root{
  --bg1:#4f46e5;
  --bg2:#7c3aed;
  --card:#ffffff;
  --text:#0f172a;
  --line:rgba(255,255,255,.22);
  --good:#22c55e;
  --bad:#ef4444;
}
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.12), transparent 28%),
    radial-gradient(circle at top right, rgba(255,255,255,.08), transparent 30%),
    linear-gradient(135deg,var(--bg1),var(--bg2));
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 18px 120px;
}
.app{
  width:100%;
  max-width:460px;
}
h1{
  margin:6px 0 14px;
  text-align:center;
  font-size:38px;
  font-weight:900;
  letter-spacing:.4px;
}
.top{
  display:flex;
  justify-content:space-between;
  gap:10px;
  width:100%;
  font-size:13px;
  margin-bottom:10px;
}
.top-pill{
  flex:1;
  border:1px solid var(--line);
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(10px);
  border-radius:14px;
  padding:8px 10px;
  text-align:center;
  font-weight:700;
}
.controls{
  display:flex;
  gap:8px;
  margin-bottom:12px;
  flex-wrap:wrap;
  justify-content:center;
}
button{
  padding:10px 14px;
  border:none;
  border-radius:14px;
  font-weight:800;
  cursor:pointer;
  background:#fff;
  color:#111827;
  box-shadow:0 10px 24px rgba(0,0,0,.12);
}
button.active{
  background:#111827;
  color:#fff;
}
.grid-wrap{
  width:100%;
  background:rgba(255,255,255,.12);
  border:1px solid var(--line);
  border-radius:28px;
  padding:14px;
  backdrop-filter:blur(14px);
  overflow:hidden;
}
.grid{
  display:grid;
  gap:10px;
  width:100%;
  max-width:100%;
}
.tile{
  width:100%;
  min-width:0;
  background:var(--card);
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  color:var(--text);
  cursor:pointer;
  box-shadow:0 10px 24px rgba(0,0,0,.16);
  transition:transform .12s ease, background .18s ease, color .18s ease;
  user-select:none;
}
.tile:active{
  transform:scale(.97);
}
.grid.grid-4{
  grid-template-columns:repeat(4,minmax(0,1fr));
}
.grid.grid-4 .tile{
  aspect-ratio:1/1;
  font-size:20px;
}
.grid.grid-5{
  grid-template-columns:repeat(4,minmax(0,1fr));
}
.grid.grid-5 .tile{
  aspect-ratio:1/1;
  font-size:18px;
}
.tile.placeholder{
  color:transparent;
  cursor:default;
}
.tile.hidden{
  color:transparent;
}
.tile.correct{
  background:var(--good);
  color:#fff;
}
.tile.wrong{
  background:var(--bad);
  color:#fff;
}
.help{
  min-height:24px;
  margin-top:14px;
  font-size:13px;
  line-height:1.35;
  text-align:center;
  color:rgba(255,255,255,.88);
  opacity:0;
  transition:opacity .18s ease;
}
.help.show{
  opacity:1;
}
.playbar{
  position:fixed;
  left:18px;
  right:18px;
  bottom:16px;
  display:flex;
  justify-content:center;
  z-index:20;
}
.play-btn{
  min-width:220px;
  max-width:460px;
  width:min(100%,320px);
  padding:16px 22px;
  border-radius:20px;
  background:#22c55e;
  color:#ffffff;
  font-size:19px;
  font-weight:900;
  text-align:center;
  box-shadow:0 16px 34px rgba(0,0,0,.22);
}

.signature{
  text-align:center;
  font-size:11px;
  color:rgba(255,255,255,.6);
  margin-top:12px;
}

</style>
</head>
<body>
  <div class="app">
    <h1>FLASHGRID</h1>

    <div class="top">
      <div class="top-pill" id="timer">0.00 s</div>
      <div class="top-pill" id="best">Record : —</div>
    </div>

    <div class="controls">
      <button data-mode="classic" class="active">Ordre</button>
      <button data-mode="memory">Flash</button>
      <button data-mode="pairs">Memory</button>
      <button data-size="4" class="active">4×4</button>
      <button data-size="5">5×4</button>
    </div>

    <div class="grid-wrap">
      <div id="grid" class="grid grid-4"></div>
    </div>

    <div id="help" class="help"></div>
    <div class="signature">
  Jeu créé par Luis Coixao à l'aide de ChatGPT.
</div>
  </div>

  <div class="playbar">
    <button id="playBtn" class="play-btn">Jouer</button>
  </div>

<script>
let mode = "classic";
let cols = 4;
let rows = 4;
let order = [];
let next = 0;
let startTime = 0;
let timerInterval = null;
let playing = false;

let firstPairTile = null;
let secondPairTile = null;
let lockBoard = false;
let pairsFound = 0;

const timerEl = document.getElementById("timer");
const bestEl = document.getElementById("best");
const gridEl = document.getElementById("grid");
const helpEl = document.getElementById("help");

function randomNumbers(n){
  const set = new Set();
  while(set.size < n){
    set.add(Math.floor(Math.random() * 99) + 1);
  }
  return Array.from(set);
}

function shuffle(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function bestKey(){
  return `flashgrid-best-${rows}x${cols}-${mode}`;
}

function loadBest(){
  const best = localStorage.getItem(bestKey());
  bestEl.textContent = "Record : " + (best ? Number(best).toFixed(2) + " s" : "—");
}

function updateBest(time){
  const key = bestKey();
  const current = localStorage.getItem(key);
  if(!current || time < Number(current)){
    localStorage.setItem(key, String(time));
  }
  loadBest();
}

function setHelpForMode(){
  if(mode === "classic"){
    helpEl.textContent = "Touchez les nombres dans l’ordre croissant.";
  } else if(mode === "memory"){
    helpEl.textContent = "Mémorisez la grille, puis retrouvez l’ordre croissant.";
  } else {
    helpEl.textContent = "Retrouvez les paires de nombres identiques.";
  }
  helpEl.classList.add("show");
}

function setGridClass(){
  gridEl.className = rows === 5 ? "grid grid-5" : "grid grid-4";
}

function buildPlaceholderGrid(){
  const total = rows * cols;
  gridEl.innerHTML = "";
  setGridClass();

  for(let i = 0; i < total; i++){
    const tile = document.createElement("div");
    tile.className = "tile placeholder";
    tile.textContent = "0";
    gridEl.appendChild(tile);
  }
}

function startTimer(){
  clearInterval(timerInterval);
  startTime = performance.now();
  timerInterval = setInterval(() => {
    const t = (performance.now() - startTime) / 1000;
    timerEl.textContent = t.toFixed(2) + " s";
  }, 50);
}

function stopTimer(){
  clearInterval(timerInterval);
  timerInterval = null;
}

function startClassicOrMemory(){
  const total = rows * cols;
  order = randomNumbers(total).sort((a,b) => a - b);
  next = 0;

  const shuffled = shuffle(order);
  gridEl.innerHTML = "";
  setGridClass();

  shuffled.forEach(n => {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.textContent = n;
    tile.addEventListener("click", () => clickClassicTile(tile, n));
    gridEl.appendChild(tile);
  });

  if(mode === "memory"){
    setTimeout(hideAll, 4200);
  }
}

function startPairs(){
  const total = rows * cols;
  const pairCount = total / 2;
  const nums = randomNumbers(pairCount);
  const deck = shuffle([...nums, ...nums]);

  firstPairTile = null;
  secondPairTile = null;
  lockBoard = false;
  pairsFound = 0;

  gridEl.innerHTML = "";
  setGridClass();

  deck.forEach(n => {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.textContent = n;
    tile.dataset.value = n;
    tile.dataset.matched = "false";
    tile.addEventListener("click", () => clickPairTile(tile));
    gridEl.appendChild(tile);
  });

  setTimeout(hideAll, 2500);
}

function startGame(){
  playing = true;
  timerEl.textContent = "0.00 s";
  startTimer();

  if(mode === "pairs"){
    startPairs();
  } else {
    startClassicOrMemory();
  }
}

function hideAll(){
  if(!playing) return;
  document.querySelectorAll("#grid .tile").forEach(t => {
    if(!t.classList.contains("correct")){
      t.classList.add("hidden");
    }
  });
}

function clickClassicTile(tile, n){
  if(!playing) return;

  if(n === order[next]){
    tile.classList.remove("hidden");
    tile.classList.add("correct");
    tile.style.pointerEvents = "none";
    next++;

    if(next === order.length){
      playing = false;
      stopTimer();
      const finalTime = (performance.now() - startTime) / 1000;
      timerEl.textContent = finalTime.toFixed(2) + " s";
      updateBest(finalTime);
    }
  } else {
    tile.classList.remove("hidden");
    tile.classList.add("wrong");
    setTimeout(() => {
      tile.classList.remove("wrong");
      if(mode === "memory" && !tile.classList.contains("correct")){
        tile.classList.add("hidden");
      }
    }, 300);
  }
}

function clickPairTile(tile){
  if(!playing || lockBoard) return;
  if(tile.dataset.matched === "true") return;
  if(tile === firstPairTile) return;

  tile.classList.remove("hidden");

  if(!firstPairTile){
    firstPairTile = tile;
    return;
  }

  secondPairTile = tile;
  lockBoard = true;

  const v1 = firstPairTile.dataset.value;
  const v2 = secondPairTile.dataset.value;

  if(v1 === v2){
    firstPairTile.classList.add("correct");
    secondPairTile.classList.add("correct");
    firstPairTile.dataset.matched = "true";
    secondPairTile.dataset.matched = "true";
    firstPairTile.style.pointerEvents = "none";
    secondPairTile.style.pointerEvents = "none";

    pairsFound++;
    resetPairTurn();

    if(pairsFound === (rows * cols) / 2){
      playing = false;
      stopTimer();
      const finalTime = (performance.now() - startTime) / 1000;
      timerEl.textContent = finalTime.toFixed(2) + " s";
      updateBest(finalTime);
    }
  } else {
    firstPairTile.classList.add("wrong");
    secondPairTile.classList.add("wrong");

    setTimeout(() => {
      firstPairTile.classList.remove("wrong");
      secondPairTile.classList.remove("wrong");
      firstPairTile.classList.add("hidden");
      secondPairTile.classList.add("hidden");
      resetPairTurn();
    }, 700);
  }
}

function resetPairTurn(){
  firstPairTile = null;
  secondPairTile = null;
  lockBoard = false;
}

document.querySelectorAll("[data-mode]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("[data-mode]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    mode = btn.dataset.mode;
    loadBest();
    setHelpForMode();
    buildPlaceholderGrid();
  });
});

document.querySelectorAll("[data-size]").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("[data-size]").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    rows = Number(btn.dataset.size);
    cols = 4;

    loadBest();
    buildPlaceholderGrid();
  });
});

document.getElementById("playBtn").addEventListener("click", startGame);

buildPlaceholderGrid();
loadBest();
setHelpForMode();
</script>
</body>
</html>
