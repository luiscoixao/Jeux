<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>BALLOONS</title>

<style>
html,body{
  margin:0;
  width:100%;
  height:100dvh;
  overflow:hidden;
}

body{
  min-height:100dvh;
  background:
    radial-gradient(circle at 12% 12%, rgba(255,239,118,.95) 0 0, transparent 17%),
    radial-gradient(circle at 84% 12%, rgba(74,196,255,.92) 0 0, transparent 18%),
    radial-gradient(circle at 82% 86%, rgba(86,255,227,.80) 0 0, transparent 22%),
    radial-gradient(circle at 18% 88%, rgba(255,122,214,.72) 0 0, transparent 22%),
    linear-gradient(150deg,#5ae8ff,#3a67ff,#7b43ff,#ff58ab);
}

.board{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100dvh;
  overflow:hidden;
}

/* BALLOONS */
.balloon{
  position:absolute;
  border:none;
  border-radius:48% 48% 45% 45% / 43% 43% 57% 57%;
  transform:translate(-50%,-50%);
  box-shadow:
    inset -10px -14px 22px rgba(0,0,0,.16),
    inset 7px 10px 12px rgba(255,255,255,.20),
    0 16px 24px rgba(0,0,0,.16);
  cursor:pointer;
}

.balloon::before{
  content:"";
  position:absolute;
  width:26%;
  height:12%;
  left:19%;
  top:15%;
  border-radius:50%;
  background:rgba(255,255,255,.22);
}

.balloon.wrong{
  animation:wrongShake .34s ease;
}

.balloon.fly{
  pointer-events:none;
  animation:fly 3.2s ease-out forwards;
}

@keyframes fly{
  100%{
    opacity:0;
    transform:translate(
      calc(-50% + var(--dx)),
      calc(-50% - 650px)
    );
  }
}

@keyframes wrongShake{
  0%,100%{transform:translate(-50%,-50%)}
  25%{transform:translate(calc(-50% - 7px),-50%)}
  50%{transform:translate(calc(-50% + 7px),-50%)}
  75%{transform:translate(calc(-50% - 5px),-50%)}
}

/* TITLE */
.title{
  position:fixed;
  top:20px;
  left:0;
  right:0;
  text-align:center;
  font-weight:1000;
  letter-spacing:.12em;
  font-size:clamp(28px,8vw,52px);
  color:#fff;
  text-shadow:
    0 2px 0 rgba(255,255,255,.18),
    0 6px 20px rgba(0,0,0,.35);
  pointer-events:none;
}
</style>
</head>

<body>

<div class="title">BALLOONS</div>
<div class="board" id="board"></div>

<script>
const board = document.getElementById("board");

const COLORS = [
  ["#ff8bac","#ff2d67"],
  ["#7bff85","#19bb41"],
  ["#ffe86d","#ffbb0f"],
  ["#84dfff","#149dff"],
  ["#c89cff","#8250ff"],
  ["#ffbf7f","#ff7315"],
  ["#71fff0","#07c7b2"],
  ["#ff8ee3","#ff3dc3"]
];

let balloons = [];

function create(){
  balloons = [];
  board.innerHTML = "";

  const total = 420;

  const width = window.innerWidth;
  const height = window.innerHeight;

  for(let i = 0; i < total; i++){

    const b = document.createElement("button");
    b.className = "balloon";

    const size = 42 + Math.random() * 28;

    b.style.width = size + "px";
    b.style.height = size * 1.18 + "px";

    // ✅ plein écran réel
    const x = Math.random() * width;
    const y = Math.random() * height;

    b.style.left = x + "px";
    b.style.top = y + "px";

    const colorIndex = Math.floor(Math.random() * COLORS.length);
    const color = COLORS[colorIndex];

    b.style.background = `radial-gradient(circle at 30% 30%, ${color[0]}, ${color[1]})`;
    b.dataset.color = color[1];
    b.dataset.flying = "0";

    b.addEventListener("click", () => pop(color[1], b));

    board.appendChild(b);
    balloons.push(b);
  }
}

function getColorCounts(){
  const counts = new Map();

  const elements = board.querySelectorAll('.balloon');

  elements.forEach(el => {
    if(el.dataset.flying === "1") return;

    const rect = el.getBoundingClientRect();

    const visibleW = Math.min(rect.right, window.innerWidth) - Math.max(rect.left, 0);
    const visibleH = Math.min(rect.bottom, window.innerHeight) - Math.max(rect.top, 0);

    if(visibleW <= 0 || visibleH <= 0) return;

    const area = visibleW * visibleH;

    const color = el.dataset.color;
    counts.set(color, (counts.get(color) || 0) + area);
  });

  return counts;
}

function getMostNumerousColors(){
  const counts = getColorCounts();
  let max = 0;

  for(const count of counts.values()){
    if(count > max) max = count;
  }

  const winners = new Set();

  for(const [color, count] of counts.entries()){
    if(count === max){
      winners.add(color);
    }
  }

  return winners;
}

function cleanupFinishedFlying(){
  balloons = balloons.filter(b => b.isConnected);
}

function pop(color, clickedBalloon){
  if(clickedBalloon.dataset.flying === "1") return;

  cleanupFinishedFlying();

  const mostNumerous = getMostNumerousColors();

  if(!mostNumerous.has(color)){
    clickedBalloon.classList.remove("wrong");
    void clickedBalloon.offsetWidth;
    clickedBalloon.classList.add("wrong");
    return;
  }

  const group = balloons.filter(
    b => b.dataset.color === color && b.dataset.flying !== "1"
  );

  group.forEach(b => {
    b.dataset.flying = "1";
    b.style.setProperty("--dx", (Math.random() * 200 - 100) + "px");
    b.classList.add("fly");

    setTimeout(() => {
      b.remove();
      cleanupFinishedFlying();

      const activeLeft = balloons.filter(x => x.dataset.flying !== "1").length;
      if(activeLeft < 2){
        setTimeout(create, 300);
      }
    }, 3000);
  });
}

create();
</script>

</body>
</html>
