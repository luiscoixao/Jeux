<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLASHGRID</title>

<style>
:root{
  --bg:linear-gradient(135deg,#4f46e5,#7c3aed);
  --card:#ffffff;
  --text:#0f172a;
  --accent:#4f46e5;
  --good:#22c55e;
  --bad:#ef4444;
}

body{
  margin:0;
  font-family:-apple-system;
  background:var(--bg);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

h1{
  margin:10px 0 20px;
  font-size:34px;
  font-weight:900;
}

.controls{
  display:flex;
  gap:8px;
  margin-bottom:16px;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:12px;
  font-weight:800;
  cursor:pointer;
  background:#fff;
  color:#111;
}

.active{
  background:#111;
  color:#fff;
}

.start{
  background:#22c55e;
  color:#fff;
}

.grid{
  display:grid;
  gap:10px;
  width:90vw;
  max-width:420px;
}

.tile{
  aspect-ratio:1;
  background:var(--card);
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:900;
  color:var(--text);
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.hidden{color:transparent}
.correct{background:var(--good);color:#fff}
.wrong{background:var(--bad);color:#fff}
</style>
</head>

<body>

<h1>FLASHGRID</h1>

<div class="controls">
  <button data-mode="classic" class="active">Classique</button>
  <button data-mode="memory">Mémoire</button>
  <button id="start" class="start">Start</button>
</div>

<div id="grid" class="grid"></div>

<script>
let mode="classic";
let size=4;
let order=[];
let next=0;

// nombres aléatoires uniques
function randomNumbers(n){
  const set=new Set();
  while(set.size<n){
    set.add(Math.floor(Math.random()*99)+1);
  }
  return Array.from(set);
}

document.querySelectorAll("[data-mode]").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll("[data-mode]").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    mode=btn.dataset.mode;
  };
});

document.getElementById("start").onclick=start;

function start(){
  const total=size*size;

  order=randomNumbers(total).sort((a,b)=>a-b);
  next=0;

  const shuffled=[...order].sort(()=>Math.random()-0.5);

  const grid=document.getElementById("grid");
  grid.innerHTML="";
  grid.style.gridTemplateColumns=`repeat(${size},1fr)`;

  shuffled.forEach(n=>{
    const tile=document.createElement("div");
    tile.className="tile";
    tile.textContent=n;
    tile.onclick=()=>clickTile(tile,n);
    grid.appendChild(tile);
  });

  if(mode==="memory"){
    setTimeout(()=>hideAll(),2000);
  }
}

function hideAll(){
  document.querySelectorAll(".tile").forEach(t=>t.classList.add("hidden"));
}

function clickTile(tile,n){
  if(n===order[next]){
    tile.classList.remove("hidden");
    tile.classList.add("correct");
    next++;
  }else{
    tile.classList.add("wrong");
    setTimeout(()=>tile.classList.remove("wrong"),300);
  }
}
</script>

</body>
</html>
