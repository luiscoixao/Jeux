<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>BALLOONS</title>

<style>
html,body{
  margin:0;
  width:100%;
  height:100dvh;
  overflow:hidden;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",sans-serif;
  color:#fff;
  background:
    radial-gradient(circle at 12% 12%, rgba(255,239,118,.95) 0 0, transparent 17%),
    radial-gradient(circle at 84% 12%, rgba(74,196,255,.92) 0 0, transparent 18%),
    radial-gradient(circle at 82% 86%, rgba(86,255,227,.80) 0 0, transparent 22%),
    radial-gradient(circle at 18% 88%, rgba(255,122,214,.72) 0 0, transparent 22%),
    linear-gradient(150deg,#5ae8ff,#3a67ff,#7b43ff,#ff58ab);
}

.board{
  position:fixed;
  inset:0;
  overflow:hidden;
}

.title{
  position:absolute;
  top:10px;
  width:100%;
  text-align:center;
  font-size:40px;
  font-weight:900;
  letter-spacing:.1em;
  text-shadow:0 6px 20px rgba(0,0,0,.4);
  pointer-events:none;
}

/* BALLONS */
.balloon{
  position:absolute;
  border:none;
  border-radius:48% 48% 45% 45% / 43% 43% 57% 57%;
  transform:translate(-50%,-50%);
  box-shadow:
    inset -10px -14px 22px rgba(0,0,0,.16),
    inset 7px 10px 12px rgba(255,255,255,.20),
    0 16px 24px rgba(0,0,0,.16);
  cursor:pointer;
}

.balloon::before{
  content:"";
  position:absolute;
  width:26%;
  height:12%;
  left:19%;
  top:15%;
  border-radius:50%;
  background:rgba(255,255,255,.22);
}

/* ANIMATIONS CORRIGÉES */
.balloon.fly{
  animation:flyAway 3.4s ease-out forwards;
  pointer-events:none;
  will-change:transform, opacity;
}

@keyframes flyAway{
  0%{
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
  }
  100%{
    opacity:0;
    transform:translate(
      calc(-50% + var(--dx)),
      calc(-50% - 650px)
    ) scale(1.02);
  }
}

.balloon.wrong{
  animation:shake .3s;
}

@keyframes shake{
  0%,100%{transform:translate(-50%,-50%)}
  25%{transform:translate(calc(-50% - 6px),-50%)}
  50%{transform:translate(calc(-50% + 6px),-50%)}
}
</style>
</head>

<body>

<div class="title">BALLOONS</div>
<div class="board" id="board"></div>

<script>
const board = document.getElementById("board");

const COLORS = [
  ["#ff8bac","#ff2d67"],
  ["#7bff85","#19bb41"],
  ["#ffe86d","#ffbb0f"],
  ["#84dfff","#149dff"],
  ["#c89cff","#8250ff"],
  ["#ffbf7f","#ff7315"],
  ["#71fff0","#07c7b2"],
  ["#ff8ee3","#ff3dc3"]
];

let balloons = [];

function create(){
  balloons = [];
  board.innerHTML = "";

  const total = 350;
  const width = window.innerWidth;
  const height = window.innerHeight;

  for(let i = 0; i < total; i++){
    const b = document.createElement("button");
    b.className = "balloon";

    const size = 45 + Math.random()*30;

    b.style.width = size + "px";
    b.style.height = size*1.15 + "px";

    b.style.left = Math.random()*width + "px";
    b.style.top = Math.random()*height + "px";

    const colorIndex = Math.floor(Math.random()*COLORS.length);
    const color = COLORS[colorIndex];

    b.style.background = `radial-gradient(circle at 30% 30%, ${color[0]}, ${color[1]})`;

    b.dataset.colorIndex = colorIndex;
    b.dataset.flying = "0";

    b.addEventListener("click", () => pop(colorIndex, b));

    board.appendChild(b);
    balloons.push(b);
  }
}

/* CALCUL VISUEL (IMPORTANT) */
function getMajority(){
  const counts = new Map();

  const els = [...board.querySelectorAll('.balloon')].filter(el => el.dataset.flying === "0");

  els.forEach(el => {
    const rect = el.getBoundingClientRect();

    const visibleW = Math.min(rect.right, window.innerWidth) - Math.max(rect.left, 0);
    const visibleH = Math.min(rect.bottom, window.innerHeight) - Math.max(rect.top, 0);

    if(visibleW <= 0 || visibleH <= 0) return;

    const area = visibleW * visibleH;
    const c = Number(el.dataset.colorIndex);

    counts.set(c, (counts.get(c) || 0) + area);
  });

  let max = 0;
  for(const v of counts.values()) if(v > max) max = v;

  return new Set([...counts.entries()].filter(([_,v]) => v === max).map(([k]) => k));
}

/* SUPPRESSION */
function pop(colorIndex, clicked){
  if(clicked.dataset.flying === "1") return;

  const winners = getMajority();

  if(!winners.has(colorIndex)){
    clicked.classList.add("wrong");
    setTimeout(()=>clicked.classList.remove("wrong"),300);
    return;
  }

  const group = balloons.filter(b =>
    b.dataset.colorIndex == colorIndex && b.dataset.flying === "0"
  );

  group.forEach(b => {
    b.dataset.flying = "1";
    b.style.setProperty("--dx", (Math.random()*200-100)+"px");
    b.classList.add("fly");

    setTimeout(() => {
      b.remove();
      balloons = balloons.filter(x => x.isConnected);

      if(balloons.filter(x=>x.dataset.flying==="0").length < 2){
        setTimeout(create,300);
      }

    }, 3400); // ✅ synchro animation
  });
}

create();
</script>

</body>
</html>
