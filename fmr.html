<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>CHESSMEMORY</title>

<meta name="theme-color" content="#2c2c2c" />

<style>
:root{
  --bg:#2c2c2c;
  --light:#eeeed2;
  --dark:#769656;
  --text:#ffffff;
  --gold:#d4af37;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  color:#fff;
}

h1{
  margin:20px 0 8px;
  font-size:28px;
}

#score{
  font-size:16px;
  margin-bottom:6px;
  opacity:.8;
}

#info{
  font-size:18px;
  margin-bottom:6px;
}

#timer{
  font-size:20px;
  color:var(--gold);
  margin-bottom:10px;
}

#board{
  width:95vw;
  max-width:500px;
  aspect-ratio:1;
  display:grid;
  grid-template-columns:repeat(8,1fr);
}

.square{
  position:relative;
}

.white{background:var(--light)}
.black{background:var(--dark)}

.piece{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(52px,10vw,78px);
}

.white-piece{color:#fff;text-shadow:0 0 2px #000}
.black-piece{color:#111}

.hidden-piece{display:none}
</style>
</head>

<body>

<h1>CHESSMEMORY</h1>
<div id="score">Niveau 1</div>
<div id="info">Mémorise…</div>
<div id="timer"></div>
<div id="board"></div>

<script>
const boardEl=document.getElementById("board");
const infoEl=document.getElementById("info");
const timerEl=document.getElementById("timer");
const scoreEl=document.getElementById("score");

const WHITE_SET=new Set(["K","Q","R","B","N"]);
const PIECES={
  "K":"♔","Q":"♕","R":"♖","B":"♗","N":"♘",
  "k":"♚","q":"♛","r":"♜","b":"♝","n":"♞"
};
const ALL=["K","Q","R","B","N","k","q","r","b","n"];

const PREVIEW_MS=2000;

let level=1;
let pairCount=3;
let cells=[];
let selected=[];
let locked=true;

// shuffle
function shuffle(a){
  return [...a].sort(()=>Math.random()-0.5);
}

// build board
function buildBoard(){
  cells=Array(64).fill(null);

  const chosen=shuffle(ALL).slice(0,pairCount);

  let positions=shuffle([...Array(64).keys()]);

  chosen.forEach(sym=>{
    let a=positions.pop();
    let b=positions.pop();

    cells[a]={symbol:sym,visible:true};
    cells[b]={symbol:sym,visible:true};
  });

  selected=[];
}

// render
function render(){
  boardEl.innerHTML="";

  for(let i=0;i<64;i++){
    const row=Math.floor(i/8);
    const col=i%8;

    const sq=document.createElement("div");
    sq.className="square "+(((row+col)%2?"white":"black"));

    const c=cells[i];

    if(c){
      const piece=document.createElement("div");
      const cls=WHITE_SET.has(c.symbol)?"white-piece":"black-piece";

      piece.className="piece "+cls+(c.visible?"":" hidden-piece");
      piece.textContent=PIECES[c.symbol];

      sq.appendChild(piece);
      sq.onclick=()=>click(i);
    }

    boardEl.appendChild(sq);
  }
}

// start round
function start(){
  locked=true;
  pairCount=Math.min(3+level-1,8);

  scoreEl.textContent="Niveau "+level;
  infoEl.textContent="Mémorise…";

  buildBoard();
  render();

  setTimeout(()=>{
    cells.forEach(c=>{if(c)c.visible=false});
    render();
    locked=false;
    infoEl.textContent="Trouve toutes les paires";
  },PREVIEW_MS);
}

// click
function click(i){
  if(locked) return;
  const c=cells[i];
  if(!c || c.visible) return;

  c.visible=true;
  selected.push(i);
  render();

  if(selected.length<2) return;

  locked=true;

  let [a,b]=selected;

  if(cells[a].symbol===cells[b].symbol){

    if(navigator.vibrate) navigator.vibrate(40);

    selected=[];

    if(cells.filter(x=>x && !x.visible).length===0){
      level++;
      setTimeout(start,800);
    }else{
      locked=false;
    }

  }else{

    if(navigator.vibrate) navigator.vibrate(120);

    infoEl.textContent="Erreur";

    setTimeout(()=>{
      // reset niveau
      start();
    },600);
  }
}

start();
</script>

</body>
</html>
