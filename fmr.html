<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>MEMORY COLORS</title>

<meta name="theme-color" content="#4f46e5" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="MEMORY COLORS" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="apple-touch-icon" href="iconmemorycolors.png" />
<link rel="icon" type="image/png" href="iconmemorycolors.png" />

<style>
:root{
  --bg1:#4338ca;
  --bg2:#7c3aed;
  --bg3:#312e81;
  --panel:rgba(255,255,255,.10);
  --panel-line:rgba(255,255,255,.22);
  --text:#ffffff;
  --shadow:0 18px 40px rgba(0,0,0,.22);

  --tile-base:rgba(255,255,255,.16);

  --green1:#22c55e;
  --green2:#16a34a;

  --yellow1:#fde047;
  --yellow2:#facc15;

  --pink1:#ff4fb0;
  --pink2:#ec4899;

  --cyan1:#22d3ee;
  --cyan2:#0ea5e9;

  --orange1:#fb923c;
  --orange2:#f97316;

  --blue1:#3b82f6;
  --blue2:#2563eb;

  --red1:#f87171;
  --red2:#ef4444;

  --lime1:#a3e635;
  --lime2:#84cc16;

  --purple1:#c084fc;
  --purple2:#a855f7;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}

body{
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 10% 15%, rgba(56,189,248,.35), transparent 20%),
    radial-gradient(circle at 90% 12%, rgba(255,60,172,.35), transparent 20%),
    radial-gradient(circle at 20% 90%, rgba(34,197,94,.22), transparent 22%),
    linear-gradient(135deg,var(--bg1),var(--bg2) 55%, #5b21b6 75%, var(--bg3));
  padding:18px 16px 140px;
  display:flex;
  justify-content:center;
}

.app{width:100%;max-width:460px}

h1{
  margin:8px 0 14px;
  text-align:center;
  font-size:40px;
  font-weight:900;
}

.hidden{display:none!important}

.home-card{
  border-radius:30px;
  padding:16px 14px 18px;
  border:1px solid rgba(255,255,255,.22);
  background:rgba(10,16,40,.36);
  backdrop-filter:blur(10px);
}

.home-sub{
  font-size:16px;
  color:rgba(255,255,255,.82);
}

.top{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}

.top-pill{
  min-height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:20px;
  border:1px solid var(--panel-line);
  background:var(--panel);
  font-weight:900;
}

.status{
  text-align:center;
  font-weight:800;
  margin:10px 0 12px;
}

.game-wrap{
  border-radius:30px;
  border:1px solid var(--panel-line);
  background:var(--panel);
  padding:14px;
}

.game-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.tile{
  aspect-ratio:1/1;
  border-radius:20px;
  background:var(--tile-base);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.10);
}

.tile.seq-green{background:linear-gradient(135deg,var(--green1),var(--green2))}
.tile.seq-yellow{background:linear-gradient(135deg,var(--yellow1),var(--yellow2))}
.tile.seq-pink{background:linear-gradient(135deg,var(--pink1),var(--pink2))}
.tile.seq-cyan{background:linear-gradient(135deg,var(--cyan1),var(--cyan2))}
.tile.seq-orange{background:linear-gradient(135deg,var(--orange1),var(--orange2))}
.tile.seq-blue{background:linear-gradient(135deg,var(--blue1),var(--blue2))}
.tile.seq-red{background:linear-gradient(135deg,var(--red1),var(--red2))}
.tile.seq-lime{background:linear-gradient(135deg,var(--lime1),var(--lime2))}
.tile.seq-purple{background:linear-gradient(135deg,var(--purple1),var(--purple2))}

.tile.correct{
  outline:3px solid rgba(255,255,255,.7);
  transform:scale(0.96);
}

.tile.wrong{
  background:red;
}

.playbar{
  position:fixed;
  left:0;
  right:0;
  bottom:100px;
  display:flex;
  justify-content:center;
}

.signature{
  position:fixed;
  bottom:30px;
  width:100%;
  text-align:center;
  font-size:11px;
}

.action-btn{
  width:320px;
  height:60px;
  border-radius:24px;
  font-weight:900;
  color:white;
}

.action-btn.play{background:green}
.action-btn.stop{background:red}
</style>
</head>

<body>
<div class="app">

<h1>MEMORY COLORS</h1>

<section id="homeSection" class="home-card">
<div class="home-sub">
Mémorisez la séquence de couleurs et reproduisez-la.
</div>
</section>

<div id="topBar" class="top hidden">
<div class="top-pill" id="pointsBox">Points : 0</div>
<div class="top-pill" id="bestBox">Meilleur : 0</div>
</div>

<div id="status" class="status hidden"></div>

<section id="gameWrap" class="game-wrap hidden">
<div id="sequenceGrid" class="game-grid"></div>
</section>

<div class="signature">Jeu créé par Luis Coixao à l'aide de ChatGPT.</div>

</div>

<div class="playbar">
<button id="actionBtn" class="action-btn play">Jouer</button>
</div>

<script>
const COLORS = [
"seq-green",
"seq-yellow",
"seq-pink",
"seq-cyan",
"seq-orange",
"seq-blue",
"seq-red",
"seq-lime",
"seq-purple"
];

const state={playing:false,level:1,score:0,pattern:[],step:0,showing:false};

const grid=document.getElementById("sequenceGrid");

function buildGrid(){
for(let i=0;i<9;i++){
const t=document.createElement("div");
t.className="tile";
t.onclick=()=>clickTile(i);
grid.appendChild(t);
}
}

function light(i,on){
grid.children[i].className="tile"+(on?" "+COLORS[i]:"");
}

function randomIndex(){return Math.floor(Math.random()*9)}

function createPattern(len){
const arr=[];
for(let i=0;i<len;i++)arr.push(randomIndex());
return arr;
}

async function showPattern(){
state.showing=true;
for(const i of state.pattern){
light(i,true);
await new Promise(r=>setTimeout(r,500));
light(i,false);
await new Promise(r=>setTimeout(r,150));
}
state.showing=false;
state.step=0;
}

async function start(){
state.playing=true;
state.level=1;
state.score=0;
next();
}

async function next(){
state.pattern=createPattern(state.level);
await showPattern();
}

function clickTile(i){
if(state.showing)return;

if(i===state.pattern[state.step]){
grid.children[i].classList.add("correct");
state.step++;
if(state.step===state.pattern.length){
state.score++;
state.level++;
next();
}
}else{
grid.children[i].classList.add("wrong");
}
}

document.getElementById("actionBtn").onclick=start;

buildGrid();
</script>

</body>
</html>
