<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>FLASHGRID</title>

<meta name="theme-color" content="#eef2ff" />
<meta name="apple-mobile-web-app-capable" content="yes" />

<style>
/* (CSS inchangé) */
:root{
  --bg:#eef2ff;
  --card:rgba(255,255,255,.82);
  --text:#0f172a;
  --line:rgba(148,163,184,.22);
  --accent:#4f46e5;
  --good:#16a34a;
  --bad:#dc2626;
  --gold:#f59e0b;
}
body{margin:0;font-family:-apple-system;background:#eef2ff;padding:10px}
.controls{display:grid;gap:10px}
.segmented{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.segmented button,.toolbar button{
  border:none;border-radius:14px;padding:12px;font-weight:800
}
.segmented button{background:#fff}
.segmented button.active{background:#111;color:#fff}
.toolbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.primary{background:#4f46e5;color:#fff}
.secondary{background:#fff}
.warning{background:#f59e0b;color:#fff}

.grid{display:grid;gap:10px;margin-top:12px}
.tile{
  aspect-ratio:1;
  border-radius:16px;
  background:#fff;
  font-size:22px;
  font-weight:900;
}
.tile.correct{background:#22c55e;color:#fff}
.tile.wrong{background:#ef4444;color:#fff}
.tile.hiddenNum{color:transparent}
</style>
</head>

<body>

<div class="controls">
  <div class="segmented" id="modeButtons">
    <button data-mode="classic" class="active">Classique</button>
    <button data-mode="memory">Mémoire</button>
    <button data-mode="flash">Flash</button>
  </div>

  <div class="toolbar">
    <button class="primary" id="startBtn">Start</button>
    <button class="secondary" id="hintBtn">Hint</button>
    <button class="warning" id="pauseBtn">Pause</button>
  </div>
</div>

<div class="grid" id="gameGrid"></div>

<script>
const state = {
  mode:"classic",
  size:4,
  order:[],
  next:1,
  running:false,
  paused:false,
};

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const gameGrid = $("#gameGrid");

function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

function setMode(mode){
  state.mode=mode;
  $$("#modeButtons button").forEach(b=>b.classList.toggle("active",b.dataset.mode===mode));
}

function makeTiles(){
  const total=state.size*state.size;
  state.order=shuffle([...Array(total)].map((_,i)=>i+1));
  state.next=1;

  gameGrid.innerHTML="";
  gameGrid.style.gridTemplateColumns=`repeat(${state.size},1fr)`;

  state.order.forEach(n=>{
    const btn=document.createElement("button");
    btn.className="tile";
    btn.textContent=n;
    btn.onclick=()=>handleTile(btn,n);
    gameGrid.appendChild(btn);
  });
}

function hideAll(){
  document.querySelectorAll(".tile").forEach(t=>t.classList.add("hiddenNum"));
}

function startGame(){
  state.running=true;
  makeTiles();

  if(state.mode==="memory") setTimeout(hideAll,2000);
  if(state.mode==="flash") setTimeout(hideAll,800);
}

function handleTile(btn,n){
  if(!state.running) return;

  if(n===state.next){
    btn.classList.remove("hiddenNum");
    btn.classList.add("correct");
    btn.disabled=true;
    state.next++;
  } else {
    btn.classList.add("wrong");
    setTimeout(()=>btn.classList.remove("wrong"),300);
  }
}

$("#startBtn").onclick=startGame;

$$("#modeButtons button").forEach(btn=>{
  btn.onclick=()=>setMode(btn.dataset.mode);
});
</script>

</body>
</html>
