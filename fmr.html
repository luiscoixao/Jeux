<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>CHESSMEMORY</title>

<link rel="apple-touch-icon" href="iconchessmemory.png" />
<link rel="icon" href="iconchessmemory.png" />

<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="CHESSMEMORY" />
<meta name="theme-color" content="#2c2c2c" />

<style>
:root{
  --bg:#2c2c2c;
  --panel:#3a3a3a;
  --light:#eeeed2;
  --dark:#769656;
  --text:#ffffff;
  --gold:#d4af37;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:0 12px calc(18px + env(safe-area-inset-bottom));
}

h1{
  margin:calc(env(safe-area-inset-top) + 18px) 0 12px;
  font-size:28px;
  line-height:1.08;
  font-weight:700;
  text-align:center;
}

.app{
  width:100%;
  max-width:560px;
}

.controls-panel{
  background:var(--panel);
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 8px 20px rgba(0,0,0,.18);
}

#board-container{
  width:95vw;
  max-width:500px;
  aspect-ratio:1 / 1;
  overflow:hidden;
  margin-bottom:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.35);
}

#board{
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(8,1fr);
  width:100%;
  height:100%;
}

.square{
  position:relative;
  width:100%;
  height:100%;
  user-select:none;
  overflow:hidden;
  perspective:900px;
}

.white{ background:var(--light); }
.black{ background:var(--dark); }

.coord{
  position:absolute;
  font-size:10px;
  opacity:.65;
  font-weight:700;
  pointer-events:none;
  z-index:4;
}

.coord.file{
  left:5px;
  bottom:3px;
}

.coord.rank{
  right:4px;
  top:2px;
}

.card{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  border:none;
  background:none;
  padding:0;
  margin:0;
  cursor:pointer;
  touch-action:manipulation;
}

.card-inner{
  position:relative;
  width:100%;
  height:100%;
  transition:transform .42s ease;
  transform-style:preserve-3d;
}

.square.flipped .card-inner{
  transform:rotateY(180deg);
}

.face{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
}

.back{
  background:transparent;
}

.back::before{
  content:"";
  width:44%;
  height:44%;
  border-radius:50%;
  background:rgba(0,0,0,.10);
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.08),
    0 1px 3px rgba(0,0,0,.12);
}

.front{
  transform:rotateY(180deg);
}

.piece{
  line-height:1;
  position:relative;
  z-index:2;
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
  filter:drop-shadow(0 1px 0 rgba(0,0,0,.22));
  transform-origin:center center;
}

.piece-N,.piece-B,.piece-R,.piece-Q,.piece-K,
.piece-n,.piece-b,.piece-r,.piece-q,.piece-k{
  font-size:clamp(56px, 11vw, 82px);
}

.white-piece{
  color:#ffffff;
  text-shadow:
    0 0 1px #000,
    0 0 2px #000,
    0 1px 2px rgba(0,0,0,.55),
    0 0 6px rgba(255,255,255,.16);
}

.black-piece{
  color:#141414;
  text-shadow:
    0 0 1px rgba(255,255,255,.18),
    0 1px 1px rgba(255,255,255,.06);
}

.square.matched{
  box-shadow:inset 0 0 0 3px rgba(212,175,55,.95);
}

.controls{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:28px;
  background:var(--panel);
}

.control-btn{
  width:52px;
  height:52px;
  border:none;
  background:var(--bg);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  appearance:none;
  -webkit-appearance:none;
  cursor:pointer;
  touch-action:manipulation;
  box-shadow:none;
  padding:0;
}

.control-btn span{
  font-size:24px;
  line-height:1;
  display:block;
}

.control-btn:active{
  transform:scale(.94);
}

.footer-note{
  text-align:center;
  color:#cfcfcf;
  font-size:12px;
  line-height:1.35;
  margin-top:4px;
  opacity:.82;
}

@media (max-width:420px){
  .control-btn{
    width:46px;
    height:46px;
  }

  .control-btn span{
    font-size:22px;
  }

  .piece-N,.piece-B,.piece-R,.piece-Q,.piece-K,
  .piece-n,.piece-b,.piece-r,.piece.q,.piece-k{
    font-size:clamp(50px, 11vw, 70px);
  }
}
</style>
</head>
<body>

<h1>CHESSMEMORY</h1>

<div class="app">
  <div id="board-container">
    <div id="board"></div>
  </div>

  <div class="controls-panel">
    <div class="controls">
      <button class="control-btn" id="restartBtn" type="button" aria-label="Rejouer"><span>🔄</span></button>
    </div>
  </div>

  <div class="footer-note">Jeu imaginé par Luis et créé par ChatGPT</div>
</div>

<script>
const boardEl=document.getElementById("board");
const restartBtn=document.getElementById("restartBtn");

const FILES=["a","b","c","d","e","f","g","h"];
const PIECES={
  "N":"♘","B":"♗","R":"♖","Q":"♕","K":"♔",
  "n":"♞","b":"♝","r":"♜","q":"♛","k":"♚"
};

const BASE_DECK = [
  {piece:"K", pairId:"K1"}, {piece:"K", pairId:"K1"},
  {piece:"k", pairId:"k1"}, {piece:"k", pairId:"k1"},

  {piece:"Q", pairId:"Q1"}, {piece:"Q", pairId:"Q1"},
  {piece:"q", pairId:"q1"}, {piece:"q", pairId:"q1"},

  {piece:"R", pairId:"R1"}, {piece:"R", pairId:"R1"},
  {piece:"R", pairId:"R2"}, {piece:"R", pairId:"R2"},
  {piece:"r", pairId:"r1"}, {piece:"r", pairId:"r1"},
  {piece:"r", pairId:"r2"}, {piece:"r", pairId:"r2"},

  {piece:"B", pairId:"B1"}, {piece:"B", pairId:"B1"},
  {piece:"B", pairId:"B2"}, {piece:"B", pairId:"B2"},
  {piece:"b", pairId:"b1"}, {piece:"b", pairId:"b1"},
  {piece:"b", pairId:"b2"}, {piece:"b", pairId:"b2"},

  {piece:"N", pairId:"N1"}, {piece:"N", pairId:"N1"},
  {piece:"N", pairId:"N2"}, {piece:"N", pairId:"N2"},
  {piece:"n", pairId:"n1"}, {piece:"n", pairId:"n1"},
  {piece:"n", pairId:"n2"}, {piece:"n", pairId:"n2"}
];

let squares=[];
let picks=[];
let lockBoard=false;
let matchedPairs=0;
const totalPairs=32;

function shuffle(array){
  const arr=[...array];
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function createDeck(){
  const full=[...BASE_DECK,...BASE_DECK];
  return shuffle(full.map((card,index)=>({
    piece:card.piece,
    pairId:card.pairId+"-"+Math.floor(index/2),
    uid:"u"+index+"-"+Math.random().toString(36).slice(2,8),
    state:"hidden"
  })));
}

function coordsToSquare(file,rank){
  return FILES[file]+String(rank+1);
}

function createBoard(){
  squares=createDeck();
  picks=[];
  lockBoard=false;
  matchedPairs=0;
  renderBoard();
}

function renderBoard(){
  boardEl.innerHTML="";

  for(let row=7;row>=0;row--){
    for(let col=0;col<8;col++){
      const idx=row*8+col;
      const data=squares[idx];

      const sq=document.createElement("div");
      sq.className="square "+(((row+col)%2===0)?"white":"black");

      if(data.state==="revealed" || data.state==="matched") sq.classList.add("flipped");
      if(data.state==="matched") sq.classList.add("matched");

      const button=document.createElement("button");
      button.className="card";
      button.type="button";
      button.setAttribute("aria-label", coordsToSquare(col,row));

      const inner=document.createElement("div");
      inner.className="card-inner";

      const back=document.createElement("div");
      back.className="face back";

      const front=document.createElement("div");
      front.className="face front";

      const piece=document.createElement("span");
      piece.className="piece "+(data.piece===data.piece.toUpperCase() ? "white-piece " : "black-piece ")+"piece-"+data.piece;
      piece.textContent=PIECES[data.piece];

      front.appendChild(piece);
      inner.appendChild(back);
      inner.appendChild(front);
      button.appendChild(inner);
      button.onclick=()=>handleSquare(idx);
      sq.appendChild(button);

      if(row===0){
        const file=document.createElement("span");
        file.className="coord file";
        file.textContent=FILES[col];
        sq.appendChild(file);
      }

      if(col===7){
        const rank=document.createElement("span");
        rank.className="coord rank";
        rank.textContent=String(row+1);
        sq.appendChild(rank);
      }

      boardEl.appendChild(sq);
    }
  }
}

function isPair(a,b){
  return a.pairId===b.pairId && a.uid!==b.uid;
}

function handleSquare(index){
  if(lockBoard) return;

  const card=squares[index];
  if(card.state!=="hidden") return;

  card.state="revealed";
  picks.push(index);
  renderBoard();

  if(picks.length<2) return;

  lockBoard=true;

  const [i1,i2]=picks;
  const a=squares[i1];
  const b=squares[i2];

  if(isPair(a,b)){
    a.state="matched";
    b.state="matched";
    matchedPairs++;
    picks=[];
    lockBoard=false;
    renderBoard();

    if(matchedPairs===totalPairs){
      setTimeout(()=>alert("✓"),160);
    }
    return;
  }

  setTimeout(()=>{
    a.state="hidden";
    b.state="hidden";
    picks=[];
    lockBoard=false;
    renderBoard();
  },700);
}

restartBtn.addEventListener("click",createBoard);

createBoard();
</script>

</body>
</html>
