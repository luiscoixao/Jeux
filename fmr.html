<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CHESSMEMORY</title>

<style>
:root{
  --bg:#2c2c2c;
  --light:#eeeed2;
  --dark:#769656;
}

body{
  margin:0;
  background:var(--bg);
  font-family:-apple-system,sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  color:#fff;
}

h1{ margin:10px 0; }

#board{
  width:95vw;
  max-width:500px;
  aspect-ratio:1;
  display:grid;
  grid-template-columns:repeat(8,1fr);
}

.square{ position:relative; }
.white{ background:var(--light); }
.black{ background:var(--dark); }

/* PIÈCES PREMIUM */
.piece{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(56px,11vw,82px);
  font-family:"Arial Unicode MS","Segoe UI Symbol","Apple Symbols","Noto Sans Symbols 2",-apple-system,sans-serif;
  filter:drop-shadow(0 1px 1px rgba(0,0,0,.3));
}

.piece-K{ transform:scale(1.00); }
.piece-k{ transform:scale(1.12); }

.piece-Q{ transform:scale(1.00); }
.piece-q{ transform:scale(1.02); }

.piece-R{ transform:scale(0.88); }
.piece-r{ transform:scale(1.02); }

.piece-B{ transform:scale(0.98); }
.piece-b{ transform:scale(1.02); }

.piece-N{ transform:scale(1.00); }
.piece-n{ transform:scale(1.00); }

.white-piece{ color:#fff; }
.black-piece{ color:#111; }

.hidden{ display:none; }

/* COORDONNÉES */
.coord{
  position:absolute;
  font-size:10px;
  font-weight:700;
  opacity:.7;
}

.file{ bottom:2px; left:4px; }
.rank{ top:2px; left:4px; }

/* SCORE */
#score{
  margin-top:10px;
  font-size:18px;
}
</style>
</head>

<body>

<h1>CHESSMEMORY</h1>
<div id="board"></div>
<div id="score"></div>

<script>
const boardEl = document.getElementById("board");
const scoreEl = document.getElementById("score");

const PIECES = {
  "K":"♔","Q":"♕","R":"♖","B":"♗","N":"♘",
  "k":"♚","q":"♛","r":"♜","b":"♝","n":"♞"
};

const KEYS = Object.keys(PIECES);

let cells = [];
let selected = [];
let locked = true;

let score = 0;
let record = localStorage.getItem("chessMemoryRecord") || 0;

let timerInterval = null;

// ---------- UTILS ----------
function shuffle(a){ return a.sort(()=>Math.random()-0.5); }

function randomPiece(){
  return KEYS[Math.floor(Math.random()*KEYS.length)];
}

function clearTimer(){
  if(timerInterval) clearInterval(timerInterval);
}

// ---------- GAME ----------
function build(){
  cells = Array(64).fill(null).map(()=>({symbol:null,visible:false}));

  const p = randomPiece();
  const pos = shuffle([...Array(64).keys()]);

  cells[pos[0]] = {symbol:p,visible:true};
  cells[pos[1]] = {symbol:p,visible:true};
}

function render(){
  boardEl.innerHTML="";

  for(let i=0;i<64;i++){
    const r=Math.floor(i/8), c=i%8;
    const sq=document.createElement("div");
    sq.className="square "+((r+c)%2?"black":"white");

    const cell=cells[i];

    if(cell.symbol){
      const p=document.createElement("div");
      const color = (cell.symbol === cell.symbol.toUpperCase()) ? "white-piece" : "black-piece";

      p.className="piece piece-"+cell.symbol+" "+color+(cell.visible?"":" hidden");
      p.textContent=PIECES[cell.symbol];

      sq.appendChild(p);
      sq.onclick=()=>clickCell(i);
    }

    if(r===7){
      const f=document.createElement("div");
      f.className="coord file";
      f.textContent=String.fromCharCode(97+c);
      sq.appendChild(f);
    }

    if(c===0){
      const rk=document.createElement("div");
      rk.className="coord rank";
      rk.textContent=8-r;
      sq.appendChild(rk);
    }

    boardEl.appendChild(sq);
  }
}

function updateScore(){
  if(score > record){
    record = score;
    localStorage.setItem("chessMemoryRecord", record);
  }
  scoreEl.textContent = "Points : "+score+" | Record : "+record;
}

function start(){
  clearTimer();

  selected = [];
  locked = true;

  build();
  render();

  // mémoire 1 seconde
  setTimeout(()=>{
    cells.forEach(c=>{
      if(c.symbol) c.visible=false;
    });

    render();
    locked=false;

    startTimer();

  },1000);
}

function startTimer(){
  let timeLeft = 3;

  timerInterval = setInterval(()=>{
    timeLeft--;

    if(timeLeft <= 0){
      clearTimer();
      score--;
      updateScore();
      start();
    }
  },1000);
}

function clickCell(i){
  if(locked) return;

  const c=cells[i];
  if(!c.symbol || c.visible) return;

  c.visible=true;
  selected.push(i);
  render();

  if(selected.length===2){
    locked=true;
    clearTimer();

    const [a,b]=selected;

    if(cells[a].symbol===cells[b].symbol){
      score++;
    }else{
      score--;
    }

    updateScore();

    setTimeout(start,600);
  }
}

// INIT
updateScore();
start();
</script>

</body>
</html>
