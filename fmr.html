<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>BALLOONS</title>
<meta name="theme-color" content="#345dff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="BALLOONS" />
<link rel="apple-touch-icon" href="icon.png" />
<link rel="icon" type="image/png" href="icon.png" />
<link rel="manifest" href="manifest.webmanifest" />
<style>
:root{
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
  --safe-left: env(safe-area-inset-left);
  --safe-right: env(safe-area-inset-right);
  --white:#fff;
  --line:rgba(255,255,255,.26);
  --glass:rgba(255,255,255,.14);
  --shadow:0 18px 42px rgba(7,10,40,.34);
  --green1:#48ff8c;
  --green2:#06b34a;
  --red1:#ff5e85;
  --red2:#cf1133;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",sans-serif;
  color:var(--white);
  background:
    radial-gradient(circle at 12% 12%, rgba(255,239,118,.98) 0 0, rgba(255,239,118,0) 17%),
    radial-gradient(circle at 84% 12%, rgba(74,196,255,.96) 0 0, rgba(74,196,255,0) 18%),
    radial-gradient(circle at 82% 86%, rgba(86,255,227,.86) 0 0, rgba(86,255,227,0) 22%),
    radial-gradient(circle at 18% 88%, rgba(255,122,214,.76) 0 0, rgba(255,122,214,0) 22%),
    radial-gradient(circle at 50% 72%, rgba(181,102,255,.52) 0 0, rgba(181,102,255,0) 30%),
    linear-gradient(150deg,#5ae8ff 0%, #2f5eff 30%, #6e33ff 62%, #ff4ca0 100%);
}
body::before,
body::after{
  content:"";
  position:fixed;
  border-radius:50%;
  filter:blur(72px);
  pointer-events:none;
  opacity:.34;
}
body::before{width:38vw;height:38vw;left:-10vw;bottom:8vh;background:#67ffe4}
body::after{width:40vw;height:40vw;right:-8vw;top:4vh;background:#ffe660}
.game,.board,.hud,.endOverlay{position:fixed;inset:0}
.board{overflow:hidden;touch-action:manipulation}
.hud{pointer-events:none;z-index:5}
.title{
  position:absolute;
  top:calc(8px + var(--safe-top));
  left:calc(10px + var(--safe-left));
  right:calc(10px + var(--safe-right));
  margin:0;
  text-align:center;
  font-weight:1000;
  letter-spacing:.12em;
  line-height:.92;
  font-size:clamp(30px,8.5vw,56px);
  color:#fff;
  text-shadow:
    0 2px 0 rgba(255,255,255,.24),
    0 4px 0 rgba(16,25,107,.42),
    0 12px 26px rgba(7,10,60,.62),
    0 0 28px rgba(255,255,255,.24);
}
.bottomBar{
  position:absolute;
  left:calc(12px + var(--safe-left));
  right:calc(12px + var(--safe-right));
  bottom:calc(10px + var(--safe-bottom));
  display:grid;
  grid-template-columns:minmax(100px,1fr) minmax(100px,1fr) minmax(132px,1.32fr);
  gap:10px;
  align-items:stretch;
  pointer-events:auto;
}
.stat,.toggleBtn,.endCard{
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  backdrop-filter:blur(16px) saturate(1.15);
  -webkit-backdrop-filter:blur(16px) saturate(1.15);
}
.stat{
  min-height:84px;
  background:linear-gradient(180deg, rgba(255,255,255,.19), rgba(255,255,255,.11));
  border-radius:25px;
  padding:10px 12px 8px;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.stat .label{
  font-size:11px;
  font-weight:900;
  letter-spacing:.16em;
  text-transform:uppercase;
  opacity:.98;
}
.stat .value{
  margin-top:7px;
  font-size:clamp(18px,5.2vw,31px);
  line-height:1;
  font-weight:1000;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
  letter-spacing:-.02em;
}
.toggleBtn{
  appearance:none;
  border-radius:29px;
  min-height:84px;
  width:100%;
  min-width:0;
  color:#fff;
  font-weight:1000;
  font-size:clamp(20px,5.3vw,34px);
  letter-spacing:.03em;
  text-shadow:0 2px 10px rgba(0,0,0,.18);
  padding:0 14px;
}
.toggleBtn.play{background:linear-gradient(180deg,var(--green1),var(--green2))}
.toggleBtn.stop{background:linear-gradient(180deg,var(--red1),var(--red2))}
.balloon{
  position:absolute;
  border:none;
  border-radius:49% 49% 43% 43% / 39% 39% 61% 61%;
  transform:translate(-50%,-50%);
  box-shadow:
    inset -16px -22px 28px rgba(0,0,0,.20),
    inset 12px 16px 22px rgba(255,255,255,.42),
    0 20px 28px rgba(0,0,0,.18),
    0 0 0 1px rgba(255,255,255,.08);
  transition:transform .14s ease, opacity .24s ease, filter .2s ease;
}
.balloon::before{
  content:"";
  position:absolute;
  width:34%;
  height:18%;
  left:16%;
  top:13%;
  border-radius:50%;
  background:rgba(255,255,255,.52);
  transform:rotate(-18deg);
  filter:blur(1px);
}
.balloon:active{transform:translate(-50%,-50%) scale(.95)}
.balloon.majority{
  filter:brightness(1.12) saturate(1.28) contrast(1.08) drop-shadow(0 0 22px rgba(255,255,255,.34));
  box-shadow:
    inset -16px -22px 28px rgba(0,0,0,.18),
    inset 12px 16px 22px rgba(255,255,255,.42),
    0 0 0 3px rgba(255,255,255,.20),
    0 20px 28px rgba(0,0,0,.18),
    0 0 26px rgba(255,255,255,.14);
}
.balloon.wrong{animation:wrongShake .34s ease}
.balloon.fly{
  animation:flyAway 2.65s cubic-bezier(.16,.82,.16,1) forwards;
  pointer-events:none;
}
.particle{
  position:absolute;
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%,-50%);
  animation:particle 1.1s ease-out forwards;
}
.endOverlay{
  display:none;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:rgba(12,16,36,.18);
  z-index:8;
}
.endOverlay.show{display:flex}
.endCard{
  width:min(90vw,520px);
  background:rgba(255,255,255,.18);
  border-radius:34px;
  padding:24px 20px 20px;
  text-align:center;
}
.endMini{font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:900;opacity:.92}
.endTitle{margin:10px 0 6px;font-size:clamp(28px,8vw,42px);line-height:.95;font-weight:1000}
.endTime{font-size:clamp(34px,9vw,52px);font-weight:1000;line-height:1;margin:8px 0 10px;font-variant-numeric:tabular-nums}
.endText{font-size:16px;line-height:1.35;font-weight:700;margin:0 0 14px}
.endBtn{
  appearance:none;border:none;min-width:180px;min-height:56px;border-radius:20px;
  font-size:20px;font-weight:1000;color:#fff;
  background:linear-gradient(180deg,var(--green1),var(--green2));box-shadow:var(--shadow);
}
@keyframes wrongShake{
  0%,100%{transform:translate(-50%,-50%)}
  25%{transform:translate(calc(-50% - 7px),-50%)}
  50%{transform:translate(calc(-50% + 7px),-50%)}
  75%{transform:translate(calc(-50% - 5px),-50%)}
}
@keyframes flyAway{
  0%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0deg)}
  18%{opacity:1;transform:translate(calc(-50% + var(--driftx) * .10),calc(-50% - 20px)) scale(1.01) rotate(calc(var(--spin) * .10))}
  42%{opacity:.98;transform:translate(calc(-50% + var(--driftx) * .35),calc(-50% - 90px)) scale(1.03) rotate(calc(var(--spin) * .35))}
  72%{opacity:.94;transform:translate(calc(-50% + var(--driftx) * .75),calc(-50% - 230px)) scale(1.05) rotate(calc(var(--spin) * .75))}
  100%{opacity:0;transform:translate(calc(-50% + var(--driftx)),calc(-50% - 470px)) scale(.95) rotate(var(--spin))}
}
@keyframes particle{
  0%{opacity:.96}
  100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(.14)}
}
@media (max-width: 430px){
  .bottomBar{grid-template-columns:minmax(94px,1fr) minmax(94px,1fr) minmax(126px,1.2fr);gap:8px}
  .stat{min-height:78px;border-radius:22px;padding:10px 10px 8px}
  .toggleBtn{min-height:78px;border-radius:24px;font-size:clamp(18px,5vw,28px);padding:0 12px}
}
</style>
</head>
<body>
<div class="game">
  <div class="board" id="board"></div>
  <div class="hud">
    <h1 class="title">BALLOONS</h1>
    <div class="bottomBar" id="bottomBar">
      <div class="stat">
        <div class="label">Chrono</div>
        <div class="value" id="timer">00:00.0</div>
      </div>
      <div class="stat">
        <div class="label">Record</div>
        <div class="value" id="best">--:--.-</div>
      </div>
      <button class="toggleBtn play" id="toggleBtn" aria-label="Jouer">JOUER</button>
    </div>
  </div>
</div>

<div class="endOverlay" id="endOverlay">
  <div class="endCard">
    <div class="endMini">Partie terminée</div>
    <div class="endTitle">Bravo</div>
    <div class="endTime" id="endTime">00:00.0</div>
    <p class="endText" id="endText">Tu as vidé les 10 séries.</p>
    <button class="endBtn" id="restartBtn">REJOUER</button>
  </div>
</div>

<script>
(() => {
  const board = document.getElementById('board');
  const timerEl = document.getElementById('timer');
  const bestEl = document.getElementById('best');
  const toggleBtn = document.getElementById('toggleBtn');
  const bottomBar = document.getElementById('bottomBar');
  const endOverlay = document.getElementById('endOverlay');
  const endTimeEl = document.getElementById('endTime');
  const endTextEl = document.getElementById('endText');
  const restartBtn = document.getElementById('restartBtn');

  const STORAGE_BEST = 'balloons-best-v3';
  const MAX_SERIES = 10;
  const COLORS = [
    ['#ff9ebe','#ff2d67'],
    ['#95ff9c','#18bc43'],
    ['#fff18a','#ffbf0f'],
    ['#98e6ff','#149dff'],
    ['#d9afff','#8250ff'],
    ['#ffd0a0','#ff7a1a'],
    ['#92fff2','#07c7b2'],
    ['#ffaff0','#ff3dc3']
  ];

  let bestMs = Number(localStorage.getItem(STORAGE_BEST) || 0);
  let raf = 0;
  let startTs = 0;
  let state = null;

  function fmt(ms){
    if(ms == null || Number.isNaN(ms)) return '--:--.-';
    const totalTenths = Math.floor(ms / 100);
    const minutes = Math.floor(totalTenths / 600);
    const seconds = Math.floor((totalTenths % 600) / 10);
    const tenths = totalTenths % 10;
    return `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}.${tenths}`;
  }

  function updateBest(){
    bestEl.textContent = bestMs ? fmt(bestMs) : '--:--.-';
  }

  function setButtonState(running){
    toggleBtn.className = 'toggleBtn ' + (running ? 'stop' : 'play');
    toggleBtn.textContent = running ? 'ARRÊTER' : 'JOUER';
    toggleBtn.setAttribute('aria-label', running ? 'Arrêter' : 'Jouer');
  }

  function computeSeriesCount(series){
    const start = 118;
    const end = 88;
    const t = (series - 1) / Math.max(1, MAX_SERIES - 1);
    const eased = Math.pow(t, 1.9);
    return Math.round(start + (end - start) * eased);
  }

  function makeBalancedCounts(total){
    const colorCount = COLORS.length;
    const winnerIndex = Math.floor(Math.random() * colorCount);
    const weights = Array.from({ length: colorCount }, () => 0.86 + Math.random() * 0.18);
    weights[winnerIndex] += 0.22 + Math.random() * 0.07;

    const sum = weights.reduce((a,b) => a+b, 0);
    const counts = weights.map(w => Math.max(4, Math.floor(total * w / sum)));
    let diff = total - counts.reduce((a,b) => a+b, 0);

    while(diff !== 0){
      if(diff > 0){ counts[Math.floor(Math.random()*colorCount)]++; diff--; }
      else {
        const donors = counts.map((v,i)=>({v,i})).filter(x => x.v > 4);
        if(!donors.length) break;
        counts[donors[Math.floor(Math.random()*donors.length)].i]--; diff++;
      }
    }

    const otherMax = Math.max(...counts.filter((_,i)=>i!==winnerIndex));
    if(counts[winnerIndex] <= otherMax){
      const need = otherMax - counts[winnerIndex] + 1;
      counts[winnerIndex] += need;
      for(let n = 0; n < need; n++){
        const donor = counts
          .map((v,i)=>({v,i}))
          .filter(x => x.i !== winnerIndex && x.v > 5)
          .sort((a,b)=>b.v-a.v)[0];
        if(!donor) break;
        counts[donor.i]--;
      }
    }
    return counts;
  }

  function boardZone(){
    const rect = board.getBoundingClientRect();
    const root = getComputedStyle(document.documentElement);
    const safeTop = parseFloat(root.getPropertyValue('--safe-top')) || 0;
    const safeBottom = parseFloat(root.getPropertyValue('--safe-bottom')) || 0;
    const barRect = bottomBar.getBoundingClientRect();
    const reservedBottom = rect.height - barRect.top + 10;
    return {
      width: rect.width,
      height: rect.height,
      left: 10,
      right: rect.width - 10,
      top: 78 + safeTop,
      bottom: rect.height - Math.max(108 + safeBottom, reservedBottom)
    };
  }

  function intersects(a, b, pad = 2){
    return !(
      a.x + a.w / 2 - pad < b.x - b.w / 2 ||
      a.x - a.w / 2 + pad > b.x + b.w / 2 ||
      a.y + a.h / 2 - pad < b.y - b.h / 2 ||
      a.y - a.h / 2 + pad > b.y + b.h / 2
    );
  }

  function randomBetween(min, max){
    return min + Math.random() * (max - min);
  }

  function makeBalloons(series){
    const total = computeSeriesCount(series);
    const counts = makeBalancedCounts(total);
    const balloons = [];
    let id = 1;
    const zone = boardZone();
    const placed = [];

    counts.forEach((count, colorIndex) => {
      for(let i = 0; i < count; i++){
        const roll = Math.random();
        let w;
        if(roll < 0.20) w = 54 + Math.random() * 12;
        else if(roll < 0.64) w = 68 + Math.random() * 18;
        else if(roll < 0.90) w = 88 + Math.random() * 22;
        else w = 112 + Math.random() * 26;
        const h = w * (1.20 + Math.random() * 0.18);
        const balloon = {
          id: id++, colorIndex,
          x: 0, y: 0, w, h,
          driftX: (Math.random() - 0.5) * 210,
          spin: `${(Math.random() > .5 ? 1 : -1) * (14 + Math.random() * 28)}deg`
        };

        let bestSpot = null;
        let bestScore = -Infinity;

        for(let tries = 0; tries < 140; tries++){
          const candidate = {
            x: randomBetween(zone.left + balloon.w * 0.36, zone.right - balloon.w * 0.36),
            y: randomBetween(zone.top + balloon.h * 0.34, zone.bottom - balloon.h * 0.34),
            w: balloon.w,
            h: balloon.h
          };

          let overlaps = 0;
          let touchScore = 0;
          for(const other of placed){
            if(intersects(candidate, other, 5)) overlaps++;
            const dx = candidate.x - other.x;
            const dy = candidate.y - other.y;
            const dist = Math.hypot(dx, dy);
            if(dist < (candidate.w + other.w) * 0.72) touchScore += 1;
          }

          const centerBias = -Math.abs(candidate.x - zone.width / 2) * 0.002;
          const bottomBias = candidate.y * 0.004;
          const score = touchScore * 3 - overlaps * 12 + centerBias + bottomBias + Math.random() * 0.8;

          if(overlaps <= 1 && score > bestScore){
            bestScore = score;
            bestSpot = candidate;
          }
        }

        if(!bestSpot){
          bestSpot = {
            x: randomBetween(zone.left + balloon.w * 0.36, zone.right - balloon.w * 0.36),
            y: randomBetween(zone.top + balloon.h * 0.34, zone.bottom - balloon.h * 0.34),
            w: balloon.w,
            h: balloon.h
          };
        }

        balloon.x = bestSpot.x;
        balloon.y = bestSpot.y;
        placed.push(balloon);
        balloons.push(balloon);
      }
    });

    return balloons.sort((a, b) => (a.y + a.h * 0.5) - (b.y + b.h * 0.5));
  }

  function getMajorityData(){
    const counts = new Map();
    state.balloons.forEach(balloon => counts.set(balloon.colorIndex, (counts.get(balloon.colorIndex) || 0) + 1));
    const max = Math.max(...counts.values());
    const winners = [...counts.entries()].filter(([, value]) => value === max).map(([key]) => key);
    return { counts, winners };
  }

  function render(){
    const frag = document.createDocumentFragment();
    const { winners } = getMajorityData();
    const ordered = [...state.balloons].sort((a,b) => (a.y + a.h/2) - (b.y + b.h/2));

    ordered.forEach(balloon => {
      const el = document.createElement('button');
      const isWinner = winners.includes(balloon.colorIndex);
      el.className = 'balloon' + (isWinner ? ' majority' : '');
      el.style.width = `${balloon.w}px`;
      el.style.height = `${balloon.h}px`;
      el.style.left = `${balloon.x}px`;
      el.style.top = `${balloon.y}px`;
      el.style.zIndex = String(Math.round(balloon.y));
      el.style.setProperty('--driftx', `${balloon.driftX}px`);
      el.style.setProperty('--spin', balloon.spin);
      const [c1, c2] = COLORS[balloon.colorIndex];
      el.style.background = `radial-gradient(circle at 34% 28%, ${c1} 0%, ${c1} 22%, ${c2} 100%)`;
      el.dataset.id = String(balloon.id);
      el.dataset.colorIndex = String(balloon.colorIndex);
      el.addEventListener('click', onBalloonClick, { passive: true });
      frag.appendChild(el);
    });

    board.replaceChildren(frag);
  }

  function spawnParticles(x, y, colorIndex, count = 8){
    const [c1, c2] = COLORS[colorIndex];
    for(let i = 0; i < count; i++){
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 5 + Math.random() * 13;
      const angle = Math.random() * Math.PI * 2;
      const dist = 28 + Math.random() * 96;
      p.style.width = `${size}px`;
      p.style.height = `${size}px`;
      p.style.left = `${x}px`;
      p.style.top = `${y}px`;
      p.style.background = Math.random() > 0.5 ? c1 : c2;
      p.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
      p.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
      board.appendChild(p);
      setTimeout(() => p.remove(), 1150);
    }
  }

  function removeColor(colorIndex){
    const els = [...board.querySelectorAll(`.balloon[data-color-index="${colorIndex}"]`)];

    els.forEach((el, i) => {
      setTimeout(() => {
        el.classList.add('fly');
        spawnParticles(parseFloat(el.style.left), parseFloat(el.style.top), colorIndex, 6);
      }, i * 18);
    });

    setTimeout(() => {
      state.balloons = state.balloons.filter(balloon => balloon.colorIndex !== colorIndex);
      if(state.balloons.length <= 1){
        advanceSeriesOrFinish();
      } else {
        render();
      }
    }, 2720);
  }

  function advanceSeriesOrFinish(){
    if(state.series >= MAX_SERIES){
      finishGame();
      return;
    }
    state = { series: state.series + 1, running: true, finished: false, balloons: makeBalloons(state.series + 1) };
    render();
  }

  function onBalloonClick(event){
    if(!state || !state.running || state.finished) return;
    const colorIndex = Number(event.currentTarget.dataset.colorIndex);
    const { winners } = getMajorityData();
    if(!winners.includes(colorIndex)){
      event.currentTarget.classList.add('wrong');
      setTimeout(() => event.currentTarget.classList.remove('wrong'), 340);
      if(navigator.vibrate) navigator.vibrate(26);
      return;
    }
    removeColor(colorIndex);
  }

  function tick(){
    if(!state || !state.running) return;
    timerEl.textContent = fmt(performance.now() - startTs);
    raf = requestAnimationFrame(tick);
  }

  function startTimer(){ cancelAnimationFrame(raf); startTs = performance.now(); tick(); }
  function stopTimer(){ cancelAnimationFrame(raf); }

  function startGame(){
    endOverlay.classList.remove('show');
    state = { series: 1, running: true, finished: false, balloons: makeBalloons(1) };
    render();
    timerEl.textContent = '00:00.0';
    setButtonState(true);
    startTimer();
  }

  function stopGame(){
    stopTimer();
    state = null;
    board.replaceChildren();
    timerEl.textContent = '00:00.0';
    setButtonState(false);
  }

  function finishGame(){
    stopTimer();
    const elapsed = Math.floor(performance.now() - startTs);
    timerEl.textContent = fmt(elapsed);
    endTimeEl.textContent = fmt(elapsed);
    let newBest = false;
    if(!bestMs || elapsed < bestMs){
      bestMs = elapsed;
      localStorage.setItem(STORAGE_BEST, String(bestMs));
      updateBest();
      newBest = true;
    }
    endTextEl.innerHTML = newBest ? 'Nouveau <strong>record</strong> !' : 'Partie terminée. Essaie encore plus vite.';
    setButtonState(false);
    endOverlay.classList.add('show');
    state = { finished: true, running: false, balloons: [], series: MAX_SERIES };
  }

  toggleBtn.addEventListener('click', () => {
    if(state && state.running && !state.finished) stopGame();
    else startGame();
  });
  restartBtn.addEventListener('click', startGame);
  window.addEventListener('resize', () => {
    if(state && state.running && !state.finished){
      state.balloons = makeBalloons(state.series);
      render();
    }
  }, { passive: true });

  timerEl.textContent = '00:00.0';
  updateBest();
  setButtonState(false);
  startGame();
})();
</script>
</body>
</html>
