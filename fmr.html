<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>CHESSMEMORY</title>

<meta name="theme-color" content="#2c2c2c" />

<style>
:root{
  --bg:#2c2c2c;
  --light:#eeeed2;
  --dark:#769656;
  --gold:#d4af37;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h1{
  color:#fff;
  margin:20px 0 10px;
  font-size:28px;
}

#board{
  width:95vw;
  max-width:500px;
  aspect-ratio:1;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  box-shadow:0 10px 25px rgba(0,0,0,.35);
}

.square{
  position:relative;
}

.white{background:var(--light)}
.black{background:var(--dark)}

.card{
  position:absolute;
  inset:0;
  cursor:pointer;
}

.piece{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(60px,12vw,90px);
}

.white-piece{color:#fff;text-shadow:0 0 2px #000}
.black-piece{color:#111}

.hidden .piece{display:none}

#info{
  color:#fff;
  margin:10px;
  font-size:18px;
}
</style>
</head>

<body>

<h1>CHESSMEMORY</h1>
<div id="board"></div>
<div id="info">Mémorise…</div>

<script>
const board = document.getElementById("board");
const info = document.getElementById("info");

const PIECES = ["♔","♕","♖","♗","♘","♚","♛","♜","♝","♞"];

let cells = [];
let picks = [];
let lock = false;

// créer une partie
function newGame(){

  picks = [];
  lock = true;
  info.textContent = "Mémorise…";

  // choisir une paire
  const symbol = PIECES[Math.floor(Math.random()*PIECES.length)];

  // 64 cases vides
  cells = Array(64).fill(null);

  // placer 2 cartes
  let i1 = Math.floor(Math.random()*64);
  let i2;
  do { i2 = Math.floor(Math.random()*64); } while(i2===i1);

  cells[i1] = {symbol, id:1};
  cells[i2] = {symbol, id:2};

  render(true); // visible

  // cacher après 1 seconde
  setTimeout(()=>{
    render(false);
    lock = false;
    info.textContent = "Trouve la paire";
  },1000);
}

// affichage
function render(showAll=false){
  board.innerHTML="";

  for(let i=0;i<64;i++){
    const sq = document.createElement("div");
    sq.className="square "+(((Math.floor(i/8)+i)%2)?"white":"black");

    const card = document.createElement("div");
    card.className="card";

    const data = cells[i];

    if(data){
      const piece = document.createElement("div");
      piece.className="piece "+(data.symbol==="♔"||data.symbol==="♕"||data.symbol==="♖"||data.symbol==="♗"||data.symbol==="♘"?"white-piece":"black-piece");
      piece.textContent=data.symbol;

      if(!showAll && !data.revealed) piece.parentElement?.classList?.add("hidden");

      if(!showAll && !data.revealed){
        piece.style.display="none";
      }

      card.onclick=()=>clickCard(i);

      sq.appendChild(piece);
    }

    board.appendChild(sq);
  }
}

// clic
function clickCard(i){
  if(lock) return;
  const card = cells[i];
  if(!card || card.revealed) return;

  card.revealed=true;
  picks.push(i);
  render(false);

  if(picks.length<2) return;

  lock = true;

  const [a,b]=picks;

  if(cells[a].symbol === cells[b].symbol){
    info.textContent="Bravo !";

    setTimeout(newGame,1200);
  }else{
    setTimeout(()=>{
      cells[a].revealed=false;
      cells[b].revealed=false;
      picks=[];
      lock=false;
      render(false);
    },600);
  }
}

// lancement auto
newGame();
</script>

</body>
</html>
