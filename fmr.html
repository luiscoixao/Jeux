<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>MEMORY COLORS</title>

<meta name="theme-color" content="#5b3df5" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="MEMORY COLORS" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="apple-touch-icon" href="iconmemorycolors.png" />
<link rel="icon" type="image/png" href="iconmemorycolors.png" />

<style>
:root{
  --bg1:#4338ca;
  --bg2:#7c3aed;
  --bg3:#312e81;
  --text:#ffffff;

  /* Couleurs unies, bien distinctes */
  --green:#22c55e;
  --yellow:#facc15;
  --pink:#ec4899;
  --cyan:#06b6d4;
  --orange:#f97316;
  --red:#ef4444;
  --lime:#84cc16;
  --teal:#14b8a6;
  --amber:#f59e0b;
  --coral:#fb7185;
  --mint:#34d399;
  --gold:#eab308;
}
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 10% 15%, rgba(56,189,248,.22), transparent 20%),
    radial-gradient(circle at 90% 12%, rgba(255,60,172,.18), transparent 20%),
    radial-gradient(circle at 20% 90%, rgba(34,197,94,.10), transparent 22%),
    linear-gradient(135deg,var(--bg1),var(--bg2) 55%, #5b21b6 75%, var(--bg3));
}

.app{
  width:100vw;
  height:100dvh;
  padding:
    calc(env(safe-area-inset-top) + 8px)
    0
    calc(env(safe-area-inset-bottom) + 10px)
    0;
  display:flex;
  flex-direction:column;
}

.header{
  flex:0 0 auto;
  text-align:center;
  padding:10px 6px 10px;
  overflow:hidden;
}

h1{
  margin:0;
  font-size:clamp(36px, 9vw, 72px);
  line-height:1;
  font-weight:800;
  letter-spacing:.05em;
  text-transform:uppercase;
  text-shadow:
    0 4px 18px rgba(0,0,0,.25),
    0 0 30px rgba(255,255,255,.12);
  white-space:nowrap;
}

.title-letter{
  display:inline-block;
}

.t1{color:var(--green);}
.t2{color:var(--yellow);}
.t3{color:var(--pink);}
.t4{color:var(--cyan);}
.t5{color:#fdba74;}
.t6{color:var(--red);}
.t7{color:var(--lime);}
.t8{color:var(--teal);}
.t9{color:var(--amber);}
.t10{color:var(--coral);}
.t11{color:var(--mint);}
.t12{color:var(--gold);}

.board-wrap{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  overflow:hidden;
}

.board{
  width:min(100vw, calc((100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 98px) * 0.6666667));
  height:min(calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 98px), calc(100vw * 1.5));
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  grid-template-rows:repeat(6, 1fr);
  gap:0;
  background:rgba(255,255,255,.04);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);
}

.tile{
  width:100%;
  height:100%;
  min-width:0;
  min-height:0;
  border:none;
  border-radius:0;
  padding:0;
  margin:0;
  cursor:pointer;
  transition:transform .14s ease, opacity .18s ease, box-shadow .18s ease;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.10);
}

.tile:active{
  transform:scale(.985);
}

.tile.hidden{
  background:rgba(255,255,255,.03);
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.09);
}

.tile.open{
  transform:scale(.99);
  box-shadow:inset 0 0 0 3px rgba(255,255,255,.58);
}

/* même bordure pour une paire trouvée */
.tile.matched{
  box-shadow:inset 0 0 0 3px rgba(255,255,255,.58);
}

.seq-green{background:var(--green);}
.seq-yellow{background:var(--yellow);}
.seq-pink{background:var(--pink);}
.seq-cyan{background:var(--cyan);}
.seq-orange{background:var(--orange);}
.seq-red{background:var(--red);}
.seq-lime{background:var(--lime);}
.seq-teal{background:var(--teal);}
.seq-amber{background:var(--amber);}
.seq-coral{background:var(--coral);}
.seq-mint{background:var(--mint);}
.seq-gold{background:var(--gold);}

.end-message{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(10,12,28,.42);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  opacity:0;
  pointer-events:none;
  transition:opacity .22s ease;
  z-index:50;
}
.end-message.show{
  opacity:1;
  pointer-events:auto;
}
.end-box{
  min-width:min(88vw, 360px);
  padding:24px 22px;
  text-align:center;
  background:rgba(12,18,40,.62);
  border:1px solid rgba(255,255,255,.16);
  box-shadow:
    0 24px 60px rgba(0,0,0,.28),
    inset 0 0 0 1px rgba(255,255,255,.03);
}
.end-text{
  font-size:16px;
  font-weight:700;
  color:rgba(255,255,255,.92);
  line-height:1.4;
}
.end-hint{
  margin-top:10px;
  font-size:12px;
  font-weight:700;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:rgba(255,255,255,.65);
}

.signature{
  flex:0 0 auto;
  margin-top:10px;
  text-align:center;
  font-size:10px;
  color:rgba(255,255,255,.42);
  pointer-events:none;
  width:100%;
}

@media (max-height:700px){
  .signature{
    margin-top:8px;
  }
}
</style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 aria-label="MEMORY COLORS">
        <span class="title-letter t1">M</span>
        <span class="title-letter t2">E</span>
        <span class="title-letter t3">M</span>
        <span class="title-letter t4">O</span>
        <span class="title-letter t5">R</span>
        <span class="title-letter t6">Y</span>
        <span class="title-letter">&nbsp;</span>
        <span class="title-letter t7">C</span>
        <span class="title-letter t8">O</span>
        <span class="title-letter t9">L</span>
        <span class="title-letter t10">O</span>
        <span class="title-letter t11">R</span>
        <span class="title-letter t12">S</span>
      </h1>
    </header>

    <section class="board-wrap">
      <div id="board" class="board"></div>
      <div class="signature">Jeu créé par Luis Coixao à l'aide de ChatGPT.</div>
    </section>
  </div>

  <div id="endMessage" class="end-message">
    <div class="end-box">
      <div id="endText" class="end-text"></div>
      <div class="end-hint">Touchez pour recommencer</div>
    </div>
  </div>

<script>
const COLORS = [
  "seq-green",
  "seq-yellow",
  "seq-pink",
  "seq-cyan",
  "seq-orange",
  "seq-red",
  "seq-lime",
  "seq-teal",
  "seq-amber",
  "seq-coral",
  "seq-mint",
  "seq-gold"
];

const BEST_KEY = "memory-colors-best-score";

const state = {
  locked: true,
  moves: 0,
  matched: 0,
  first: null,
  second: null,
  board: [],
  finished: false
};

const boardEl = document.getElementById("board");
const endMessage = document.getElementById("endMessage");
const endText = document.getElementById("endText");

function wait(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}

function shuffle(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getBestScore(){
  const best = Number(localStorage.getItem(BEST_KEY) || 0);
  return Number.isFinite(best) ? best : 0;
}

function saveBestScore(score){
  const currentBest = getBestScore();
  if(currentBest === 0 || score < currentBest){
    localStorage.setItem(BEST_KEY, String(score));
    return score;
  }
  return currentBest;
}

function buildBoard(){
  const pairs = [...COLORS, ...COLORS];
  state.board = shuffle(pairs).map((color, index) => ({
    id: index,
    color,
    open: false,
    matched: false
  }));
}

function renderBoard(){
  boardEl.innerHTML = "";

  state.board.forEach((card, index) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "tile " + (
      card.matched ? card.color + " matched" :
      card.open ? card.color + " open" :
      "hidden"
    );
    btn.addEventListener("click", () => handleTileClick(index));
    boardEl.appendChild(btn);
  });
}

async function previewBoard(){
  state.locked = true;
  state.board.forEach(card => card.open = true);
  renderBoard();
  await wait(1400);
  state.board.forEach(card => {
    if(!card.matched) card.open = false;
  });
  renderBoard();
  state.locked = false;
}

async function startGame(){
  state.locked = true;
  state.moves = 0;
  state.matched = 0;
  state.first = null;
  state.second = null;
  state.finished = false;
  endMessage.classList.remove("show");

  buildBoard();
  renderBoard();
  await previewBoard();
}

async function handleTileClick(index){
  if(state.locked || state.finished) return;

  const card = state.board[index];
  if(!card || card.open || card.matched) return;

  card.open = true;
  renderBoard();

  if(state.first === null){
    state.first = index;
    return;
  }

  state.second = index;
  state.moves += 1;
  state.locked = true;

  const firstCard = state.board[state.first];
  const secondCard = state.board[state.second];

  if(firstCard.color === secondCard.color){
    firstCard.matched = true;
    secondCard.matched = true;
    state.matched += 2;

    state.first = null;
    state.second = null;
    renderBoard();

    if(state.matched === state.board.length){
      state.finished = true;
      const best = saveBestScore(state.moves);
      await wait(250);
      endText.textContent = "Partie terminée en " + state.moves + " coups. Meilleur score : " + best + ".";
      endMessage.classList.add("show");
      return;
    }

    state.locked = false;
    return;
  }

  await wait(650);

  firstCard.open = false;
  secondCard.open = false;
  state.first = null;
  state.second = null;
  renderBoard();
  state.locked = false;
}

async function restartGame(){
  if(!endMessage.classList.contains("show")) return;
  endMessage.classList.remove("show");
  await wait(180);
  startGame();
}

endMessage.addEventListener("click", restartGame);

startGame();
</script>
</body>
</html>
