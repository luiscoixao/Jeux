<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>BALLOONS</title>
<meta name="theme-color" content="#345dff" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="BALLOONS" />
<link rel="apple-touch-icon" href="icon_balloons.png" />
<link rel="icon" type="image/png" href="icon_balloons.png" />
<link rel="manifest" href="manifest.webmanifest" />

<style>
:root{
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
  --safe-left: env(safe-area-inset-left);
  --safe-right: env(safe-area-inset-right);
  --white:#fff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",sans-serif;
  color:var(--white);
  background:
    radial-gradient(circle at 12% 12%, rgba(255,239,118,.95) 0 0, rgba(255,239,118,0) 17%),
    radial-gradient(circle at 84% 12%, rgba(74,196,255,.92) 0 0, rgba(74,196,255,0) 18%),
    radial-gradient(circle at 82% 86%, rgba(86,255,227,.80) 0 0, rgba(86,255,227,0) 22%),
    radial-gradient(circle at 18% 88%, rgba(255,122,214,.72) 0 0, rgba(255,122,214,0) 22%),
    radial-gradient(circle at 50% 72%, rgba(181,102,255,.45) 0 0, rgba(181,102,255,0) 30%),
    linear-gradient(150deg,#5ae8ff 0%, #3a67ff 32%, #7b43ff 63%, #ff58ab 100%);
}
body::before,
body::after{
  content:"";
  position:fixed;
  border-radius:50%;
  filter:blur(72px);
  pointer-events:none;
  opacity:.34;
}
body::before{width:38vw;height:38vw;left:-10vw;bottom:8vh;background:#67ffe4}
body::after{width:40vw;height:40vw;right:-8vw;top:4vh;background:#ffe660}

.game,.board,.hud{position:fixed;inset:0}
.board{overflow:hidden;touch-action:manipulation}
.hud{pointer-events:none;z-index:5}

.title{
  position:absolute;
  top:calc(8px + var(--safe-top));
  left:calc(10px + var(--safe-left));
  right:calc(10px + var(--safe-right));
  margin:0;
  text-align:center;
  font-weight:1000;
  letter-spacing:.12em;
  line-height:.92;
  font-size:clamp(30px,8.5vw,56px);
  color:#fff;
  text-shadow:
    0 2px 0 rgba(255,255,255,.18),
    0 4px 0 rgba(24,32,110,.35),
    0 10px 20px rgba(10,16,69,.55),
    0 0 24px rgba(255,255,255,.20);
}

.balloon{
  position:absolute;
  border:none;
  border-radius:48% 48% 45% 45% / 43% 43% 57% 57%;
  transform:translate(-50%,-50%);
  box-shadow:
    inset -10px -14px 22px rgba(0,0,0,.16),
    inset 7px 10px 12px rgba(255,255,255,.20),
    0 16px 24px rgba(0,0,0,.16),
    0 0 0 1px rgba(255,255,255,.07);
  transition:
    transform .14s ease,
    opacity .24s ease;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.balloon::before{
  content:"";
  position:absolute;
  width:26%;
  height:12%;
  left:19%;
  top:15%;
  border-radius:50%;
  background:rgba(255,255,255,.22);
  transform:rotate(-18deg);
  filter:blur(.6px);
}
.balloon:active{transform:translate(-50%,-50%) scale(.95)}
.balloon:focus,.balloon:focus-visible{outline:none;}
.balloon.wrong{animation:wrongShake .34s ease}
.balloon.fly{
  animation:flyAway 3.4s ease-out forwards;
  pointer-events:none;
  will-change:transform, opacity;
}

@keyframes wrongShake{
  0%,100%{transform:translate(-50%,-50%)}
  25%{transform:translate(calc(-50% - 7px),-50%)}
  50%{transform:translate(calc(-50% + 7px),-50%)}
  75%{transform:translate(calc(-50% - 5px),-50%)}
}
@keyframes flyAway{
  0%{
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
  }
  100%{
    opacity:0;
    transform:translate(
      calc(-50% + var(--driftx)),
      calc(-50% - 620px)
    ) scale(1.015);
  }
}
</style>
</head>
<body>
<div class="game">
  <div class="board" id="board"></div>
  <div class="hud">
    <h1 class="title">BALLOONS</h1>
  </div>
</div>

<script>
(() => {
  const board = document.getElementById('board');

  const COLORS = [
    ['#ff8bac','#ff2d67'],
    ['#7bff85','#19bb41'],
    ['#ffe86d','#ffbb0f'],
    ['#84dfff','#149dff'],
    ['#c89cff','#8250ff'],
    ['#ffbf7f','#ff7315'],
    ['#71fff0','#07c7b2'],
    ['#ff8ee3','#ff3dc3']
  ];

  let balloons = [];

  function create(){
    balloons = [];
    board.innerHTML = "";

    const total = 1000;

    for(let i = 0; i < total; i++){
      const b = document.createElement("button");
      b.type = "button";
      b.className = "balloon";

      const roll = Math.random();
      let w;
      if(roll < 0.22){
        w = 40 + Math.random() * 10;
      }else if(roll < 0.84){
        w = 52 + Math.random() * 12;
      }else{
        w = 66 + Math.random() * 10;
      }

      b.style.width = `${w}px`;
      b.style.height = `${w * 1.14}px`;

      b.style.left = `${Math.random() * 100}vw`;
      b.style.top = `${Math.random() * 100}vh`;

      const colorIndex = Math.floor(Math.random() * COLORS.length);
      const color = COLORS[colorIndex];

      b.style.background = `radial-gradient(circle at 34% 28%, ${color[0]} 0%, ${color[0]} 26%, ${color[1]} 100%)`;
      b.dataset.color = color[1];
      b.dataset.flying = "0";

      b.addEventListener("click", () => pop(color[1], b));

      board.appendChild(b);
      balloons.push(b);
    }
  }

  function getColorCounts(){
    const counts = new Map();

    for(const b of balloons){
      if(b.dataset.flying === "1") continue;
      const color = b.dataset.color;
      counts.set(color, (counts.get(color) || 0) + 1);
    }

    return counts;
  }

  function getMostNumerousColors(){
    const counts = getColorCounts();
    let max = 0;

    for(const count of counts.values()){
      if(count > max) max = count;
    }

    const winners = new Set();

    for(const [color, count] of counts.entries()){
      if(count === max){
        winners.add(color);
      }
    }

    return winners;
  }

  function cleanupFinishedFlying(){
    balloons = balloons.filter(b => b.isConnected);
  }

  function pop(color, clickedBalloon){
    if(clickedBalloon.dataset.flying === "1") return;

    cleanupFinishedFlying();

    const mostNumerous = getMostNumerousColors();

    if(!mostNumerous.has(color)){
      clickedBalloon.classList.remove("wrong");
      void clickedBalloon.offsetWidth;
      clickedBalloon.classList.add("wrong");
      return;
    }

    const group = balloons.filter(
      b => b.dataset.color === color && b.dataset.flying !== "1"
    );

    if(group.length < 1) return;

    group.forEach(b => {
      b.dataset.flying = "1";
      b.style.setProperty("--driftx", `${Math.random() * 200 - 100}px`);
      b.classList.add("fly");

      setTimeout(() => {
        b.remove();
        cleanupFinishedFlying();

        const activeLeft = balloons.filter(x => x.dataset.flying !== "1").length;
        if(activeLeft < 2){
          setTimeout(create, 300);
        }
      }, 3200);
    });
  }

  create();
})();
</script>
</body>
</html>
