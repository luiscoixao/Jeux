<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Memory Games</title>

<meta name="theme-color" content="#4f46e5">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(135deg,#4338ca,#7c3aed);
  color:#fff;
  padding:20px 16px 120px;
}
.app{max-width:460px;margin:auto}
h1{text-align:center;font-size:40px;font-weight:900}

.hidden-section{display:none !important}

/* TOP */
.top{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}
.top-pill{
  padding:12px;
  border-radius:16px;
  text-align:center;
  background:rgba(255,255,255,.12);
}

/* MENU */
.menu{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.game-card{
  padding:18px;
  border-radius:24px;
  background:rgba(255,255,255,.12);
  text-align:center;
  cursor:pointer;
}

/* PANEL */
.panel{
  margin-top:14px;
  padding:14px;
  border-radius:24px;
  background:rgba(255,255,255,.12);
}

.controls{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:center;
}
button{
  padding:10px 14px;
  border:none;
  border-radius:14px;
  font-weight:800;
}
.active{background:#111;color:#fff}

/* GRID */
.grid{
  display:grid;
  gap:10px;
  margin-top:14px;
}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}

.tile{
  aspect-ratio:1;
  background:#fff;
  border-radius:16px;
}

/* PLAY */
.playbar{
  position:fixed;
  left:16px;
  right:16px;
  bottom:16px;
}
.play-btn{
  width:100%;
  padding:16px;
  border-radius:20px;
  background:#22c55e;
  color:#fff;
  font-weight:900;
  font-size:20px;
}

.signature{
  text-align:center;
  font-size:11px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="app">

<h1>MEMORY GAMES</h1>

<!-- TOP -->
<div class="top hidden-section" id="topBar">
  <div class="top-pill" id="timer">0.00 s</div>
  <div class="top-pill" id="record">Record : —</div>
</div>

<!-- MENU -->
<section id="homeSection" class="menu">
  <div class="game-card" data-game="sequence">Séquence</div>
  <div class="game-card" data-game="grid">Grille</div>
</section>

<!-- PANEL -->
<section id="controlPanel" class="panel hidden-section">

<div class="controls">
  <button id="btnSequence" class="active">Séquence</button>
  <button id="btnGrid">Grille</button>
  <button id="btnEasy" class="active">Facile</button>
  <button id="btnHard">Difficile</button>
</div>

<div id="sequenceSection" class="hidden-section">
  <div id="sequenceGrid" class="grid grid-3"></div>
</div>

<div id="gridSection" class="hidden-section">
  <div id="disappearGrid" class="grid grid-4"></div>
</div>

<div class="signature">
Jeu créé par Luis Coixao à l'aide de ChatGPT.
</div>

</section>

</div>

<div class="playbar">
<button id="playBtn" class="play-btn">Jouer</button>
</div>

<script>
let game = "sequence";
let playing = false;

const topBar = document.getElementById("topBar");
const homeSection = document.getElementById("homeSection");
const controlPanel = document.getElementById("controlPanel");

const sequenceSection = document.getElementById("sequenceSection");
const gridSection = document.getElementById("gridSection");

const timerEl = document.getElementById("timer");

let startTime, timer;

function startTimer(){
  startTime = performance.now();
  timer = setInterval(()=>{
    timerEl.textContent = ((performance.now()-startTime)/1000).toFixed(2)+" s";
  },50);
}

function stopTimer(){
  clearInterval(timer);
}

function startGame(){
  playing = true;

  homeSection.classList.add("hidden-section");
  sequenceSection.classList.remove("hidden-section");
  gridSection.classList.add("hidden-section");

  startTimer();
}

function finishGame(){
  playing = false;
  stopTimer();

  homeSection.classList.remove("hidden-section");
}

document.getElementById("playBtn").onclick = startGame;

document.querySelectorAll(".game-card").forEach(card=>{
  card.onclick = ()=>{
    game = card.dataset.game;

    topBar.classList.remove("hidden-section");
    controlPanel.classList.remove("hidden-section");
  }
});
</script>

</body>
</html>
