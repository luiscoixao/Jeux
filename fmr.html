<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>Memory Colors</title>

<meta name="theme-color" content="#4f46e5" />
<link rel="apple-touch-icon" href="iconmemorygames.png" />

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(135deg,#4338ca,#7c3aed);
  color:#fff;
  display:flex;
  justify-content:center;
  padding:20px;
}
.app{max-width:420px;width:100%}
h1{text-align:center;font-size:38px;margin-bottom:10px}

.top{display:flex;gap:10px;margin-bottom:10px}
.box{
  flex:1;
  padding:12px;
  text-align:center;
  border-radius:14px;
  background:rgba(255,255,255,.15);
  font-weight:800
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
.tile{
  aspect-ratio:1/1;
  border-radius:16px;
  background:rgba(255,255,255,.2);
  border:none;
}
.green{background:#22c55e}
.yellow{background:#fde047}
.pink{background:#ec4899}
.cyan{background:#38bdf8}
.violet{background:#8b5cf6}

.correct{background:#22c55e}
.wrong{background:#ef4444}

.btn{
  margin-top:20px;
  width:100%;
  padding:16px;
  border-radius:20px;
  background:#22c55e;
  font-size:20px;
  font-weight:900;
  border:none;
}

.status{text-align:center;margin:10px 0;font-weight:700}
</style>
</head>

<body>
<div class="app">

<h1>MEMORY COLORS</h1>

<div class="top">
  <div class="box" id="level">Séquence : 1</div>
  <div class="box" id="score">Points : 0</div>
</div>

<div id="status" class="status"></div>

<div id="grid" class="grid"></div>

<button id="play" class="btn">Jouer</button>

</div>

<script>
const COLORS = ["green","yellow","pink","cyan","violet"];

let level = 1;
let score = 0;
let pattern = [];
let step = 0;
let playing = false;
let showing = false;

const grid = document.getElementById("grid");
const status = document.getElementById("status");

function wait(ms){
  return new Promise(r=>setTimeout(r,ms));
}

function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

function updateUI(){
  document.getElementById("level").textContent="Séquence : "+level;
  document.getElementById("score").textContent="Points : "+score;
}

function buildGrid(){
  grid.innerHTML="";
  for(let i=0;i<9;i++){
    const t=document.createElement("button");
    t.className="tile";
    t.onclick=()=>clickTile(i);
    grid.appendChild(t);
  }
}

function resetGrid(){
  [...grid.children].forEach(t=>t.className="tile");
}

function flash(i){
  const t=grid.children[i];
  t.classList.add(COLORS[i%5]);
  setTimeout(()=>t.className="tile",400);
}

function createPattern(length){
  const available=[0,1,2,3,4,5,6,7,8];
  let pattern=[];

  if(length<=3){
    return shuffle(available).slice(0,length);
  }

  if(length<=6){
    let base=shuffle(available).slice(0,length-1);
    let rep=base[Math.floor(Math.random()*base.length)];
    pattern=[...base,rep];
    return shuffle(pattern);
  }

  let base=shuffle(available).slice(0,length-2);
  let rep=base[Math.floor(Math.random()*base.length)];
  pattern=[...base,rep,rep];
  return shuffle(pattern);
}

async function showPattern(){
  showing=true;
  status.textContent="Mémorisez...";
  await wait(400);

  for(let i of pattern){
    flash(i);
    await wait(600);
  }

  showing=false;
  step=0;
  status.textContent="À vous";
}

async function start(){
  playing=true;
  level=1;
  score=0;
  updateUI();

  await wait(800);
  nextLevel();
}

async function nextLevel(){
  resetGrid();
  pattern=createPattern(level);
  updateUI();
  await showPattern();
}

function clickTile(i){
  if(!playing || showing) return;

  const t=grid.children[i];
  t.classList.add(COLORS[i%5]);

  if(i===pattern[step]){
    t.classList.add("correct");
    step++;

    if(step===pattern.length){
      score++;
      level++;

      if(level>9){
        status.textContent="Bravo !";
        playing=false;
        return;
      }

      setTimeout(nextLevel,800);
    }

  }else{
    t.classList.add("wrong");
  }

  setTimeout(()=>t.className="tile",300);
}

document.getElementById("play").onclick=start;

buildGrid();
updateUI();
</script>

</body>
</html>
